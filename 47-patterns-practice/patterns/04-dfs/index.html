<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DFS — Practice</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c12;
  --surface: #111119;
  --card: #15151e;
  --border: #23233a;
  --text: #e2e2f0;
  --muted: #52526e;
  --faint: #1e1e2e;
  --c1: #a78bfa;
  --c2: #38bdf8;
  --c3: #fb923c;
  --c4: #4ade80;
  --b1: rgba(167,139,250,0.08);
  --b2: rgba(56,189,248,0.07);
  --b3: rgba(251,146,60,0.08);
  --b4: rgba(74,222,128,0.07);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Syne', sans-serif; min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
}
body::before {
  content:''; position:fixed; inset:0;
  background-image: radial-gradient(rgba(167,139,250,0.09) 1px, transparent 1px);
  background-size: 28px 28px; pointer-events:none; z-index:0;
}
.wrap { width:100%; max-width:820px; padding:48px 24px 80px; position:relative; z-index:1; }

.hdr { text-align:center; margin-bottom:40px; }
.hdr-pill {
  display:inline-block; font-family:'JetBrains Mono',monospace;
  font-size:10px; letter-spacing:3px; text-transform:uppercase;
  color:var(--c1); border:1px solid rgba(167,139,250,0.3);
  padding:4px 14px; border-radius:20px; margin-bottom:16px;
}
.hdr h1 {
  font-size:clamp(24px,5vw,52px); font-weight:800;
  letter-spacing:-1.5px; line-height:1;
  background:linear-gradient(120deg,#fff 0%,var(--c1) 50%,var(--c4) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px;
}
.hdr p { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted); }

.selector-wrap { margin-bottom:28px; }
.selector-label { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
.selector { display:flex; flex-wrap:wrap; gap:8px; }
.sel-btn {
  font-family:'JetBrains Mono',monospace; font-size:11px; padding:6px 14px;
  border:1px solid var(--border); background:var(--faint); color:var(--muted);
  border-radius:3px; cursor:pointer; transition:all .15s; user-select:none;
}
.sel-btn:hover { border-color:var(--c1); color:var(--text); }
.sel-btn.active { background:rgba(167,139,250,0.1); border-color:var(--c1); color:var(--c1); }

.scorebar {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:20px; padding:10px 16px;
  background:var(--surface); border:1px solid var(--border); border-radius:4px;
}
.score-item { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); display:flex; flex-direction:column; align-items:center; gap:3px; }
.score-item strong { font-size:20px; font-weight:700; color:var(--text); line-height:1; }
.score-item.good strong { color:var(--c4); }
.score-item.bad  strong { color:var(--c3); }
.progress-bar { flex:1; margin:0 20px; height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; background:var(--c1); border-radius:2px; transition:width .4s; }

.template-box { background:var(--card); border:1px solid var(--border); border-radius:6px; overflow:hidden; box-shadow:0 0 60px rgba(167,139,250,0.04); }
.tbox-header { display:flex; align-items:center; justify-content:space-between; padding:12px 20px; border-bottom:1px solid var(--border); background:rgba(255,255,255,0.015); }
.tbox-title { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--c1); font-weight:600; }
.tbox-badge { font-family:'JetBrains Mono',monospace; font-size:10px; padding:3px 10px; border-radius:2px; border:1px solid; }

.zone { border-bottom:1px solid var(--border); display:flex; flex-direction:column; }
.zone:last-child { border-bottom:none; }
.zone-header { display:flex; align-items:center; gap:10px; padding:10px 20px 8px; }
.zone-num { font-size:18px; font-weight:800; line-height:1; font-family:'JetBrains Mono',monospace; }
.zone-name { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; opacity:.6; }
.zone-tag { margin-left:auto; font-family:'JetBrains Mono',monospace; font-size:9px; padding:2px 8px; border-radius:2px; opacity:.7; }
.zone-1 { background:var(--b1); } .zone-2 { background:var(--b2); } .zone-3 { background:var(--b3); } .zone-4 { background:var(--b4); }
.zone-1 .zone-num,.zone-1 .zone-name { color:var(--c1); } .zone-2 .zone-num,.zone-2 .zone-name { color:var(--c2); }
.zone-3 .zone-num,.zone-3 .zone-name { color:var(--c3); } .zone-4 .zone-num,.zone-4 .zone-name { color:var(--c4); }
.zone-1 .zone-tag { background:rgba(167,139,250,0.1); color:var(--c1); } .zone-2 .zone-tag { background:rgba(56,189,248,0.1); color:var(--c2); }
.zone-3 .zone-tag { background:rgba(251,146,60,0.1); color:var(--c3); } .zone-4 .zone-tag { background:rgba(74,222,128,0.1); color:var(--c4); }

.zone-body { padding:0 20px 14px 24px; font-family:'JetBrains Mono',monospace; font-size:12.5px; line-height:1.8; }
.fixed-line { display:block; color:var(--text); white-space:pre; }
.cm { color:#3d4f5c; font-style:italic; }

.fill-wrap { display:flex; align-items:center; margin:2px 0; }
.fill-indent { color:var(--muted); opacity:.3; font-size:12px; white-space:pre; user-select:none; }
.fill-input {
  background:rgba(0,0,0,0.25); border:none; border-bottom:1px dashed rgba(255,255,255,0.15);
  color:var(--text); font-family:'JetBrains Mono',monospace; font-size:12.5px;
  padding:2px 6px; width:100%; outline:none; caret-color:var(--c1);
  transition:border-color .2s,background .2s; border-radius:2px 2px 0 0;
}
.fill-input:focus { background:rgba(167,139,250,0.06); border-bottom-color:var(--c1); }
.fill-input.correct { background:rgba(74,222,128,0.07); border-bottom-color:var(--c4) !important; color:var(--c4); }
.fill-input.wrong { background:rgba(251,146,60,0.07); border-bottom-color:var(--c3) !important; color:var(--c3); animation:shake .3s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
.fill-input.revealed { background:rgba(56,189,248,0.07); border-bottom-color:var(--c2) !important; color:var(--c2); }

.actions { display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }
.btn { font-family:'JetBrains Mono',monospace; font-size:11px; padding:9px 20px; border-radius:3px; cursor:pointer; border:1px solid; transition:all .15s; letter-spacing:.5px; }
.btn-check  { background:rgba(167,139,250,0.1); color:var(--c1); border-color:rgba(167,139,250,0.4); }
.btn-check:hover { background:rgba(167,139,250,0.2); }
.btn-reveal { background:rgba(56,189,248,0.08); color:var(--c2); border-color:rgba(56,189,248,0.3); }
.btn-reveal:hover { background:rgba(56,189,248,0.15); }
.btn-reset  { background:transparent; color:var(--muted); border-color:var(--border); }
.btn-reset:hover { color:var(--text); border-color:var(--muted); }
.btn-next   { margin-left:auto; background:rgba(74,222,128,0.1); color:var(--c4); border-color:rgba(74,222,128,0.3); }
.btn-next:hover { background:rgba(74,222,128,0.18); }

.hint-row {
  display:none; align-items:center; gap:10px; margin-top:14px; padding:10px 14px;
  background:rgba(167,139,250,0.05); border:1px solid rgba(167,139,250,0.15);
  border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--c1);
}
.hint-row.show { display:flex; }

.viz-row { display:flex; align-items:flex-start; gap:12px; padding:12px 20px; border-top:1px solid var(--border); background:rgba(0,0,0,0.2); overflow-x:auto; flex-wrap:wrap; }
.viz-label { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); flex-shrink:0; padding-top:4px; }
.viz-graph { display:flex; flex-direction:column; gap:4px; }
.viz-row-g { display:flex; align-items:center; gap:6px; font-family:'JetBrains Mono',monospace; font-size:11px; }
.viz-node { width:26px; height:26px; display:flex; align-items:center; justify-content:center; border:1px solid var(--border); border-radius:50%; color:var(--muted); font-size:11px; }
.viz-node.visited { border-color:var(--c1); color:var(--c1); background:rgba(167,139,250,0.1); }
.viz-node.current { border-color:var(--c4); color:var(--c4); background:rgba(74,222,128,0.1); }
.viz-arrow { color:var(--muted); font-size:12px; }

.kw{color:#c792ea;font-weight:600} .ty{color:#82aaff} .nm{color:#f78c6c} .op{color:#ff6b35} .vr{color:#eeffff} .fn{color:#7dd3fc}

.toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(20px); font-family:'JetBrains Mono',monospace; font-size:12px; padding:10px 24px; border-radius:4px; opacity:0; transition:all .3s; z-index:100; pointer-events:none; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.ok  { background:rgba(74,222,128,0.15); border:1px solid rgba(74,222,128,0.4); color:var(--c4); }
.toast.err { background:rgba(251,146,60,0.12); border:1px solid rgba(251,146,60,0.3);  color:var(--c3); }
.toast.inf { background:rgba(56,189,248,0.1);  border:1px solid rgba(56,189,248,0.3);  color:var(--c2); }
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-pill">Pattern 04 — Practice Mode</div>
    <h1>DFS</h1>
    <p>// one template · fill the blanks · master all 10 manifestations</p>
  </div>

  <div class="selector-wrap">
    <div class="selector-label">Select manifestation</div>
    <div class="selector" id="selector"></div>
  </div>

  <div class="scorebar">
    <div class="score-item good"><strong id="s-correct">0</strong>correct</div>
    <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
    <div class="score-item bad"><strong id="s-wrong">0</strong>wrong</div>
    <div class="score-item" style="margin-left:16px"><strong id="s-streak">0</strong>streak🔥</div>
  </div>

  <div class="template-box" id="tbox">
    <div class="tbox-header">
      <span class="tbox-title" id="tbox-title">TEMPLATE.cpp</span>
      <span class="tbox-badge" id="tbox-badge"></span>
    </div>
    <div id="zones"></div>
    <div class="viz-row" id="viz"></div>
  </div>

  <div class="hint-row" id="hint-row"><span>💡</span><span id="hint-text"></span></div>

  <div class="actions">
    <button class="btn btn-check"  onclick="checkAll()">Check Answers</button>
    <button class="btn btn-reveal" onclick="revealAll()">Reveal</button>
    <button class="btn btn-reset"  onclick="resetInputs()">Reset</button>
    <button class="btn btn-next"   onclick="nextPattern()">Next Pattern →</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// DFS — 10 Manifestations
// 4 Blocks:
//   ① ENTER     — signature, mark visited immediately, edge guards
//   ② EXPLORE   — for each neighbor: if !visited → recurse  [structure FIXED]
//   ③ DO WORK   — WHEN and WHAT: pre-loop / in-loop / post-loop / on-backtrack
//   ④ DRIVER    — outer loop launching DFS on each unvisited node, collect result
// ─────────────────────────────────────────────────────────────────────────────

const patterns = [

  // 01 ── Connected Components ───────────────────────────────────────────────
  {
    id:1, title:"Connected Components", badge:"GRAPH", badgeColor:"var(--c1)",
    viz:'graph',
    hint:"Every fresh DFS launch = one new component. Count how many times you call dfs() from the driver.",
    zones:[
      { z:1, tag:"signature + mark visited on entry",
        lines:[
          { t:"blank", ph:"// dfs signature...", ans:"void dfs(int node, vector<vector<int>>& graph, vector<bool>& visited) {", hint:"void return — just marks all reachable nodes" },
          { t:"blank", ph:"// mark current node visited immediately...", ans:"visited[node] = true;", hint:"First thing every DFS does — claim this node" },
        ]
      },
      { z:2, tag:"FIXED structure — explore all unvisited neighbors",
        lines:[
          { t:"fixed", code:`<span class="kw">for</span> (<span class="ty">int</span> <span class="vr">nb</span> : graph[<span class="vr">node</span>]) {` },
          { t:"blank", ph:"//   recurse only if neighbor not visited...", ans:"if (!visited[nb]) dfs(nb, graph, visited);", hint:"Skip already-visited nodes to avoid infinite loops" },
          { t:"fixed", code:`}` },
        ]
      },
      { z:3, tag:"DO WORK — nothing extra needed here",
        lines:[
          { t:"fixed", code:`<span class="cm">// no extra work — just spreading the visited mark</span>` },
          { t:"fixed", code:`}` },
        ]
      },
      { z:4, tag:"DRIVER — count fresh launches",
        lines:[
          { t:"blank", ph:"// driver signature...", ans:"int countComponents(int n, vector<vector<int>>& graph) {", hint:"Returns number of connected components" },
          { t:"blank", ph:"// visited array...", ans:"vector<bool> visited(n, false);", hint:"Track which nodes have been reached" },
          { t:"blank", ph:"// result counter...", ans:"int components = 0;", hint:"Incremented every time we start a fresh DFS" },
          { t:"fixed", code:`<span class="kw">for</span> (<span class="ty">int</span> <span class="vr">i</span> <span class="op">=</span> <span class="nm">0</span>; <span class="vr">i</span> <span class="op">&lt;</span> <span class="vr">n</span>; <span class="vr">i</span><span class="op">++</span>) {` },
          { t:"blank", ph:"//   launch dfs on each unvisited node...", ans:"if (!visited[i]) { dfs(i, graph, visited); components++; }", hint:"Each fresh launch explores one complete connected component" },
          { t:"fixed", code:`}` },
          { t:"blank", ph:"// return count...", ans:"return components;", hint:"Total number of isolated groups" },
          { t:"fixed", code:`}` },
        ]
      },
    ]
  },

  // 02 ── Cycle Detection ────────────────────────────────────────────────────
  {
    id:2, title:"Cycle Detection", badge:"GRAPH", badgeColor:"var(--c3)",
    viz:'graph',
    hint:"Track parent to avoid false positives on undirected edges. If neighbor is visited AND not parent → cycle found.",
    zones:[
      { z:1, tag:"signature + parent param + mark visited",
        lines:[
          { t:"blank", ph:"// dfs signature — needs parent to avoid false cycle...", ans:"bool dfs(int node, int parent, vector<vector<int>>& graph, vector<bool>& visited) {", hint:"parent param prevents treating undirected back-edge as cycle" },
          { t:"blank", ph:"// mark visited on entry...", ans:"visited[node] = true;", hint:"Claim this node immediately" },
        ]
      },
      { z:2, tag:"FIXED structure — explore neighbors",
        lines:[
          { t:"fixed", code:`<span class="kw">for</span> (<span class="ty">int</span> <span class="vr">nb</span> : graph[<span class="vr">node</span>]) {` },
          { t:"blank", ph:"//   skip the parent edge (undirected graph)...", ans:"if (nb == parent) continue;", hint:"In undirected graph, the edge we came from isn't a cycle" },
          { t:"blank", ph:"//   if already visited — cycle found...", ans:"if (visited[nb]) return true;", hint:"Visited neighbor that isn't parent = back edge = cycle" },
          { t:"blank", ph:"//   else recurse and propagate cycle detection...", ans:"if (dfs(nb, node, graph, visited)) return true;", hint:"Pass current node as parent of next call" },
          { t:"fixed", code:`}` },
        ]
      },
      { z:3, tag:"DO WORK — cycle check is INSIDE neighbor loop",
        lines:[
          { t:"fixed", code:`<span class="cm">// work happens inside the neighbor loop above (back-edge check)</span>` },
          { t:"blank", ph:"// no cycle from this node...", ans:"return false;", hint:"Explored all neighbors without finding a back edge" },
          { t:"fixed", code:`}` },
        ]
      },
      { z:4, tag:"DRIVER — try each unvisited node",
        lines:[
          { t:"blank", ph:"// driver signature...", ans:"bool hasCycle(int n, vector<vector<int>>& graph) {", hint:"Returns true if any cycle exists in the graph" },
          { t:"blank", ph:"// visited array...", ans:"vector<bool> visited(n, false);", hint:"Shared across all DFS calls" },
          { t:"fixed", code:`<span class="kw">for</span> (<span class="ty">int</span> <span class="vr">i</span> <span class="op">=</span> <span class="nm">0</span>; <span class="vr">i</span> <span class="op">&lt;</span> <span class="vr">n</span>; <span class="vr">i</span><span class="op">++</span>) {` },
          { t:"blank", ph:"//   launch with -1 as initial parent...", ans:"if (!visited[i] && dfs(i, -1, graph, visited)) return true;", hint:"-1 means no parent — first node has no parent to skip" },
          { t:"fixed", code:`}` },
          { t:"blank", ph:"// no cycle found...", ans:"return false;", hint:"All components explored with no back edges found" },
          { t:"fixed", code:`}` },
        ]
      },
    ]
  },

  // 03 ── Path Existence ─────────────────────────────────────────────────────
  {
    id:3, title:"Path Existence", badge:"GRAPH", badgeColor:"var(--c2)",
    viz:'graph',
    hint:"Return true the moment you reach the destination. Propagate that true all the way back up the call stack.",
    zones:[
      { z:1, tag:"signature + destination param + mark visited",
        lines:[
          { t:"blank", ph:"// dfs signature — needs src and dst...", ans:"bool dfs(int node, int dst, vector<vector<int>>& graph, vector<bool>& visited) {", hint:"Returns bool — did we reach the destination?" },
          { t:"blank", ph:"// base case — reached destination...", ans:"if (node == dst) return true;", hint:"Stop immediately when destination is found" },
          { t:"blank", ph:"// mark visited...", ans:"visited[node] = true;", hint:"Prevent revisiting nodes in cycles" },
        ]
      },
      { z:2, tag:"FIXED structure — explore and propagate return",
        lines:[
          { t:"fixed", code:`<span class="kw">for</span> (<span class="ty">int</span> <span class="vr">nb</span> : graph[<span class="vr">node</span>]) {` },
          { t:"blank", ph:"//   recurse if unvisited, return true if path found...", ans:"if (!visited[nb] && dfs(nb, dst, graph, visited)) return true;", hint:"Propagate success immediately — short-circuit on first found path" },
          { t:"fixed", code:`}` },
        ]
      },
      { z:3, tag:"DO WORK — return false if no path from here",
        lines:[
          { t:"blank", ph:"// exhausted all neighbors — no path found...", ans:"return false;", hint:"Dead end — no path to destination through this node" },
          { t:"fixed", code:`}` },
        ]
      },
      { z:4, tag:"DRIVER — single launch from source",
        lines:[
          { t:"blank", ph:"// driver signature...", ans:"bool hasPath(int n, int src, int dst, vector<vector<int>>& graph) {", hint:"Single source-destination path existence check" },
          { t:"blank", ph:"// edge case — same node...", ans:"if (src == dst) return true;", hint:"Source equals destination trivially means path exists" },
          { t:"blank", ph:"// visited array...", ans:"vector<bool> visited(n, false);", hint:"Prevent cycles during search" },
          { t:"blank", ph:"// single launch — no loop needed...", ans:"return dfs(src, dst, graph, visited);", hint:"One DFS from source — no need to loop all nodes" },
          { t:"fixed", code:`}` },
        ]
      },
    ]
  },

  // 04 ── Tree Traversal ─────────────────────────────────────────────────────
  {
    id:4, title:"Tree Traversal", badge:"TREE", badgeColor:"var(--c4)",
    viz:'tree',
    hint:"PRE = process BEFORE children. IN = process BETWEEN children. POST = process AFTER all children.",
    zones:[
      { z:1, tag:"signature + null check + no visited needed for trees",
        lines:[
          { t:"blank", ph:"// dfs signature for tree node...", ans:"void dfs(TreeNode* node, vector<int>& result) {", hint:"Tree DFS takes node pointer — no visited array needed (no cycles in trees)" },
          { t:"blank", ph:"// base case — null node...", ans:"if (!node) return;", hint:"Null check replaces visited check in trees" },
        ]
      },
      { z:2, tag:"FIXED structure — recurse on left then right child",
        lines:[
          { t:"fixed", code:`<span class="cm">// preorder work goes HERE (before children)</span>` },
          { t:"blank", ph:"// recurse left child...", ans:"dfs(node->left, result);", hint:"Go deep into left subtree first" },
          { t:"fixed", code:`<span class="cm">// inorder work goes HERE (between children)</span>` },
          { t:"blank", ph:"// recurse right child...", ans:"dfs(node->right, result);", hint:"Then explore right subtree" },
          { t:"fixed", code:`<span class="cm">// postorder work goes HERE (after both children)</span>` },
        ]
      },
      { z:3, tag:"DO WORK — position determines traversal type",
        lines:[
          { t:"blank", ph:"// for preorder — visit node BEFORE children...", ans:"result.push_back(node->val);", hint:"Preorder: root → left → right. Move this line to match desired order" },
          { t:"fixed", code:`}` },
        ]
      },
      { z:4, tag:"DRIVER — single launch at root",
        lines:[
          { t:"blank", ph:"// driver signature...", ans:"vector<int> traverse(TreeNode* root) {", hint:"Returns traversal order as vector" },
          { t:"blank", ph:"// edge case — empty tree...", ans:"if (!root) return {};", hint:"Empty tree has no traversal" },
          { t:"blank", ph:"// result container...", ans:"vector<int> result;", hint:"Collects visited values in order" },
          { t:"blank", ph:"// single launch at root...", ans:"dfs(root, result);", hint:"Tree has one root — no loop needed" },
          { t:"blank", ph:"// return collected traversal...", ans:"return result;", hint:"Return the ordered sequence of node values" },
          { t:"fixed", code:`}` },
        ]
      },
    ]
  },

  // 05 ── Flood Fill ─────────────────────────────────────────────────────────
  {
    id:5, title:"Flood Fill", badge:"GRID", badgeColor:"var(--c3)",
    viz:'grid',
    hint:"Mark cell with new color BEFORE recursing — this IS the visited mark. Check boundary + same original color.",
    zones:[
      { z:1, tag:"signature + boundary + color check = visited check",
        lines:[
          { t:"blank", ph:"// dfs signature for grid flood fill...", ans:"void dfs(vector<vector<int>>& image, int r, int c, int oldColor, int newColor) {", hint:"Takes grid, current cell, original color to spread, new color to paint" },
          { t:"blank", ph:"// boundary check...", ans:"if (r < 0 || r >= image.size() || c < 0 || c >= image[0].size()) return;", hint:"Out of bounds — stop recursion" },
          { t:"blank", ph:"// not same original color — stop...", ans:"if (image[r][c] != oldColor) return;", hint:"Different color cell — not part of this region" },
        ]
      },
      { z:2, tag:"DO WORK PRE — paint BEFORE recursing neighbors",
        lines:[
          { t:"blank", ph:"// paint this cell (this IS the visited mark)...", ans:"image[r][c] = newColor;", hint:"Painting serves dual purpose: spreads color AND prevents revisiting" },
        ]
      },
      { z:3, tag:"FIXED structure — explore 4 directions",
        lines:[
          { t:"blank", ph:"// recurse in all 4 directions...", ans:"dfs(image, r+1, c, oldColor, newColor);", hint:"Down" },
          { t:"blank", ph:"// ...", ans:"dfs(image, r-1, c, oldColor, newColor);", hint:"Up" },
          { t:"blank", ph:"// ...", ans:"dfs(image, r, c+1, oldColor, newColor);", hint:"Right" },
          { t:"blank", ph:"// ...", ans:"dfs(image, r, c-1, oldColor, newColor);", hint:"Left" },
          { t:"fixed", code:`}` },
        ]
      },
      { z:4, tag:"DRIVER — single launch at click cell",
        lines:[
          { t:"blank", ph:"// driver signature...", ans:"vector<vector<int>> floodFill(vector<vector<int>>& image, int sr, int sc, int color) {", hint:"sr,sc = starting cell (click point), color = new color to fill" },
          { t:"blank", ph:"// edge case — already same color...", ans:"if (image[sr][sc] == color) return image;", hint:"No-op if cell already has target color — avoids infinite loop" },
          { t:"blank", ph:"// capture original color before painting...", ans:"int oldColor = image[sr][sc];", hint:"Must save original color before DFS starts painting over it" },
          { t:"blank", ph:"// launch dfs from click point...", ans:"dfs(image, sr, sc, oldColor, color);", hint:"Single launch — DFS spreads to all connected same-color cells" },
          { t:"blank", ph:"// return modified grid...", ans:"return image;", hint:"Grid is modified in-place, return it" },
          { t:"fixed", code:`}` },
        ]
      },
    ]
  },

  // 06 ── Island Counting ────────────────────────────────────────────────────
  {
    id:6, title:"Island Counting", badge:"GRID", badgeColor:"var(--c2)",
    viz:'grid',
    hint:"Each unvisited '1' cell = a new island. DFS sinks the whole island (marks visited). Count fresh launches.",
    zones:[
      { z:1, tag:"signature + boundary + water/visited check",
        lines:[
          { t:"blank", ph:"// dfs signature — grid coordinates...", ans:"void dfs(vector<vector<char>>& grid, int r, int c) {", hint:"Modifies grid in-place — marks visited by changing '1' to '0'" },
          { t:"blank", ph:"// boundary check...", ans:"if (r < 0 || r >= grid.size() || c < 0 || c >= grid[0].size()) return;", hint:"Stop at grid boundaries" },
          { t:"blank", ph:"// water cell or already visited — stop...", ans:"if (grid[r][c] != '1') return;", hint:"'0' = water, already-sunk '0' = visited — both stop recursion" },
          { t:"blank", ph:"// sink this land cell (mark visited)...", ans:"grid[r][c] = '0';", hint:"Turn '1' to '0' — this cell is now 'claimed' by current island" },
        ]
      },
      { z:2, tag:"FIXED — spread to all 4 adjacent land cells",
        lines:[
          { t:"blank", ph:"// spread in all 4 directions...", ans:"dfs(grid, r+1, c);", hint:"Down" },
          { t:"blank", ph:"// ...", ans:"dfs(grid, r-1, c);", hint:"Up" },
          { t:"blank", ph:"// ...", ans:"dfs(grid, r, c+1);", hint:"Right" },
          { t:"blank", ph:"// ...", ans:"dfs(grid, r, c-1);", hint:"Left" },
          { t:"fixed", code:`}` },
        ]
      },
      { z:3, tag:"DO WORK — entirely in driver (count launches)",
        lines:[
          { t:"fixed", code:`<span class="cm">// all work is in driver — dfs just sinks the island</span>` },
        ]
      },
      { z:4, tag:"DRIVER — count each fresh DFS launch",
        lines:[
          { t:"blank", ph:"// driver signature...", ans:"int numIslands(vector<vector<char>>& grid) {", hint:"Returns total number of islands (connected land masses)" },
          { t:"blank", ph:"// edge case — empty grid...", ans:"if (grid.empty()) return 0;", hint:"Guard against empty input" },
          { t:"blank", ph:"// island counter...", ans:"int islands = 0;", hint:"Incremented each time we find unvisited land" },
          { t:"fixed", code:`<span class="kw">for</span> (<span class="ty">int</span> r <span class="op">=</span> <span class="nm">0</span>; r <span class="op">&lt;</span> grid.size(); r<span class="op">++</span>) {` },
          { t:"fixed", code:`    <span class="kw">for</span> (<span class="ty">int</span> c <span class="op">=</span> <span class="nm">0</span>; c <span class="op">&lt;</span> grid[<span class="nm">0</span>].size(); c<span class="op">++</span>) {` },
          { t:"blank", ph:"//       new island found — sink it and count...", ans:"if (grid[r][c] == '1') { dfs(grid, r, c); islands++; }", hint:"Unvisited land = new island — DFS sinks entire island, we count it" },
          { t:"fixed", code:`    }` },
          { t:"fixed", code:`}` },
          { t:"blank", ph:"// return island count...", ans:"return islands;", hint:"Total islands found across entire grid" },
          { t:"fixed", code:`}` },
        ]
      },
    ]
  },

  // 07 ── Topological Ordering ───────────────────────────────────────────────
  {
    id:7, title:"Topological Ordering", badge:"DAG", badgeColor:"var(--c1)",
    viz:'graph',
    hint:"Push to stack AFTER visiting ALL neighbors (postorder). Reverse the stack at end = topological order.",
    zones:[
      { z:1, tag:"signature + visited + mark on entry",
        lines:[
          { t:"blank", ph:"// dfs signature — needs result stack...", ans:"void dfs(int node, vector<vector<int>>& graph, vector<bool>& visited, stack<int>& stk) {", hint:"Passes stack by reference — push to it after all neighbors visited" },
          { t:"blank", ph:"// mark visited on entry...", ans:"visited[node] = true;", hint:"Claim this node before exploring its dependencies" },
        ]
      },
      { z:2, tag:"FIXED — explore all unvisited neighbors first",
        lines:[
          { t:"fixed", code:`<span class="kw">for</span> (<span class="ty">int</span> <span class="vr">nb</span> : graph[<span class="vr">node</span>]) {` },
          { t:"blank", ph:"//   recurse unvisited neighbors...", ans:"if (!visited[nb]) dfs(nb, graph, visited, stk);", hint:"Visit all dependencies before processing this node" },
          { t:"fixed", code:`}` },
        ]
      },
      { z:3, tag:"DO WORK POST — push AFTER all neighbors done",
        lines:[
          { t:"blank", ph:"// push to stack AFTER all neighbors visited (postorder)...", ans:"stk.push(node);", hint:"All dependencies resolved — now this node can be scheduled" },
          { t:"fixed", code:`}` },
        ]
      },
      { z:4, tag:"DRIVER — pop stack for ordered result",
        lines:[
          { t:"blank", ph:"// driver signature...", ans:"vector<int> topoSort(int n, vector<vector<int>>& graph) {", hint:"Returns nodes in topological order (dependencies before dependents)" },
          { t:"blank", ph:"// visited array + result stack...", ans:"vector<bool> visited(n, false); stack<int> stk;", hint:"visited prevents re-processing; stack collects postorder" },
          { t:"fixed", code:`<span class="kw">for</span> (<span class="ty">int</span> i <span class="op">=</span> <span class="nm">0</span>; i <span class="op">&lt;</span> n; i<span class="op">++</span>) {` },
          { t:"blank", ph:"//   launch dfs on each unvisited node...", ans:"if (!visited[i]) dfs(i, graph, visited, stk);", hint:"Multiple launches for disconnected components" },
          { t:"fixed", code:`}` },
          { t:"blank", ph:"// pop stack into result vector...", ans:"vector<int> result; while (!stk.empty()) { result.push_back(stk.top()); stk.pop(); }", hint:"Stack is in reverse topological order — pop to get correct order" },
          { t:"blank", ph:"// return topological order...", ans:"return result;", hint:"Nodes ordered so all edges go left-to-right" },
          { t:"fixed", code:`}` },
        ]
      },
    ]
  },

  // 08 ── Strongly Connected Components (Kosaraju) ───────────────────────────
  {
    id:8, title:"Strongly Connected Components", badge:"SCC / KOSARAJU", badgeColor:"var(--c3)",
    viz:'graph',
    hint:"Kosaraju = two DFS passes. Pass 1: fill finish-order stack on original graph. Pass 2: DFS on reversed graph in stack order.",
    zones:[
      { z:1, tag:"two dfs functions — pass1 fills stack, pass2 collects SCC",
        lines:[
          { t:"blank", ph:"// pass 1 dfs — fills stack by finish time (postorder)...", ans:"void dfs1(int node, vector<vector<int>>& graph, vector<bool>& visited, stack<int>& stk) {", hint:"Standard postorder DFS on original graph" },
          { t:"blank", ph:"// mark visited...", ans:"visited[node] = true;", hint:"Claim node on entry" },
          { t:"blank", ph:"// explore original graph neighbors...", ans:"for (int nb : graph[node]) if (!visited[nb]) dfs1(nb, graph, visited, stk);", hint:"Recurse on all unvisited neighbors" },
          { t:"blank", ph:"// push AFTER all neighbors — postorder...", ans:"stk.push(node);", hint:"Finish time ordering — last to finish goes on top" },
          { t:"fixed", code:`}` },
        ]
      },
      { z:2, tag:"FIXED — pass 2 explores REVERSED graph",
        lines:[
          { t:"blank", ph:"// pass 2 dfs — collects one SCC on reversed graph...", ans:"void dfs2(int node, vector<vector<int>>& rev, vector<bool>& visited, vector<int>& comp) {", hint:"DFS on reversed graph — only reaches nodes in same SCC" },
          { t:"blank", ph:"// mark visited + collect into current component...", ans:"visited[node] = true; comp.push_back(node);", hint:"Every node reached in this DFS belongs to same SCC" },
          { t:"fixed", code:`<span class="kw">for</span> (<span class="ty">int</span> <span class="vr">nb</span> : <span class="vr">rev</span>[<span class="vr">node</span>]) {` },
          { t:"blank", ph:"//   explore reversed graph...", ans:"if (!visited[nb]) dfs2(nb, rev, visited, comp);", hint:"Follow edges in reverse direction" },
          { t:"fixed", code:`}` },
          { t:"fixed", code:`}` },
        ]
      },
      { z:3, tag:"BUILD reversed graph + run pass 1",
        lines:[
          { t:"blank", ph:"// driver signature...", ans:"vector<vector<int>> kosaraju(int n, vector<vector<int>>& graph) {", hint:"Returns list of SCCs, each SCC is a vector of node indices" },
          { t:"blank", ph:"// build reversed graph...", ans:"vector<vector<int>> rev(n); for (int u = 0; u < n; u++) for (int v : graph[u]) rev[v].push_back(u);", hint:"Reverse every edge: if u→v exists, add v→u to rev" },
          { t:"blank", ph:"// pass 1 — fill finish-order stack...", ans:"vector<bool> vis1(n, false); stack<int> stk; for (int i = 0; i < n; i++) if (!vis1[i]) dfs1(i, graph, vis1, stk);", hint:"Run DFS on original graph, nodes finish in topological-ish order" },
        ]
      },
      { z:4, tag:"DRIVER — pass 2 in finish order on reversed graph",
        lines:[
          { t:"blank", ph:"// pass 2 — process in finish order on reversed graph...", ans:"vector<bool> vis2(n, false); vector<vector<int>> sccs;", hint:"Fresh visited array for second pass" },
          { t:"blank", ph:"// pop stack and run dfs2 on unvisited nodes...", ans:"while (!stk.empty()) { int node = stk.top(); stk.pop(); if (!vis2[node]) { vector<int> comp; dfs2(node, rev, vis2, comp); sccs.push_back(comp); } }", hint:"Each fresh dfs2 launch = one complete SCC" },
          { t:"blank", ph:"// return all SCCs...", ans:"return sccs;", hint:"Each inner vector is one strongly connected component" },
          { t:"fixed", code:`}` },
        ]
      },
    ]
  },

  // 09 ── Subtree Queries ────────────────────────────────────────────────────
  {
    id:9, title:"Subtree Queries", badge:"TREE", badgeColor:"var(--c4)",
    viz:'tree',
    hint:"Aggregate RETURNS from children. Each child's dfs returns its subtree value. Combine them at parent (postorder).",
    zones:[
      { z:1, tag:"signature returns aggregate value + null check",
        lines:[
          { t:"blank", ph:"// dfs returns subtree sum — not void...", ans:"int dfs(TreeNode* node) {", hint:"Returns int (or any aggregate) — result bubbles up from leaves" },
          { t:"blank", ph:"// base case — null returns identity value...", ans:"if (!node) return 0;", hint:"Null contributes 0 to sum (identity for addition)" },
        ]
      },
      { z:2, tag:"FIXED — collect return values from both children",
        lines:[
          { t:"blank", ph:"// get left subtree aggregate...", ans:"int left = dfs(node->left);", hint:"Recursively get sum of entire left subtree" },
          { t:"blank", ph:"// get right subtree aggregate...", ans:"int right = dfs(node->right);", hint:"Recursively get sum of entire right subtree" },
        ]
      },
      { z:3, tag:"DO WORK POST — combine children results at this node",
        lines:[
          { t:"blank", ph:"// combine: this node's value + both subtrees...", ans:"return node->val + left + right;", hint:"Postorder: aggregate left + right + self and return upward" },
          { t:"fixed", code:`}` },
        ]
      },
      { z:4, tag:"DRIVER — single launch, use returned value",
        lines:[
          { t:"blank", ph:"// driver signature...", ans:"int subtreeSum(TreeNode* root) {", hint:"Returns total sum of all nodes in tree" },
          { t:"blank", ph:"// edge case — empty tree...", ans:"if (!root) return 0;", hint:"Empty tree has sum of 0" },
          { t:"blank", ph:"// single launch — return value IS the answer...", ans:"return dfs(root);", hint:"Root's dfs return value = aggregate across entire tree" },
          { t:"fixed", code:`}` },
        ]
      },
    ]
  },

  // 10 ── Maze Solving ───────────────────────────────────────────────────────
  {
    id:10, title:"Maze Solving", badge:"BACKTRACK", badgeColor:"var(--c2)",
    viz:'grid',
    hint:"Mark cell BEFORE recursing, UNMARK on backtrack. This explores ALL paths — unlike flood fill which commits permanently.",
    zones:[
      { z:1, tag:"signature + boundary + wall + visited check",
        lines:[
          { t:"blank", ph:"// dfs signature — target coordinates...", ans:"bool dfs(vector<vector<int>>& maze, int r, int c, int er, int ec, vector<vector<bool>>& visited) {", hint:"Returns bool — did we find a path to exit (er,ec)?" },
          { t:"blank", ph:"// boundary check...", ans:"if (r < 0 || r >= maze.size() || c < 0 || c >= maze[0].size()) return false;", hint:"Out of bounds — dead end" },
          { t:"blank", ph:"// wall or already on current path — stop...", ans:"if (maze[r][c] == 1 || visited[r][c]) return false;", hint:"1 = wall, visited = already part of current path being explored" },
          { t:"blank", ph:"// reached exit...", ans:"if (r == er && c == ec) return true;", hint:"Found the exit — return true immediately" },
        ]
      },
      { z:2, tag:"MARK before recurse — UNMARK on backtrack",
        lines:[
          { t:"blank", ph:"// mark current cell as part of current path...", ans:"visited[r][c] = true;", hint:"Commit to this cell for the current path being explored" },
        ]
      },
      { z:3, tag:"FIXED — explore 4 directions, backtrack if all fail",
        lines:[
          { t:"blank", ph:"// try all 4 directions — return true if any works...", ans:"if (dfs(maze,r+1,c,er,ec,visited) || dfs(maze,r-1,c,er,ec,visited) || dfs(maze,r,c+1,er,ec,visited) || dfs(maze,r,c-1,er,ec,visited)) return true;", hint:"Try all neighbors — if ANY path succeeds, return true" },
          { t:"blank", ph:"// all directions failed — BACKTRACK (unmark this cell)...", ans:"visited[r][c] = false;", hint:"This cell leads nowhere — remove it from current path so other paths can use it" },
          { t:"blank", ph:"// dead end...", ans:"return false;", hint:"No path found through this cell" },
          { t:"fixed", code:`}` },
        ]
      },
      { z:4, tag:"DRIVER — single launch from entrance",
        lines:[
          { t:"blank", ph:"// driver signature...", ans:"bool solveMaze(vector<vector<int>>& maze, int sr, int sc, int er, int ec) {", hint:"sr,sc = start; er,ec = exit. Returns true if path exists" },
          { t:"blank", ph:"// edge case — start is exit...", ans:"if (sr == er && sc == ec) return true;", hint:"Already at destination" },
          { t:"blank", ph:"// visited grid for backtracking...", ans:"vector<vector<bool>> visited(maze.size(), vector<bool>(maze[0].size(), false));", hint:"Separate visited — must be undoable (unlike flood fill)" },
          { t:"blank", ph:"// single launch from entrance...", ans:"return dfs(maze, sr, sc, er, ec, visited);", hint:"One DFS — backtracks internally to explore all possible paths" },
          { t:"fixed", code:`}` },
        ]
      },
    ]
  },
];

// ─────────────────────────────────────────────────────────────────────────────
const zoneNames = ['Enter + Mark Visited','Explore Neighbors','Do Work (pre/in/post/backtrack)','Driver'];
const zoneCls   = ['zone-1','zone-2','zone-3','zone-4'];
const zoneNums  = ['①','②','③','④'];

let current = 0, answered = new Set(), stats = { correct:0, wrong:0, streak:0 };

function buildSelector() {
  const sel = document.getElementById('selector');
  sel.innerHTML = '';
  patterns.forEach((p,i) => {
    const b = document.createElement('button');
    b.className = 'sel-btn' + (i===0?' active':'');
    b.textContent = `${String(i+1).padStart(2,'0')} ${p.title}`;
    b.onclick = () => loadPattern(i);
    sel.appendChild(b);
  });
}

function loadPattern(idx) {
  current = idx; answered = new Set();
  document.querySelectorAll('.sel-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  const p = patterns[idx];
  document.getElementById('tbox-title').textContent = p.title.replace(/ /g,'_') + '.cpp';
  const badge = document.getElementById('tbox-badge');
  badge.textContent = p.badge;
  badge.style.cssText = `color:${p.badgeColor};border-color:${p.badgeColor};background:${p.badgeColor}18;`;

  const zonesEl = document.getElementById('zones');
  zonesEl.innerHTML = '';
  p.zones.forEach((zone, zi) => {
    const div = document.createElement('div');
    div.className = `zone ${zoneCls[zi]}`;
    let linesHTML = '';
    zone.lines.forEach((line, li) => {
      if (line.t === 'fixed') {
        linesHTML += `<span class="fixed-line">${line.code}</span>`;
      } else {
        const key = `${idx}-${zi}-${li}`;
        linesHTML += `<div class="fill-wrap"><span class="fill-indent">  </span>
          <input class="fill-input" data-key="${key}"
            data-ans="${encodeURIComponent(line.ans)}"
            data-hint="${encodeURIComponent(line.hint)}"
            placeholder="${line.ph}" autocomplete="off" spellcheck="false"
            onkeydown="handleKey(event,this)" oninput="clearState(this)"/></div>`;
      }
    });
    div.innerHTML = `
      <div class="zone-header">
        <span class="zone-num">${zoneNums[zi]}</span>
        <span class="zone-name">${zoneNames[zi]}</span>
        <span class="zone-tag">${zone.tag}</span>
      </div>
      <div class="zone-body">${linesHTML}</div>`;
    zonesEl.appendChild(div);
  });

  buildViz(p);
  document.getElementById('hint-row').classList.remove('show');
}

function buildViz(p) {
  const viz = document.getElementById('viz');
  if (p.viz === 'graph') {
    viz.innerHTML = `<span class="viz-label">graph:</span>
      <div class="viz-graph">
        <div class="viz-row-g"><div class="viz-node current">0</div><span class="viz-arrow">→</span><div class="viz-node visited">1</div><span class="viz-arrow">→</span><div class="viz-node visited">2</div></div>
        <div class="viz-row-g"><div class="viz-node visited">3</div><span class="viz-arrow">→</span><div class="viz-node">4</div></div>
      </div>
      <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-left:12px">🟢 current &nbsp; 🟣 visited &nbsp; ⬜ unvisited</span>`;
  } else if (p.viz === 'tree') {
    viz.innerHTML = `<span class="viz-label">tree:</span>
      <div class="viz-graph">
        <div class="viz-row-g" style="justify-content:center"><div class="viz-node current">1</div></div>
        <div class="viz-row-g"><div class="viz-node visited">2</div><span style="width:20px"></span><div class="viz-node visited">3</div></div>
        <div class="viz-row-g"><div class="viz-node">4</div><div class="viz-node">5</div><span style="width:20px"></span><div class="viz-node">6</div></div>
      </div>`;
  } else {
    viz.innerHTML = `<span class="viz-label">grid:</span>
      <div style="display:flex;flex-direction:column;gap:3px">
        ${ [['1','1','0'],['1','0','0'],['0','0','1']].map(row =>
          `<div style="display:flex;gap:3px">${row.map(v =>
            `<div class="viz-node ${v==='1'?'visited':''}" style="border-radius:3px;width:26px;height:26px">${v}</div>`
          ).join('')}</div>`
        ).join('') }
      </div>`;
  }
}

function normalise(s) {
  return s.trim().toLowerCase()
    .replace(/\s*([+\-*/%=<>!&|^~,;{}()\[\]])\s*/g,'$1')
    .replace(/\s+/g,' ').replace(/;+$/,'')
    .replace(/\+\+\s*/g,'++').replace(/--\s*/g,'--')
    .replace(/\s*->\s*/g,'->').trim();
}

function handleKey(e,el) { if(e.key==='Enter')checkSingle(el); if(e.key==='Tab'){e.preventDefault();focusNext(el);} }
function clearState(el)  { el.classList.remove('correct','wrong','revealed'); }

function checkSingle(el) {
  const key = el.dataset.key;
  if (answered.has(key)) return;
  const ans = decodeURIComponent(el.dataset.ans);
  if (normalise(el.value) === normalise(ans)) {
    el.classList.add('correct'); el.classList.remove('wrong');
    answered.add(key); stats.correct++; stats.streak++;
    updateScore(); showToast('✓ Correct!','ok'); focusNext(el);
  } else {
    el.classList.add('wrong'); el.classList.remove('correct');
    stats.wrong++; stats.streak=0; updateScore();
    showToast('✗ Not quite — check hint','err');
    document.getElementById('hint-text').textContent = decodeURIComponent(el.dataset.hint);
    document.getElementById('hint-row').classList.add('show');
  }
}

function checkAll()  { document.querySelectorAll('.fill-input').forEach(el=>{ if(!answered.has(el.dataset.key)) checkSingle(el); }); }
function revealAll() {
  document.querySelectorAll('.fill-input').forEach(el=>{
    if(!answered.has(el.dataset.key)){ el.value=decodeURIComponent(el.dataset.ans); el.classList.add('revealed'); el.classList.remove('correct','wrong'); }
  });
  showToast('Answers revealed — study, then Reset!','inf');
  document.getElementById('hint-text').textContent = patterns[current].hint;
  document.getElementById('hint-row').classList.add('show');
}
function resetInputs() {
  answered=new Set();
  document.querySelectorAll('.fill-input').forEach(el=>{ el.value=''; el.classList.remove('correct','wrong','revealed'); });
  document.getElementById('hint-row').classList.remove('show');
}
function nextPattern() { loadPattern((current+1)%patterns.length); }
function focusNext(el) { const all=Array.from(document.querySelectorAll('.fill-input')); const i=all.indexOf(el); if(i<all.length-1)all[i+1].focus(); }
function updateScore() {
  document.getElementById('s-correct').textContent=stats.correct;
  document.getElementById('s-wrong').textContent=stats.wrong;
  document.getElementById('s-streak').textContent=stats.streak;
  const total=stats.correct+stats.wrong;
  document.getElementById('prog').style.width=total?Math.round(stats.correct/total*100)+'%':'0%';
}
let toastTimer;
function showToast(msg,type) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2400);
}

buildSelector();
loadPattern(0);
</script>
