<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trie — Practice</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0c12; --surface:#111119; --card:#15151e; --border:#23233a;
  --text:#e2e2f0; --muted:#52526e; --faint:#1e1e2e;
  --c1:#a78bfa; --c2:#38bdf8; --c3:#fb923c; --c4:#4ade80;
  --b1:rgba(167,139,250,0.08); --b2:rgba(56,189,248,0.07);
  --b3:rgba(251,146,60,0.08);  --b4:rgba(74,222,128,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(rgba(167,139,250,0.05) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;z-index:0;}
.wrap{width:100%;max-width:860px;padding:48px 24px 80px;position:relative;z-index:1;}

.hdr{text-align:center;margin-bottom:40px;}
.hdr-pill{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--c1);border:1px solid rgba(167,139,250,0.3);padding:4px 14px;border-radius:20px;margin-bottom:16px;}
.hdr h1{font-size:clamp(22px,4.5vw,48px);font-weight:800;letter-spacing:-1.5px;line-height:1;background:linear-gradient(120deg,#fff 0%,var(--c1) 40%,var(--c4) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;}
.hdr p{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);}

.selector-wrap{margin-bottom:28px;}
.selector-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.selector{display:flex;flex-wrap:wrap;gap:8px;}
.sel-btn{font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 14px;border:1px solid var(--border);background:var(--faint);color:var(--muted);border-radius:3px;cursor:pointer;transition:all .15s;user-select:none;}
.sel-btn:hover{border-color:var(--c1);color:var(--text);}
.sel-btn.active{background:rgba(167,139,250,0.1);border-color:var(--c1);color:var(--c1);}

.scorebar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:4px;}
.score-item{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;}
.score-item strong{font-size:20px;font-weight:700;color:var(--text);line-height:1;}
.score-item.good strong{color:var(--c4);} .score-item.bad strong{color:var(--c3);}
.progress-bar{flex:1;margin:0 20px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--c1);border-radius:2px;transition:width .4s;}

.template-box{background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden;box-shadow:0 0 60px rgba(167,139,250,0.04);}
.tbox-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.015);}
.tbox-title{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--c1);font-weight:600;}
.tbox-badge{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 10px;border-radius:2px;border:1px solid;}

.zone{border-bottom:1px solid var(--border);}
.zone:last-child{border-bottom:none;}
.zone-header{display:flex;align-items:center;gap:10px;padding:10px 20px 8px;}
.zone-num{font-size:18px;font-weight:800;line-height:1;font-family:'JetBrains Mono',monospace;}
.zone-name{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;opacity:.6;}
.zone-tag{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 8px;border-radius:2px;opacity:.8;text-align:right;max-width:380px;}
.zone-1{background:var(--b1)} .zone-2{background:var(--b2)} .zone-3{background:var(--b3)} .zone-4{background:var(--b4)}
.zone-1 .zone-num,.zone-1 .zone-name{color:var(--c1)} .zone-2 .zone-num,.zone-2 .zone-name{color:var(--c2)}
.zone-3 .zone-num,.zone-3 .zone-name{color:var(--c3)} .zone-4 .zone-num,.zone-4 .zone-name{color:var(--c4)}
.zone-1 .zone-tag{background:rgba(167,139,250,0.1);color:var(--c1)} .zone-2 .zone-tag{background:rgba(56,189,248,0.1);color:var(--c2)}
.zone-3 .zone-tag{background:rgba(251,146,60,0.1);color:var(--c3)} .zone-4 .zone-tag{background:rgba(74,222,128,0.1);color:var(--c4)}

.zone-body{padding:0 20px 14px 24px;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.8;}
.fixed-line{display:block;color:var(--text);white-space:pre;}

.fill-wrap{display:flex;align-items:center;margin:2px 0;}
.fill-indent{color:var(--muted);opacity:.3;font-size:12px;white-space:pre;user-select:none;}
.fill-input{background:rgba(0,0,0,0.25);border:none;border-bottom:1px dashed rgba(255,255,255,0.15);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12.5px;padding:2px 6px;width:100%;outline:none;caret-color:var(--c1);transition:border-color .2s,background .2s;border-radius:2px 2px 0 0;}
.fill-input:focus{background:rgba(167,139,250,0.06);border-bottom-color:var(--c1);}
.fill-input.correct{background:rgba(74,222,128,0.07);border-bottom-color:var(--c4)!important;color:var(--c4);}
.fill-input.wrong{background:rgba(251,146,60,0.07);border-bottom-color:var(--c3)!important;color:var(--c3);animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.fill-input.revealed{background:rgba(56,189,248,0.07);border-bottom-color:var(--c2)!important;color:var(--c2);}

.actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;}
.btn{font-family:'JetBrains Mono',monospace;font-size:11px;padding:9px 20px;border-radius:3px;cursor:pointer;border:1px solid;transition:all .15s;letter-spacing:.5px;}
.btn-check{background:rgba(167,139,250,0.1);color:var(--c1);border-color:rgba(167,139,250,0.4);}
.btn-check:hover{background:rgba(167,139,250,0.2);}
.btn-reveal{background:rgba(56,189,248,0.08);color:var(--c2);border-color:rgba(56,189,248,0.3);}
.btn-reveal:hover{background:rgba(56,189,248,0.15);}
.btn-reset{background:transparent;color:var(--muted);border-color:var(--border);}
.btn-reset:hover{color:var(--text);border-color:var(--muted);}
.btn-next{margin-left:auto;background:rgba(74,222,128,0.1);color:var(--c4);border-color:rgba(74,222,128,0.3);}
.btn-next:hover{background:rgba(74,222,128,0.18);}

.hint-row{display:none;align-items:flex-start;gap:10px;margin-top:14px;padding:10px 14px;background:rgba(167,139,250,0.05);border:1px solid rgba(167,139,250,0.15);border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--c1);line-height:1.6;}
.hint-row.show{display:flex;}

.viz-row{padding:14px 20px;border-top:1px solid var(--border);background:rgba(0,0,0,0.2);overflow-x:auto;}
.trie-viz{display:flex;flex-direction:column;align-items:flex-start;gap:4px;}
.trie-level{display:flex;gap:6px;align-items:center;padding-left:0;}
.trie-node{font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 9px;border:1px solid;border-radius:3px;white-space:nowrap;}
.tn-root{border-color:var(--c1);color:var(--c1);background:rgba(167,139,250,0.1);}
.tn-mid{border-color:var(--c2);color:var(--c2);background:rgba(56,189,248,0.07);}
.tn-end{border-color:var(--c4);color:var(--c4);background:rgba(74,222,128,0.08);}
.tn-arrow{color:var(--muted);font-size:12px;}
.viz-legend{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);line-height:2;margin-top:10px;}

.kw{color:#c792ea;font-weight:600} .ty{color:#82aaff} .nm{color:#f78c6c} .op{color:#ff6b35} .fn{color:#7dd3fc} .cm{color:#3d4f5c;font-style:italic}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);font-family:'JetBrains Mono',monospace;font-size:12px;padding:10px 24px;border-radius:4px;opacity:0;transition:all .3s;z-index:100;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{background:rgba(74,222,128,0.15);border:1px solid rgba(74,222,128,0.4);color:var(--c4);}
.toast.err{background:rgba(251,146,60,0.12);border:1px solid rgba(251,146,60,0.3);color:var(--c3);}
.toast.inf{background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.3);color:var(--c2);}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-pill">Pattern 17 — Practice Mode</div>
    <h1>Trie</h1>
    <p>// TrieNode[26] · insert char-by-char · traverse · isEnd = terminal condition</p>
  </div>

  <div class="selector-wrap">
    <div class="selector-label">Select manifestation</div>
    <div class="selector" id="selector"></div>
  </div>

  <div class="scorebar">
    <div class="score-item good"><strong id="s-correct">0</strong>correct</div>
    <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
    <div class="score-item bad"><strong id="s-wrong">0</strong>wrong</div>
    <div class="score-item" style="margin-left:16px"><strong id="s-streak">0</strong>streak🔥</div>
  </div>

  <div class="template-box">
    <div class="tbox-header">
      <span class="tbox-title" id="tbox-title">TEMPLATE.cpp</span>
      <span class="tbox-badge" id="tbox-badge"></span>
    </div>
    <div id="zones"></div>
    <div class="viz-row" id="viz"></div>
  </div>

  <div class="hint-row" id="hint-row"><span>💡</span><span id="hint-text"></span></div>

  <div class="actions">
    <button class="btn btn-check"  onclick="checkAll()">Check Answers</button>
    <button class="btn btn-reveal" onclick="revealAll()">Reveal</button>
    <button class="btn btn-reset"  onclick="resetInputs()">Reset</button>
    <button class="btn btn-next"   onclick="nextPattern()">Next →</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// TRIE — 10 Manifestations
//
// 4 Blocks:
//   ① TrieNode STRUCT  — children[26] (or [2] for binary), isEnd bool, extra fields
//   ② insert()         — char-by-char walk, create nodes, mark isEnd — FIXED shape
//   ③ traverse()       — walk matching chars; varies: null→prune / isEnd→collect / wildcard
//   ④ QUERY/RESULT     — isEnd check / DFS collect / greedy XOR / DP + trie
//
// TRIE IS ITS TRAVERSE FUNCTION:
//   word search:    walk word, return node->isEnd
//   autocomplete:   walk prefix, DFS collect all isEnd descendants
//   XOR max:        walk bits, greedily pick opposite bit
//   word break:     at each dp[i], check if any word ending at i exists in trie
//   replace roots:  first isEnd encountered = return that prefix (shortest root)
// ─────────────────────────────────────────────────────────────────────────────

const P = [

  // 01 ── Word Insertion and Search ─────────────────────────────────────────
  {
    id:1, title:"Word Insertion and Search", badge:"STANDARD TRIE", badgeColor:"var(--c4)",
    hint:"The canonical trie. Node has children[26] and isEnd. insert() creates nodes. search() returns isEnd at end. startsWith() returns node!=nullptr.",
    vizNodes:["root","a","p","p","l","e★"],
    zones:[
      { z:1, tag:"TrieNode: children[26] + isEnd — universal node struct",
        lines:[
          {t:"blank", ph:"// trie node struct...", ans:"struct TrieNode { TrieNode* children[26]; bool isEnd; TrieNode():isEnd(false){fill(children,children+26,nullptr);} };", hint:"children[c-'a'] = next node for character c. isEnd marks a complete word."},
          {t:"blank", ph:"// trie class with root...", ans:"struct Trie { TrieNode* root; Trie(){ root=new TrieNode(); }", hint:"Root node represents the empty string — all words share this starting point"},
        ]
      },
      { z:2, tag:"insert() — char-by-char, create nodes, mark isEnd",
        lines:[
          {t:"blank", ph:"// insert word — FIXED shape for all char tries...", ans:"void insert(string& word){ TrieNode* node=root; for(char c:word){ int i=c-'a'; if(!node->children[i]) node->children[i]=new TrieNode(); node=node->children[i]; } node->isEnd=true; }", hint:"Walk each char, allocate node if missing, advance pointer, mark isEnd at last char"},
        ]
      },
      { z:3, tag:"traverse() — walk word; null=missing, isEnd=found",
        lines:[
          {t:"blank", ph:"// search: returns true only if complete word exists...", ans:"bool search(string& word){ TrieNode* node=root; for(char c:word){ int i=c-'a'; if(!node->children[i]) return false; node=node->children[i]; } return node->isEnd; }", hint:"Null child = word not in trie. Reaching end but isEnd=false = only a prefix exists."},
          {t:"blank", ph:"// startsWith: returns true if any word has this prefix...", ans:"bool startsWith(string& prefix){ TrieNode* node=root; for(char c:prefix){ int i=c-'a'; if(!node->children[i]) return false; node=node->children[i]; } return true; }", hint:"Identical to search but returns true regardless of isEnd — just needs path to exist"},
        ]
      },
      { z:4, tag:"QUERY — search vs startsWith: only isEnd differs",
        lines:[
          {t:"fixed", code:`<span class="cm">// search:     return node->isEnd  (complete word required)</span>`},
          {t:"fixed", code:`<span class="cm">// startsWith: return true          (prefix is enough)</span>`},
          {t:"fixed", code:`<span class="cm">// This single difference IS the semantic distinction</span>`},
          {t:"fixed", code:`};`},
        ]
      },
    ]
  },

  // 02 ── Prefix Search / Autocomplete ──────────────────────────────────────
  {
    id:2, title:"Prefix Search / Autocomplete", badge:"DFS COLLECT", badgeColor:"var(--c2)",
    hint:"Walk prefix to find its trie node. Then DFS from that node collecting all words (paths to isEnd nodes). The trie structure groups all words sharing a prefix under one subtree.",
    vizNodes:["root→app","→apple★","→apply★","→apt★"],
    zones:[
      { z:1, tag:"same TrieNode struct — DFS helper added",
        lines:[
          {t:"blank", ph:"// reuse standard TrieNode and insert()...", ans:"struct AutocompleteTrie { TrieNode* root=new TrieNode();", hint:"Standard trie — autocomplete is just a different query pattern"},
          {t:"blank", ph:"// insert all dictionary words...", ans:"void insert(string w){ TrieNode* n=root; for(char c:w){int i=c-'a';if(!n->children[i])n->children[i]=new TrieNode();n=n->children[i];} n->isEnd=true; }", hint:"Same insert as always — unchanged"},
        ]
      },
      { z:2, tag:"walk prefix — find subtree root for the prefix",
        lines:[
          {t:"blank", ph:"// walk prefix to find starting node for DFS...", ans:"TrieNode* walkPrefix(string& prefix){ TrieNode* node=root; for(char c:prefix){ int i=c-'a'; if(!node->children[i]) return nullptr; node=node->children[i]; } return node; }", hint:"Returns the node at end of prefix path. All completions live in this subtree."},
        ]
      },
      { z:3, tag:"traverse() — DFS from prefix node, collect all isEnd paths",
        lines:[
          {t:"blank", ph:"// DFS collect all complete words in this subtree...", ans:"void dfs(TrieNode* node, string& cur, vector<string>& res){ if(node->isEnd) res.push_back(cur); for(int i=0;i<26;i++){ if(node->children[i]){ cur+=(char)('a'+i); dfs(node->children[i],cur,res); cur.pop_back(); } } }", hint:"Standard backtracking DFS: add char, recurse, pop char. Collect at isEnd nodes."},
        ]
      },
      { z:4, tag:"QUERY — combine walkPrefix + DFS",
        lines:[
          {t:"blank", ph:"// autocomplete: all words starting with prefix...", ans:"vector<string> autocomplete(string prefix){ TrieNode* node=walkPrefix(prefix); if(!node) return {}; vector<string> res; dfs(node,prefix,res); return res; }", hint:"Walk to prefix end, then DFS from there. Pass prefix as initial cur string for DFS."},
          {t:"fixed", code:`};`},
        ]
      },
    ]
  },

  // 03 ── Word Break Problem ─────────────────────────────────────────────────
  {
    id:3, title:"Word Break Problem", badge:"TRIE + DP", badgeColor:"var(--c3)",
    hint:"dp[i] = can s[0..i-1] be segmented into dictionary words. For each i where dp[i]=true, walk trie from s[i] — whenever isEnd hit at j, set dp[j]=true.",
    vizNodes:["dp[0]=T","→'leet'","→dp[4]=T","→'code'","→dp[8]=T"],
    zones:[
      { z:1, tag:"build trie from dictionary, then DP over string",
        lines:[
          {t:"blank", ph:"// function signature...", ans:"bool wordBreak(string s, vector<string>& wordDict) {", hint:"Returns true if s can be fully segmented using words from dictionary"},
          {t:"blank", ph:"// build trie from dictionary...", ans:"TrieNode* root=new TrieNode(); for(auto& w:wordDict){ TrieNode* n=root; for(char c:w){int i=c-'a';if(!n->children[i])n->children[i]=new TrieNode();n=n->children[i];} n->isEnd=true; }", hint:"Insert all dictionary words into trie — O(total chars in dict)"},
          {t:"blank", ph:"// dp[i] = can s[0..i-1] be segmented...", ans:"int n=s.size(); vector<bool> dp(n+1,false); dp[0]=true;", hint:"dp[0]=true: empty prefix is always valid. dp[n]=true means entire string segmented."},
        ]
      },
      { z:2, tag:"insert() already done inline above",
        lines:[
          {t:"fixed", code:`<span class="cm">// insert done during trie build above</span>`},
          {t:"fixed", code:`<span class="cm">// now run DP over string positions</span>`},
        ]
      },
      { z:3, tag:"traverse() — from each dp[i]=true, walk trie forward",
        lines:[
          {t:"fixed", code:`<span class="kw">for</span> (<span class="ty">int</span> i <span class="op">=</span> <span class="nm">0</span>; i <span class="op">&lt;</span> n; i<span class="op">++</span>) {`},
          {t:"blank", ph:"//   only start from reachable positions...", ans:"if (!dp[i]) continue;", hint:"If dp[i]=false, no valid segmentation reaches i — skip"},
          {t:"blank", ph:"//   walk trie from s[i], mark dp[j] when word ends...", ans:"TrieNode* node=root; for(int j=i;j<n;j++){ int k=s[j]-'a'; if(!node->children[k]) break; node=node->children[k]; if(node->isEnd) dp[j+1]=true; }", hint:"From position i, extend one char at a time. isEnd at j means s[i..j] is a dict word."},
          {t:"fixed", code:`}`},
        ]
      },
      { z:4, tag:"QUERY — dp[n] is the answer",
        lines:[
          {t:"blank", ph:"// return whether full string can be segmented...", ans:"return dp[n];", hint:"dp[n]=true means we reached the end via valid word segments"},
          {t:"fixed", code:`}`},
        ]
      },
    ]
  },

  // 04 ── XOR Maximization ───────────────────────────────────────────────────
  {
    id:4, title:"XOR Maximization", badge:"BINARY TRIE", badgeColor:"var(--c1)",
    hint:"Binary trie on integer bits (MSB first). For each query x: greedily choose opposite bit at each level. If opposite bit's child exists, go there (XOR bit=1). Else forced to same side.",
    vizNodes:["root","bit31","→0 or 1","greedy→opp","maxXOR"],
    zones:[
      { z:1, tag:"TrieNode children[2] — bit trie not char trie",
        lines:[
          {t:"blank", ph:"// binary trie node — children[0] and children[1]...", ans:"struct BitTrieNode { BitTrieNode* children[2]; BitTrieNode():children{nullptr,nullptr}{} };", hint:"Only two children: bit=0 and bit=1. Insert integers MSB first (bit 31 down to 0)."},
          {t:"blank", ph:"// trie with root...", ans:"struct XORTrie { BitTrieNode* root=new BitTrieNode();", hint:"Root represents empty prefix. All 32-bit integers inserted from MSB."},
        ]
      },
      { z:2, tag:"insert() — same shape but idx = bit not char",
        lines:[
          {t:"blank", ph:"// insert integer bit by bit, MSB first...", ans:"void insert(int num){ BitTrieNode* node=root; for(int b=31;b>=0;b--){ int bit=(num>>b)&1; if(!node->children[bit]) node->children[bit]=new BitTrieNode(); node=node->children[bit]; } }", hint:"(num>>b)&1 extracts bit b. Same walk-and-create pattern as char trie, just bit-indexed."},
        ]
      },
      { z:3, tag:"traverse() — greedy: pick OPPOSITE bit for max XOR",
        lines:[
          {t:"blank", ph:"// find max XOR of num with any inserted number...", ans:"int maxXOR(int num){ BitTrieNode* node=root; int result=0; for(int b=31;b>=0;b--){", hint:"Greedily maximize XOR bit by bit from MSB"},
          {t:"blank", ph:"//   want opposite bit to maximize XOR at this position...", ans:"int bit=(num>>b)&1; int want=1-bit;", hint:"XOR bit is 1 when bits differ. We WANT the opposite of our current bit."},
          {t:"blank", ph:"//   go to opposite if exists, else forced to same side...", ans:"if(node->children[want]){ result|=(1<<b); node=node->children[want]; } else node=node->children[bit];", hint:"Opposite child exists: XOR contributes 1 at this bit. Else: XOR contributes 0, go same side."},
          {t:"fixed", code:`    }`},
          {t:"blank", ph:"//   return max XOR...", ans:"return result; }", hint:"After 32 bits, result holds the maximum XOR achievable"},
        ]
      },
      { z:4, tag:"QUERY — insert all numbers, then query each",
        lines:[
          {t:"blank", ph:"// find maximum XOR pair in array...", ans:"int findMaximumXOR(vector<int>& nums){ XORTrie trie; for(int x:nums) trie.insert(x); int mx=0; for(int x:nums) mx=max(mx,trie.maxXOR(x)); return mx; }", hint:"Insert all, then for each num find its best XOR partner. O(32n) total."},
          {t:"fixed", code:`};`},
        ]
      },
    ]
  },

  // 05 ── Count Distinct Substrings ─────────────────────────────────────────
  {
    id:5, title:"Count Distinct Substrings", badge:"SUFFIX TRIE", badgeColor:"var(--c3)",
    hint:"Insert every suffix of the string. Each unique node (except root) represents a unique prefix of some suffix = a unique substring. Count all nodes minus root.",
    vizNodes:["root","s[0..]","s[1..]","s[2..]","→unique nodes"],
    zones:[
      { z:1, tag:"insert all suffixes — every node = unique substring",
        lines:[

// ─────────────────────────────────────────────────────────────────────────────
const zoneNames=['TrieNode Struct','insert()','traverse()','Query / Result'];
const zoneCls=['zone-1','zone-2','zone-3','zone-4'];
const zoneNums=['①','②','③','④'];
let current=0, answered=new Set(), stats={correct:0,wrong:0,streak:0};

function buildSelector(){
  const sel=document.getElementById('selector'); sel.innerHTML='';
  P.forEach((p,i)=>{
    const b=document.createElement('button');
    b.className='sel-btn'+(i===0?' active':'');
    b.textContent=`${String(i+1).padStart(2,'0')} ${p.title}`;
    b.onclick=()=>loadPattern(i); sel.appendChild(b);
  });
}

function loadPattern(idx){
  current=idx; answered=new Set();
  document.querySelectorAll('.sel-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  const p=P[idx];
  document.getElementById('tbox-title').textContent=p.title.replace(/ /g,'_')+'.cpp';
  const badge=document.getElementById('tbox-badge');
  badge.textContent=p.badge;
  badge.style.cssText=`color:${p.badgeColor};border-color:${p.badgeColor};background:${p.badgeColor}18;`;
  const zonesEl=document.getElementById('zones'); zonesEl.innerHTML='';
  p.zones.forEach((zone,zi)=>{
    const div=document.createElement('div'); div.className=`zone ${zoneCls[zi]}`;
    let html='';
    zone.lines.forEach((line,li)=>{
      if(line.t==='fixed'){
        html+=`<span class="fixed-line">${line.code}</span>`;
      } else {
        const key=`${idx}-${zi}-${li}`;
        html+=`<div class="fill-wrap"><span class="fill-indent">  </span>
          <input class="fill-input" data-key="${key}"
            data-ans="${encodeURIComponent(line.ans)}"
            data-hint="${encodeURIComponent(line.hint)}"
            placeholder="${line.ph}" autocomplete="off" spellcheck="false"
            onkeydown="handleKey(event,this)" oninput="clearState(this)"/></div>`;
      }
    });
    div.innerHTML=`
      <div class="zone-header">
        <span class="zone-num">${zoneNums[zi]}</span>
        <span class="zone-name">${zoneNames[zi]}</span>
        <span class="zone-tag">${zone.tag}</span>
      </div>
      <div class="zone-body">${html}</div>`;
    zonesEl.appendChild(div);
  });
  buildViz(p); document.getElementById('hint-row').classList.remove('show');
}

function buildViz(p){
  const viz=document.getElementById('viz');
  const nodes=p.vizNodes;
  const arrows=nodes.map((v,i)=>{
    const cls=i===0?'tn-root':i===nodes.length-1?'tn-end':'tn-mid';
    return `<div class="trie-node ${cls}">${v}</div>${i<nodes.length-1?'<span class="tn-arrow">→</span>':''}`;
  }).join('');
  viz.innerHTML=`
    <div class="trie-viz">
      <div class="trie-level">${arrows}</div>
    </div>
    <div class="viz-legend">
      <span style="color:var(--c1)">■</span> root &nbsp;
      <span style="color:var(--c2)">■</span> intermediate &nbsp;
      <span style="color:var(--c4)">■</span> isEnd (complete word) &nbsp;&nbsp;
      <span style="color:var(--c1)">★ insert: create nodes · traverse: null=prune / isEnd=terminal</span>
    </div>`;
}

function normalise(s){
  return s.trim().toLowerCase()
    .replace(/\s*([+\-*/%=<>!&|^~,;{}()\[\]])\s*/g,'$1')
    .replace(/\s+/g,' ').replace(/;+$/,'')
    .replace(/\+\+/g,'++').replace(/--/g,'--')
    .replace(/\s*->\s*/g,'->').trim();
}
function handleKey(e,el){if(e.key==='Enter')checkSingle(el);if(e.key==='Tab'){e.preventDefault();focusNext(el);}}
function clearState(el){el.classList.remove('correct','wrong','revealed');}
function checkSingle(el){
  const key=el.dataset.key; if(answered.has(key))return;
  const ans=decodeURIComponent(el.dataset.ans);
  if(normalise(el.value)===normalise(ans)){
    el.classList.add('correct');el.classList.remove('wrong');
    answered.add(key);stats.correct++;stats.streak++;
    updateScore();showToast('✓ Correct!','ok');focusNext(el);
  } else {
    el.classList.add('wrong');el.classList.remove('correct');
    stats.wrong++;stats.streak=0;updateScore();
    showToast('✗ Not quite — check hint','err');
    document.getElementById('hint-text').textContent=decodeURIComponent(el.dataset.hint);
    document.getElementById('hint-row').classList.add('show');
  }
}
function checkAll(){document.querySelectorAll('.fill-input').forEach(el=>{if(!answered.has(el.dataset.key))checkSingle(el);});}
function revealAll(){
  document.querySelectorAll('.fill-input').forEach(el=>{
    if(!answered.has(el.dataset.key)){el.value=decodeURIComponent(el.dataset.ans);el.classList.add('revealed');el.classList.remove('correct','wrong');}
  });
  showToast('Answers revealed — study, then Reset!','inf');
  document.getElementById('hint-text').textContent=P[current].hint;
  document.getElementById('hint-row').classList.add('show');
}
function resetInputs(){
  answered=new Set();
  document.querySelectorAll('.fill-input').forEach(el=>{el.value='';el.classList.remove('correct','wrong','revealed');});
  document.getElementById('hint-row').classList.remove('show');
}
function nextPattern(){loadPattern((current+1)%P.length);}
function focusNext(el){const all=Array.from(document.querySelectorAll('.fill-input'));const i=all.indexOf(el);if(i<all.length-1)all[i+1].focus();}
function updateScore(){
  document.getElementById('s-correct').textContent=stats.correct;
  document.getElementById('s-wrong').textContent=stats.wrong;
  document.getElementById('s-streak').textContent=stats.streak;
  const total=stats.correct+stats.wrong;
  document.getElementById('prog').style.width=total?Math.round(stats.correct/total*100)+'%':'0%';
}
let toastTimer;
function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast ${type} show`;
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2400);
}
buildSelector(); loadPattern(0);
</script>
