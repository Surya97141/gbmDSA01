<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Segment Tree — Practice</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0c12; --surface:#111119; --card:#15151e; --border:#23233a;
  --text:#e2e2f0; --muted:#52526e; --faint:#1e1e2e;
  --c1:#a78bfa; --c2:#38bdf8; --c3:#fb923c; --c4:#4ade80;
  --b1:rgba(167,139,250,0.08); --b2:rgba(56,189,248,0.07);
  --b3:rgba(251,146,60,0.08);  --b4:rgba(74,222,128,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(rgba(167,139,250,0.06) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;z-index:0;}
.wrap{width:100%;max-width:860px;padding:48px 24px 80px;position:relative;z-index:1;}

.hdr{text-align:center;margin-bottom:40px;}
.hdr-pill{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--c1);border:1px solid rgba(167,139,250,0.3);padding:4px 14px;border-radius:20px;margin-bottom:16px;}
.hdr h1{font-size:clamp(22px,4.5vw,48px);font-weight:800;letter-spacing:-1.5px;line-height:1;background:linear-gradient(120deg,#fff 0%,var(--c1) 40%,var(--c3) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;}
.hdr p{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);}

.selector-wrap{margin-bottom:28px;}
.selector-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.selector{display:flex;flex-wrap:wrap;gap:8px;}
.sel-btn{font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 14px;border:1px solid var(--border);background:var(--faint);color:var(--muted);border-radius:3px;cursor:pointer;transition:all .15s;user-select:none;}
.sel-btn:hover{border-color:var(--c1);color:var(--text);}
.sel-btn.active{background:rgba(167,139,250,0.1);border-color:var(--c1);color:var(--c1);}

.scorebar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:4px;}
.score-item{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;}
.score-item strong{font-size:20px;font-weight:700;color:var(--text);line-height:1;}
.score-item.good strong{color:var(--c4);} .score-item.bad strong{color:var(--c3);}
.progress-bar{flex:1;margin:0 20px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--c1);border-radius:2px;transition:width .4s;}

.template-box{background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden;box-shadow:0 0 60px rgba(167,139,250,0.04);}
.tbox-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.015);}
.tbox-title{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--c1);font-weight:600;}
.tbox-badge{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 10px;border-radius:2px;border:1px solid;}

.zone{border-bottom:1px solid var(--border);}
.zone:last-child{border-bottom:none;}
.zone-header{display:flex;align-items:center;gap:10px;padding:10px 20px 8px;}
.zone-num{font-size:18px;font-weight:800;line-height:1;font-family:'JetBrains Mono',monospace;}
.zone-name{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;opacity:.6;}
.zone-tag{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 8px;border-radius:2px;opacity:.8;text-align:right;max-width:400px;}
.zone-1{background:var(--b1)} .zone-2{background:var(--b2)} .zone-3{background:var(--b3)} .zone-4{background:var(--b4)}
.zone-1 .zone-num,.zone-1 .zone-name{color:var(--c1)} .zone-2 .zone-num,.zone-2 .zone-name{color:var(--c2)}
.zone-3 .zone-num,.zone-3 .zone-name{color:var(--c3)} .zone-4 .zone-num,.zone-4 .zone-name{color:var(--c4)}
.zone-1 .zone-tag{background:rgba(167,139,250,0.1);color:var(--c1)} .zone-2 .zone-tag{background:rgba(56,189,248,0.1);color:var(--c2)}
.zone-3 .zone-tag{background:rgba(251,146,60,0.1);color:var(--c3)} .zone-4 .zone-tag{background:rgba(74,222,128,0.1);color:var(--c4)}

.zone-body{padding:0 20px 14px 24px;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.8;}
.fixed-line{display:block;color:var(--text);white-space:pre;}

.fill-wrap{display:flex;align-items:center;margin:2px 0;}
.fill-indent{color:var(--muted);opacity:.3;font-size:12px;white-space:pre;user-select:none;}
.fill-input{background:rgba(0,0,0,0.25);border:none;border-bottom:1px dashed rgba(255,255,255,0.15);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12.5px;padding:2px 6px;width:100%;outline:none;caret-color:var(--c1);transition:border-color .2s,background .2s;border-radius:2px 2px 0 0;}
.fill-input:focus{background:rgba(167,139,250,0.06);border-bottom-color:var(--c1);}
.fill-input.correct{background:rgba(74,222,128,0.07);border-bottom-color:var(--c4)!important;color:var(--c4);}
.fill-input.wrong{background:rgba(251,146,60,0.07);border-bottom-color:var(--c3)!important;color:var(--c3);animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.fill-input.revealed{background:rgba(56,189,248,0.07);border-bottom-color:var(--c2)!important;color:var(--c2);}

.actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;}
.btn{font-family:'JetBrains Mono',monospace;font-size:11px;padding:9px 20px;border-radius:3px;cursor:pointer;border:1px solid;transition:all .15s;letter-spacing:.5px;}
.btn-check{background:rgba(167,139,250,0.1);color:var(--c1);border-color:rgba(167,139,250,0.4);}
.btn-check:hover{background:rgba(167,139,250,0.2);}
.btn-reveal{background:rgba(56,189,248,0.08);color:var(--c2);border-color:rgba(56,189,248,0.3);}
.btn-reveal:hover{background:rgba(56,189,248,0.15);}
.btn-reset{background:transparent;color:var(--muted);border-color:var(--border);}
.btn-reset:hover{color:var(--text);border-color:var(--muted);}
.btn-next{margin-left:auto;background:rgba(74,222,128,0.1);color:var(--c4);border-color:rgba(74,222,128,0.3);}
.btn-next:hover{background:rgba(74,222,128,0.18);}

.hint-row{display:none;align-items:flex-start;gap:10px;margin-top:14px;padding:10px 14px;background:rgba(167,139,250,0.05);border:1px solid rgba(167,139,250,0.15);border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--c1);line-height:1.6;}
.hint-row.show{display:flex;}

.viz-row{padding:14px 20px;border-top:1px solid var(--border);background:rgba(0,0,0,0.2);overflow-x:auto;}
.tree-viz{display:flex;flex-direction:column;gap:6px;align-items:center;}
.tree-level{display:flex;gap:6px;justify-content:center;align-items:center;}
.tree-node{font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 8px;border:1px solid;border-radius:3px;text-align:center;white-space:nowrap;}
.tn-root{border-color:var(--c1);color:var(--c1);background:rgba(167,139,250,0.1);}
.tn-mid{border-color:var(--c2);color:var(--c2);background:rgba(56,189,248,0.07);}
.tn-leaf{border-color:var(--c4);color:var(--c4);background:rgba(74,222,128,0.07);}
.tn-lazy{border-color:var(--c3);color:var(--c3);background:rgba(251,146,60,0.07);}
.tree-legend{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);line-height:2;margin-top:10px;text-align:center;}

.kw{color:#c792ea;font-weight:600} .ty{color:#82aaff} .nm{color:#f78c6c} .op{color:#ff6b35} .fn{color:#7dd3fc} .cm{color:#3d4f5c;font-style:italic}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);font-family:'JetBrains Mono',monospace;font-size:12px;padding:10px 24px;border-radius:4px;opacity:0;transition:all .3s;z-index:100;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{background:rgba(74,222,128,0.15);border:1px solid rgba(74,222,128,0.4);color:var(--c4);}
.toast.err{background:rgba(251,146,60,0.12);border:1px solid rgba(251,146,60,0.3);color:var(--c3);}
.toast.inf{background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.3);color:var(--c2);}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-pill">Pattern 15 — Practice Mode</div>
    <h1>Segment Tree</h1>
    <p>// build(merge↑) → update(3-case split) → query(3-case split) → tree IS its merge fn</p>
  </div>

  <div class="selector-wrap">
    <div class="selector-label">Select manifestation</div>
    <div class="selector" id="selector"></div>
  </div>

  <div class="scorebar">
    <div class="score-item good"><strong id="s-correct">0</strong>correct</div>
    <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
    <div class="score-item bad"><strong id="s-wrong">0</strong>wrong</div>
    <div class="score-item" style="margin-left:16px"><strong id="s-streak">0</strong>streak🔥</div>
  </div>

  <div class="template-box">
    <div class="tbox-header">
      <span class="tbox-title" id="tbox-title">TEMPLATE.cpp</span>
      <span class="tbox-badge" id="tbox-badge"></span>
    </div>
    <div id="zones"></div>
    <div class="viz-row" id="viz"></div>
  </div>

  <div class="hint-row" id="hint-row"><span>💡</span><span id="hint-text"></span></div>

  <div class="actions">
    <button class="btn btn-check"  onclick="checkAll()">Check Answers</button>
    <button class="btn btn-reveal" onclick="revealAll()">Reveal</button>
    <button class="btn btn-reset"  onclick="resetInputs()">Reset</button>
    <button class="btn btn-next"   onclick="nextPattern()">Next →</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// SEGMENT TREE — 10 Manifestations
//
// 4 Blocks:
//   ① INIT + BUILD    — tree[4n], build() with leaf assignment + pull-up merge
//   ② update()        — 3-case split: outside / inside / partial → recurse + pull-up
//   ③ query()         — 3-case split: outside / inside / partial → recurse + merge
//   ④ DRIVER          — call build, process queries, return results
//
// THE SEGMENT TREE IS ITS MERGE FUNCTION:
//   sum:  a+b   (identity=0)
//   min:  min(a,b)  (identity=INT_MAX)
//   max:  max(a,b)  (identity=INT_MIN)
//   gcd:  __gcd(a,b)  (identity=0)
//
// 3-CASE SPLIT (universal for both update and query):
//   Case 1: [l,r] ∩ [ql,qr] = ∅  → return identity / do nothing
//   Case 2: [ql,qr] ⊇ [l,r]      → return tree[node] / apply update
//   Case 3: partial overlap        → recurse both children, pull-up
//
// LAZY PROPAGATION: push_down() BEFORE recursing in both update and query
// ─────────────────────────────────────────────────────────────────────────────

const P = [

  // 01 ── Range Sum Query ────────────────────────────────────────────────────
  {
    id:1, title:"Range Sum Query", badge:"MERGE = a+b", badgeColor:"var(--c4)",
    hint:"merge = a+b, identity = 0. Build sums bottom-up. Query decomposes [l,r] into O(log n) precomputed segments.",
    vizType:"tree", vizData:{root:"sum[0..7]", mid:["sum[0..3]","sum[4..7]"], leaves:["s[0..1]","s[2..3]","s[4..5]","s[6..7]"], merge:"a+b"},
    zones:[
      { z:1, tag:"tree[4n] stores sums — build pulls sum up from children",
        lines:[
          {t:"blank", ph:"// class or struct wrapping the segment tree...", ans:"struct SegTree {", hint:"Encapsulate tree array, n, and all operations"},
          {t:"blank", ph:"// tree array size 4n + array size...", ans:"vector<long long> tree; int n;", hint:"4*n guarantees enough space for any tree shape"},
          {t:"blank", ph:"// build: leaf = arr[l], internal = left+right...", ans:"void build(vector<int>& arr, int node, int l, int r) { if(l==r){tree[node]=arr[l];return;} int mid=(l+r)/2; build(arr,2*node,l,mid); build(arr,2*node+1,mid+1,r); tree[node]=tree[2*node]+tree[2*node+1]; }", hint:"Pull-up: tree[node] = merge of children. For sum: left + right."},
        ]
      },
      { z:2, tag:"update() — 3-case split, pull-up sum after recursion",
        lines:[
          {t:"blank", ph:"// point update: set arr[idx]=val, propagate up...", ans:"void update(int node, int l, int r, int idx, long long val) {", hint:"Updates single position, fixes all ancestor sums"},
          {t:"blank", ph:"//   leaf: set value directly...", ans:"if(l==r){tree[node]=val;return;}", hint:"Base case: we've reached the target leaf"},
          {t:"blank", ph:"//   recurse into correct child, then pull-up...", ans:"int mid=(l+r)/2; if(idx<=mid) update(2*node,l,mid,idx,val); else update(2*node+1,mid+1,r,idx,val); tree[node]=tree[2*node]+tree[2*node+1];", hint:"Descend to correct side, then recompute current node's sum from children"},
          {t:"fixed", code:`}`},
        ]
      },
      { z:3, tag:"query() — 3-case split returns sum of [ql,qr]",
        lines:[
          {t:"blank", ph:"// range sum query...", ans:"long long query(int node, int l, int r, int ql, int qr) {", hint:"Returns sum of arr[ql..qr]"},
          {t:"blank", ph:"//   case 1: completely outside — return identity...", ans:"if(qr<l||r<ql) return 0;", hint:"No overlap with query range — contribute nothing (sum identity = 0)"},
          {t:"blank", ph:"//   case 2: completely inside — return stored value...", ans:"if(ql<=l&&r<=qr) return tree[node];", hint:"This segment fully covered by query — return precomputed answer"},
          {t:"blank", ph:"//   case 3: partial — recurse both children, combine...", ans:"int mid=(l+r)/2; return query(2*node,l,mid,ql,qr)+query(2*node+1,mid+1,r,ql,qr);", hint:"Partial overlap: split and recurse. Sum = left result + right result."},
          {t:"fixed", code:`};`},
        ]
      },
      { z:4, tag:"DRIVER — build once, then O(log n) per query/update",
        lines:[
          {t:"blank", ph:"// driver: init + build...", ans:"SegTree st; st.n=nums.size(); st.tree.assign(4*st.n,0); st.build(nums,1,0,st.n-1);", hint:"Root at index 1. Range [0, n-1]. Build is O(n)."},
          {t:"blank", ph:"// example: query sum of [l,r]...", ans:"long long ans = st.query(1,0,st.n-1,l,r);", hint:"Every query/update starts at node=1, full range [0,n-1]"},
        ]
      },
    ]
  },

  // 02 ── Range Min Query ────────────────────────────────────────────────────
  {
    id:2, title:"Range Min/Max Query", badge:"MERGE = min(a,b)", badgeColor:"var(--c2)",
    hint:"Only the merge function and identity change vs sum. Min: merge=min(a,b), identity=INT_MAX. Max: merge=max(a,b), identity=INT_MIN. Everything else identical.",
    vizType:"tree", vizData:{root:"min[0..7]", mid:["min[0..3]","min[4..7]"], leaves:["m[0..1]","m[2..3]","m[4..5]","m[6..7]"], merge:"min(a,b)"},
    zones:[
      { z:1, tag:"tree stores minimums — only merge() differs from sum tree",
        lines:[
          {t:"blank", ph:"// segment tree storing range minimums...", ans:"struct MinSegTree { vector<int> tree; int n;", hint:"Identical structure to sum tree — only merge and identity change"},
          {t:"blank", ph:"// build: leaf=arr[l], internal=min of children...", ans:"void build(vector<int>& arr, int node, int l, int r) { if(l==r){tree[node]=arr[l];return;} int mid=(l+r)/2; build(arr,2*node,l,mid); build(arr,2*node+1,mid+1,r); tree[node]=min(tree[2*node],tree[2*node+1]); }", hint:"Pull-up uses min() instead of +. This single change defines the tree's purpose."},
        ]
      },
      { z:2, tag:"update() — identical structure, pull-up uses min()",
        lines:[
          {t:"blank", ph:"// point update — propagate minimum upward...", ans:"void update(int node, int l, int r, int idx, int val) { if(l==r){tree[node]=val;return;} int mid=(l+r)/2; if(idx<=mid) update(2*node,l,mid,idx,val); else update(2*node+1,mid+1,r,idx,val); tree[node]=min(tree[2*node],tree[2*node+1]); }", hint:"Identical to sum update except pull-up uses min() not +"},
        ]
      },
      { z:3, tag:"query() — identity is INT_MAX for min, INT_MIN for max",
        lines:[
          {t:"blank", ph:"// range min query...", ans:"int query(int node, int l, int r, int ql, int qr) {", hint:"Returns minimum of arr[ql..qr]"},
          {t:"blank", ph:"//   outside: return identity for min (INT_MAX won't affect min())...", ans:"if(qr<l||r<ql) return INT_MAX;", hint:"Identity for min: INT_MAX. min(x, INT_MAX) = x — doesn't affect the answer"},
          {t:"blank", ph:"//   inside: return stored minimum...", ans:"if(ql<=l&&r<=qr) return tree[node];", hint:"Segment fully covered — precomputed minimum is valid"},
          {t:"blank", ph:"//   partial: recurse and take min of both halves...", ans:"int mid=(l+r)/2; return min(query(2*node,l,mid,ql,qr),query(2*node+1,mid+1,r,ql,qr));", hint:"Combine with min() — same 3-case pattern, different combiner"},
          {t:"fixed", code:`} };`},
        ]
      },
      { z:4, tag:"DRIVER — swap min↔max to get max segment tree",
        lines:[
          {t:"blank", ph:"// for MAX tree: swap INT_MAX→INT_MIN and min()→max() in query...", ans:"// max query outside identity: INT_MIN. pull-up: max(left,right). combine: max(l,r).", hint:"Three substitutions turn a min tree into a max tree — everything else unchanged"},
          {t:"blank", ph:"// driver same as sum tree...", ans:"MinSegTree st; st.n=nums.size(); st.tree.assign(4*st.n,INT_MAX); st.build(nums,1,0,st.n-1);", hint:"Initialize tree array with identity value (INT_MAX for min tree)"},
        ]
      },
    ]
  },

  // 03 ── Point Update ───────────────────────────────────────────────────────
  {
    id:3, title:"Point Update", badge:"UPDATE + QUERY", badgeColor:"var(--c3)",
    hint:"Point update: walk down to leaf, update, pull-up all ancestors. O(log n). Then range query as usual. The pull-up is what propagates the change upward.",
    vizType:"tree", vizData:{root:"recomputed", mid:["recomputed","unchanged"], leaves:["updated!","...","...","..."], merge:"pull-up↑"},
    zones:[
      { z:1, tag:"combined point update + range query class",
        lines:[
          {t:"blank", ph:"// segment tree supporting point updates + range sum queries...", ans:"struct PointUpdateST { vector<long long> tree; int n;", hint:"Most common segment tree variant — update a single cell, query a range"},
          {t:"blank", ph:"// build from initial array...", ans:"void build(vector<int>& a, int nd, int l, int r){ if(l==r){tree[nd]=a[l];return;} int m=(l+r)/2; build(a,2*nd,l,m); build(a,2*nd+1,m+1,r); tree[nd]=tree[2*nd]+tree[2*nd+1]; }", hint:"Standard build — O(n). All future updates maintain this structure."},
        ]
      },
      { z:2, tag:"update() — O(log n): walk to leaf, pull-up all ancestors",
        lines:[
          {t:"blank", ph:"// point update at position pos with new value val...", ans:"void update(int nd, int l, int r, int pos, long long val){", hint:"Modifies single position and restores tree invariant"},
          {t:"blank", ph:"//   reached the target leaf...", ans:"if(l==r){ tree[nd]=val; return; }", hint:"Set the leaf. All ancestor sums will be fixed on the way back up."},
          {t:"blank", ph:"//   descend to correct child...", ans:"int m=(l+r)/2; if(pos<=m) update(2*nd,l,m,pos,val); else update(2*nd+1,m+1,r,pos,val);", hint:"Binary search: go left if pos ≤ mid, right otherwise"},
          {t:"blank", ph:"//   PULL-UP: recompute this node from updated children...", ans:"tree[nd]=tree[2*nd]+tree[2*nd+1];", hint:"Pull-up on the way back up the recursion — restores all ancestor values"},
          {t:"fixed", code:`}`},
        ]
      },
      { z:3, tag:"query() — identical 3-case split",
        lines:[
          {t:"blank", ph:"// range sum query — same as before...", ans:"long long query(int nd, int l, int r, int ql, int qr){", hint:"Unchanged from basic range sum — update doesn't affect query logic"},
          {t:"blank", ph:"//   3-case split...", ans:"if(qr<l||r<ql) return 0; if(ql<=l&&r<=qr) return tree[nd]; int m=(l+r)/2; return query(2*nd,l,m,ql,qr)+query(2*nd+1,m+1,r,ql,qr);", hint:"Outside→0, inside→tree[nd], partial→recurse+combine. Always this structure."},
          {t:"fixed", code:`} };`},
        ]
      },
      { z:4, tag:"DRIVER — update then query, both O(log n)",
        lines:[
          {t:"blank", ph:"// init + build...", ans:"PointUpdateST st; st.n=n; st.tree.assign(4*n,0); st.build(arr,1,0,n-1);", hint:"Build is O(n). All subsequent updates and queries are O(log n)."},
          {t:"blank", ph:"// point update then range query...", ans:"st.update(1,0,n-1,pos,newVal); long long ans=st.query(1,0,n-1,ql,qr);", hint:"Both calls start at root (node=1) with full range [0,n-1]"},
        ]
      },
    ]
  },

  // 04 ── Range Update + Point Query ────────────────────────────────────────
  {
    id:4, title:"Range Update + Point Query", badge:"ADD DELTA TO RANGE", badgeColor:"var(--c1)",

function buildSelector(){
  const sel=document.getElementById('selector'); sel.innerHTML='';
  P.forEach((p,i)=>{
    const b=document.createElement('button');
    b.className='sel-btn'+(i===0?' active':'');
    b.textContent=`${String(i+1).padStart(2,'0')} ${p.title}`;
    b.onclick=()=>loadPattern(i); sel.appendChild(b);
  });
}

function loadPattern(idx){
  current=idx; answered=new Set();
  document.querySelectorAll('.sel-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  const p=P[idx];
  document.getElementById('tbox-title').textContent=p.title.replace(/ /g,'_')+'.cpp';
  const badge=document.getElementById('tbox-badge');
  badge.textContent=p.badge;
  badge.style.cssText=`color:${p.badgeColor};border-color:${p.badgeColor};background:${p.badgeColor}18;`;
  const zonesEl=document.getElementById('zones'); zonesEl.innerHTML='';
  p.zones.forEach((zone,zi)=>{
    const div=document.createElement('div'); div.className=`zone ${zoneCls[zi]}`;
    let html='';
    zone.lines.forEach((line,li)=>{
      if(line.t==='fixed'){
        html+=`<span class="fixed-line">${line.code}</span>`;
      } else {
        const key=`${idx}-${zi}-${li}`;
        html+=`<div class="fill-wrap"><span class="fill-indent">  </span>
          <input class="fill-input" data-key="${key}"
            data-ans="${encodeURIComponent(line.ans)}"
            data-hint="${encodeURIComponent(line.hint)}"
            placeholder="${line.ph}" autocomplete="off" spellcheck="false"
            onkeydown="handleKey(event,this)" oninput="clearState(this)"/></div>`;
      }
    });
    div.innerHTML=`
      <div class="zone-header">
        <span class="zone-num">${zoneNums[zi]}</span>
        <span class="zone-name">${zoneNames[zi]}</span>
        <span class="zone-tag">${zone.tag}</span>
      </div>
      <div class="zone-body">${html}</div>`;
    zonesEl.appendChild(div);
  });
  buildViz(p);
  document.getElementById('hint-row').classList.remove('show');
}

function buildViz(p){
  const viz=document.getElementById('viz');
  const d=p.vizData;
  const isLazy=p.vizType==='lazy';
  const rootCls=isLazy?'tn-lazy':'tn-root';
  const midCls='tn-mid';
  const leafCls=isLazy?'tn-lazy':'tn-leaf';

  viz.innerHTML=`
    <div class="tree-viz">
      <div class="tree-level">
        <div class="tree-node ${rootCls}">${d.root}</div>
      </div>
      <div class="tree-level">
        ${d.mid.map(v=>`<div class="tree-node ${midCls}">${v}</div>`).join('')}
      </div>
      <div class="tree-level">
        ${d.leaves.map(v=>`<div class="tree-node ${leafCls}">${v}</div>`).join('')}
      </div>
      <div class="tree-legend">
        <span style="color:var(--c1)">★ merge fn: <strong>${d.merge}</strong></span> &nbsp;|&nbsp;
        <span style="color:var(--c3)">3-case split: outside→identity · inside→tree[nd] · partial→recurse</span>
      </div>
    </div>`;
}

function normalise(s){
  return s.trim().toLowerCase()
    .replace(/\s*([+\-*/%=<>!&|^~,;{}()\[\]])\s*/g,'$1')
    .replace(/\s+/g,' ').replace(/;+$/,'')
    .replace(/\+\+/g,'++').replace(/--/g,'--')
    .replace(/\s*->\s*/g,'->').trim();
}
function handleKey(e,el){if(e.key==='Enter')checkSingle(el);if(e.key==='Tab'){e.preventDefault();focusNext(el);}}
function clearState(el){el.classList.remove('correct','wrong','revealed');}
function checkSingle(el){
  const key=el.dataset.key; if(answered.has(key))return;
  const ans=decodeURIComponent(el.dataset.ans);
  if(normalise(el.value)===normalise(ans)){
    el.classList.add('correct');el.classList.remove('wrong');
    answered.add(key);stats.correct++;stats.streak++;
    updateScore();showToast('✓ Correct!','ok');focusNext(el);
  } else {
    el.classList.add('wrong');el.classList.remove('correct');
    stats.wrong++;stats.streak=0;updateScore();
    showToast('✗ Not quite — check hint','err');
    document.getElementById('hint-text').textContent=decodeURIComponent(el.dataset.hint);
    document.getElementById('hint-row').classList.add('show');
  }
}
function checkAll(){document.querySelectorAll('.fill-input').forEach(el=>{if(!answered.has(el.dataset.key))checkSingle(el);});}
function revealAll(){
  document.querySelectorAll('.fill-input').forEach(el=>{
    if(!answered.has(el.dataset.key)){el.value=decodeURIComponent(el.dataset.ans);el.classList.add('revealed');el.classList.remove('correct','wrong');}
  });
  showToast('Answers revealed — study, then Reset!','inf');
  document.getElementById('hint-text').textContent=P[current].hint;
  document.getElementById('hint-row').classList.add('show');
}
function resetInputs(){
  answered=new Set();
  document.querySelectorAll('.fill-input').forEach(el=>{el.value='';el.classList.remove('correct','wrong','revealed');});
  document.getElementById('hint-row').classList.remove('show');
}
function nextPattern(){loadPattern((current+1)%P.length);}
function focusNext(el){const all=Array.from(document.querySelectorAll('.fill-input'));const i=all.indexOf(el);if(i<all.length-1)all[i+1].focus();}
function updateScore(){
  document.getElementById('s-correct').textContent=stats.correct;
  document.getElementById('s-wrong').textContent=stats.wrong;
  document.getElementById('s-streak').textContent=stats.streak;
  const total=stats.correct+stats.wrong;
  document.getElementById('prog').style.width=total?Math.round(stats.correct/total*100)+'%':'0%';
}
let toastTimer;
function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast ${type} show`;
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2400);
}
buildSelector(); loadPattern(0);
</script>
</body>
</html>
