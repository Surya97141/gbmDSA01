<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Queue — Practice</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0c12; --surface:#111119; --card:#15151e; --border:#23233a;
  --text:#e2e2f0; --muted:#52526e; --faint:#1e1e2e;
  --c1:#a78bfa; --c2:#38bdf8; --c3:#fb923c; --c4:#4ade80;
  --b1:rgba(167,139,250,0.08); --b2:rgba(56,189,248,0.07);
  --b3:rgba(251,146,60,0.08);  --b4:rgba(74,222,128,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(rgba(56,189,248,0.07) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;z-index:0;}
.wrap{width:100%;max-width:860px;padding:48px 24px 80px;position:relative;z-index:1;}

.hdr{text-align:center;margin-bottom:40px;}
.hdr-pill{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--c2);border:1px solid rgba(56,189,248,0.3);padding:4px 14px;border-radius:20px;margin-bottom:16px;}
.hdr h1{font-size:clamp(22px,4.5vw,48px);font-weight:800;letter-spacing:-1.5px;line-height:1;background:linear-gradient(120deg,#fff 0%,var(--c2) 40%,var(--c4) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;}
.hdr p{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);}

.selector-wrap{margin-bottom:28px;}
.selector-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.selector{display:flex;flex-wrap:wrap;gap:8px;}
.sel-btn{font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 14px;border:1px solid var(--border);background:var(--faint);color:var(--muted);border-radius:3px;cursor:pointer;transition:all .15s;user-select:none;}
.sel-btn:hover{border-color:var(--c2);color:var(--text);}
.sel-btn.active{background:rgba(56,189,248,0.1);border-color:var(--c2);color:var(--c2);}

.scorebar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:4px;}
.score-item{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;}
.score-item strong{font-size:20px;font-weight:700;color:var(--text);line-height:1;}
.score-item.good strong{color:var(--c4);} .score-item.bad strong{color:var(--c3);}
.progress-bar{flex:1;margin:0 20px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--c2);border-radius:2px;transition:width .4s;}

.template-box{background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden;box-shadow:0 0 60px rgba(56,189,248,0.04);}
.tbox-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.015);}
.tbox-title{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--c2);font-weight:600;}
.tbox-badge{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 10px;border-radius:2px;border:1px solid;}

.zone{border-bottom:1px solid var(--border);}
.zone:last-child{border-bottom:none;}
.zone-header{display:flex;align-items:center;gap:10px;padding:10px 20px 8px;}
.zone-num{font-size:18px;font-weight:800;line-height:1;font-family:'JetBrains Mono',monospace;}
.zone-name{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;opacity:.6;}
.zone-tag{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 8px;border-radius:2px;opacity:.8;text-align:right;max-width:380px;}
.zone-1{background:var(--b1)} .zone-2{background:var(--b2)} .zone-3{background:var(--b3)} .zone-4{background:var(--b4)}
.zone-1 .zone-num,.zone-1 .zone-name{color:var(--c1)} .zone-2 .zone-num,.zone-2 .zone-name{color:var(--c2)}
.zone-3 .zone-num,.zone-3 .zone-name{color:var(--c3)} .zone-4 .zone-num,.zone-4 .zone-name{color:var(--c4)}
.zone-1 .zone-tag{background:rgba(167,139,250,0.1);color:var(--c1)} .zone-2 .zone-tag{background:rgba(56,189,248,0.1);color:var(--c2)}
.zone-3 .zone-tag{background:rgba(251,146,60,0.1);color:var(--c3)} .zone-4 .zone-tag{background:rgba(74,222,128,0.1);color:var(--c4)}

.zone-body{padding:0 20px 14px 24px;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.8;}
.fixed-line{display:block;color:var(--text);white-space:pre;}
.cm{color:#3d4f5c;font-style:italic;}

.fill-wrap{display:flex;align-items:center;margin:2px 0;}
.fill-indent{color:var(--muted);opacity:.3;font-size:12px;white-space:pre;user-select:none;}
.fill-input{background:rgba(0,0,0,0.25);border:none;border-bottom:1px dashed rgba(255,255,255,0.15);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12.5px;padding:2px 6px;width:100%;outline:none;caret-color:var(--c2);transition:border-color .2s,background .2s;border-radius:2px 2px 0 0;}
.fill-input:focus{background:rgba(56,189,248,0.06);border-bottom-color:var(--c2);}
.fill-input.correct{background:rgba(74,222,128,0.07);border-bottom-color:var(--c4)!important;color:var(--c4);}
.fill-input.wrong{background:rgba(251,146,60,0.07);border-bottom-color:var(--c3)!important;color:var(--c3);animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.fill-input.revealed{background:rgba(167,139,250,0.07);border-bottom-color:var(--c1)!important;color:var(--c1);}

.actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;}
.btn{font-family:'JetBrains Mono',monospace;font-size:11px;padding:9px 20px;border-radius:3px;cursor:pointer;border:1px solid;transition:all .15s;letter-spacing:.5px;}
.btn-check{background:rgba(56,189,248,0.1);color:var(--c2);border-color:rgba(56,189,248,0.4);}
.btn-check:hover{background:rgba(56,189,248,0.2);}
.btn-reveal{background:rgba(167,139,250,0.08);color:var(--c1);border-color:rgba(167,139,250,0.3);}
.btn-reveal:hover{background:rgba(167,139,250,0.15);}
.btn-reset{background:transparent;color:var(--muted);border-color:var(--border);}
.btn-reset:hover{color:var(--text);border-color:var(--muted);}
.btn-next{margin-left:auto;background:rgba(74,222,128,0.1);color:var(--c4);border-color:rgba(74,222,128,0.3);}
.btn-next:hover{background:rgba(74,222,128,0.18);}

.hint-row{display:none;align-items:flex-start;gap:10px;margin-top:14px;padding:10px 14px;background:rgba(56,189,248,0.05);border:1px solid rgba(56,189,248,0.15);border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--c2);line-height:1.6;}
.hint-row.show{display:flex;}

.viz-row{display:flex;align-items:flex-start;gap:16px;padding:12px 20px;border-top:1px solid var(--border);background:rgba(0,0,0,0.2);overflow-x:auto;flex-wrap:wrap;}
.viz-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);flex-shrink:0;padding-top:6px;}
.q-viz{display:flex;align-items:center;gap:3px;}
.q-cell{font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 10px;border:1px solid var(--border);border-radius:3px;color:var(--muted);white-space:nowrap;}
.q-cell.front{border-color:var(--c3);color:var(--c3);background:rgba(251,146,60,0.08);}
.q-cell.mid{border-color:var(--c2);color:var(--c2);background:rgba(56,189,248,0.07);}
.q-cell.back{border-color:var(--c4);color:var(--c4);background:rgba(74,222,128,0.07);}
.q-arrow{color:var(--muted);font-size:14px;padding:0 2px;}

.kw{color:#c792ea;font-weight:600} .ty{color:#82aaff} .nm{color:#f78c6c} .op{color:#ff6b35} .vr{color:#eeffff} .fn{color:#7dd3fc}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);font-family:'JetBrains Mono',monospace;font-size:12px;padding:10px 24px;border-radius:4px;opacity:0;transition:all .3s;z-index:100;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{background:rgba(74,222,128,0.15);border:1px solid rgba(74,222,128,0.4);color:var(--c4);}
.toast.err{background:rgba(251,146,60,0.12);border:1px solid rgba(251,146,60,0.3);color:var(--c3);}
.toast.inf{background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.3);color:var(--c1);}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-pill">Pattern 10 — Practice Mode</div>
    <h1>Queue</h1>
    <p>// seed → pop front → generate next → extract result · FIFO order IS the answer</p>
  </div>

  <div class="selector-wrap">
    <div class="selector-label">Select manifestation</div>
    <div class="selector" id="selector"></div>
  </div>

  <div class="scorebar">
    <div class="score-item good"><strong id="s-correct">0</strong>correct</div>
    <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
    <div class="score-item bad"><strong id="s-wrong">0</strong>wrong</div>
    <div class="score-item" style="margin-left:16px"><strong id="s-streak">0</strong>streak🔥</div>
  </div>

  <div class="template-box">
    <div class="tbox-header">
      <span class="tbox-title" id="tbox-title">TEMPLATE.cpp</span>
      <span class="tbox-badge" id="tbox-badge"></span>
    </div>
    <div id="zones"></div>
    <div class="viz-row" id="viz"></div>
  </div>

  <div class="hint-row" id="hint-row"><span>💡</span><span id="hint-text"></span></div>

  <div class="actions">
    <button class="btn btn-check"  onclick="checkAll()">Check Answers</button>
    <button class="btn btn-reveal" onclick="revealAll()">Reveal</button>
    <button class="btn btn-reset"  onclick="resetInputs()">Reset</button>
    <button class="btn btn-next"   onclick="nextPattern()">Next →</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// QUEUE — 10 Manifestations
// 4 Blocks:
//   ① INIT + SEED      — queue<T> + mark/record initial state + edge guards
//   ② POP + PROCESS    — while(!q.empty()){ curr=front; pop; work on curr }
//   ③ GENERATE + PUSH  — what neighbors/children/states get enqueued + condition
//   ④ EXTRACT RESULT   — answer built during loop: distance, level, max, time
// ─────────────────────────────────────────────────────────────────────────────

const P = [

  // 01 ── BFS Traversal ──────────────────────────────────────────────────────
  {
    id:1, title:"BFS Traversal", badge:"GRAPH", badgeColor:"var(--c2)",
    viz:['src','nb1','nb2','nb3','...'],
    hint:"Seed with source. Mark visited ON PUSH. Pop front, push all unvisited neighbors. dist[nb] = dist[curr]+1.",
    zones:[
      { z:1, tag:"queue<int> + dist array seeds BFS",
        lines:[
          {t:"blank", ph:"// function signature...", ans:"vector<int> bfsTraversal(int n, int src, vector<vector<int>>& graph) {", hint:"Returns dist[] from src to every reachable node. -1 = unreachable."},
          {t:"blank", ph:"// dist array — -1 means unvisited...", ans:"vector<int> dist(n, -1);", hint:"dist doubles as visited array: -1 means not yet reached"},
          {t:"fixed", code:`<span class="ty">queue</span><span class="op">&lt;</span><span class="ty">int</span><span class="op">&gt;</span> q;`},
          {t:"blank", ph:"// seed queue + mark source distance 0 ON PUSH...", ans:"q.push(src); dist[src] = 0;", hint:"Golden rule: mark visited when pushing, not when popping"},
        ]
      },
      { z:2, tag:"FIXED — pop front, process current node",
        lines:[
          {t:"fixed", code:`<span class="kw">while</span> (!q.empty()) {`},
          {t:"blank", ph:"//   pop front...", ans:"int curr = q.front(); q.pop();", hint:"FIFO: process nodes in exact order they were discovered"},
        ]
      },
      { z:3, tag:"GENERATE — push all unvisited neighbors",
        lines:[
          {t:"fixed", code:`    <span class="kw">for</span> (<span class="ty">int</span> nb : graph[curr]) {`},
          {t:"blank", ph:"//     unvisited neighbor — set dist and push...", ans:"if (dist[nb] == -1) { dist[nb] = dist[curr] + 1; q.push(nb); }", hint:"Mark and push in one step — guarantees shortest path in unweighted graph"},
          {t:"fixed", code:`    }`},
          {t:"fixed", code:`}`},
        ]
      },
      { z:4, tag:"RESULT — dist array filled during traversal",
        lines:[
          {t:"blank", ph:"// dist[] holds shortest distances from src...", ans:"return dist;", hint:"BFS guarantees dist[i] = shortest hop count from src to i"},
          {t:"fixed", code:`}`},
        ]
      },
    ]
  },

  // 02 ── Level Order Tree Traversal ────────────────────────────────────────
  {
    id:2, title:"Level Order Traversal", badge:"TREE LEVELS", badgeColor:"var(--c4)",
    viz:['root','L1a','L1b','L2a','L2b'],
    hint:"Snapshot queue size at start of each level. Process exactly that many nodes — they all belong to the same depth.",
    zones:[
      { z:1, tag:"queue<TreeNode*> seeded with root",
        lines:[
          {t:"blank", ph:"// function signature...", ans:"vector<vector<int>> levelOrder(TreeNode* root) {", hint:"Returns 2D vector — result[i] = all node values at depth i"},
          {t:"blank", ph:"// edge case — empty tree...", ans:"if (!root) return {};", hint:"Nothing to traverse"},
          {t:"blank", ph:"// result container + queue seeded with root...", ans:"vector<vector<int>> result; queue<TreeNode*> q; q.push(root);", hint:"No visited needed for trees — no cycles"},
        ]
      },
      { z:2, tag:"FIXED — outer loop per level, inner loop processes level",
        lines:[
          {t:"fixed", code:`<span class="kw">while</span> (!q.empty()) {`},
          {t:"blank", ph:"//   snapshot: all nodes currently in queue = same level...", ans:"int sz = q.size(); vector<int> level;", hint:"sz captures exactly how many nodes belong to the current level"},
          {t:"fixed", code:`    <span class="kw">for</span> (<span class="ty">int</span> i <span class="op">=</span> <span class="nm">0</span>; i <span class="op">&lt;</span> sz; i<span class="op">++</span>) {`},
          {t:"blank", ph:"//     pop and record value...", ans:"auto curr = q.front(); q.pop(); level.push_back(curr->val);", hint:"Process exactly sz nodes — all at the same depth"},
        ]
      },
      { z:3, tag:"GENERATE — push children for next level",
        lines:[
          {t:"blank", ph:"//     push left child if exists...", ans:"if (curr->left)  q.push(curr->left);", hint:"Left child enters queue for the next level"},
          {t:"blank", ph:"//     push right child if exists...", ans:"if (curr->right) q.push(curr->right);", hint:"Right child enters queue for the next level"},
          {t:"fixed", code:`    }`},
          {t:"blank", ph:"//   save completed level...", ans:"result.push_back(level);", hint:"Current level fully collected — add to result"},
          {t:"fixed", code:`}`},
        ]
      },
      { z:4, tag:"RESULT — 2D level-by-level collection",
        lines:[
          {t:"blank", ph:"// return levels...", ans:"return result;", hint:"result[0]=root level, result[1]=depth 1, etc."},
          {t:"fixed", code:`}`},
        ]
      },
    ]
  },

  // 03 ── Sliding Window Maximum ─────────────────────────────────────────────
  {
    id:3, title:"Sliding Window Maximum", badge:"MONOTONE DEQUE", badgeColor:"var(--c3)",
    hint:"Deque maintains indices in DECREASING value order. Front = window max. Pop front if outside window. Pop back if back value <= current (dominated).",
    zones:[
      { z:1, tag:"deque<int> holds indices in decreasing value order",
        lines:[
          {t:"blank", ph:"// function signature...", ans:"vector<int> maxSlidingWindow(vector<int>& nums, int k) {", hint:"Returns max value in each sliding window of size k"},
          {t:"blank", ph:"// edge case...", ans:"if (nums.empty() || k == 0) return {};", hint:"Guard empty input or zero window"},
          {t:"blank", ph:"// deque stores INDICES (not values) in decreasing value order...", ans:"deque<int> dq; vector<int> result;", hint:"Indices let us check if front is still within window bounds"},
        ]
      },
      { z:2, tag:"FIXED — sweep all elements left to right",
        lines:[
          {t:"fixed", code:`<span class="kw">for</span> (<span class="ty">int</span> i <span class="op">=</span> <span class="nm">0</span>; i <span class="op">&lt;</span> (<span class="ty">int</span>)nums.size(); i<span class="op">++</span>) {`},
          {t:"blank", ph:"//   pop front if it's outside current window...", ans:"while (!dq.empty() && dq.front() < i - k + 1) dq.pop_front();", hint:"Front index too old — it's outside the window [i-k+1, i]"},
        ]
      },
      { z:3, tag:"GENERATE — pop back if dominated, then push current",
        lines:[
          {t:"blank", ph:"//   pop back while back value <= current (dominated)...", ans:"while (!dq.empty() && nums[dq.back()] <= nums[i]) dq.pop_back();", hint:"Back element can never be a max while nums[i] is in window — remove it"},
          {t:"blank", ph:"//   push current index...", ans:"dq.push_back(i);", hint:"Current index joins deque as potential future maximum"},
        ]
      },
      { z:4, tag:"RESULT — front of deque = current window max",
        lines:[
          {t:"blank", ph:"//   record max once first full window reached...", ans:"if (i >= k - 1) result.push_back(nums[dq.front()]);", hint:"Window complete when i reaches k-1. Front = largest index in window = max."},
          {t:"fixed", code:`}`},
          {t:"blank", ph:"// return window maximums...", ans:"return result;", hint:"result[i] = max of window [i, i+k-1] for each valid window"},
          {t:"fixed", code:`}`},
        ]
      },
    ]
  },

  // 04 ── First Non-Repeating Character ─────────────────────────────────────
  {
    id:4, title:"First Non-Repeating Character", badge:"STREAM", badgeColor:"var(--c1)",
    hint:"Queue maintains candidate order. Freq map tracks counts. When freq[front] > 1, that char is now repeating — pop it. Front = answer.",
    zones:[
      { z:1, tag:"queue<char> maintains insertion order of candidates",
        lines:[
          {t:"blank", ph:"// function signature — process character stream...", ans:"vector<char> firstNonRepeating(string stream) {", hint:"For each prefix of stream, return first non-repeating char or '#'"},
          {t:"blank", ph:"// frequency map + queue tracking order...", ans:"unordered_map<char,int> freq; queue<char> q;", hint:"freq tracks how many times each char seen. Queue tracks arrival order."},
          {t:"blank", ph:"// result for each position...", ans:"vector<char> result;", hint:"result[i] = first non-repeating char after processing stream[0..i]"},
        ]
      },
      { z:2, tag:"FIXED — process each incoming character",
        lines:[
          {t:"fixed", code:`<span class="kw">for</span> (<span class="ty">char</span> c : stream) {`},
          {t:"blank", ph:"//   update frequency + push to queue...", ans:"freq[c]++; q.push(c);", hint:"Count this char and add to candidate queue"},
        ]
      },
      { z:3, tag:"GENERATE — drain front while it has become repeating",
        lines:[
          {t:"blank", ph:"//   pop front while front char is now repeating...", ans:"while (!q.empty() && freq[q.front()] > 1) q.pop();", hint:"Front is no longer unique — it was seen again. Drain until unique front found."},
        ]
      },
      { z:4, tag:"RESULT — front is first non-repeating, or '#'",
        lines:[
          {t:"blank", ph:"//   record answer: front if exists, else '#'...", ans:"result.push_back(q.empty() ? '#' : q.front());", hint:"'#' signals no non-repeating character exists in stream so far"},
          {t:"fixed", code:`}`},
          {t:"blank", ph:"// return answer for each stream position...", ans:"return result;", hint:"result[i] = first non-repeating char after processing i+1 characters"},
          {t:"fixed", code:`}`},
        ]
      },
    ]
  },

  // 05 ── Circular Queue ─────────────────────────────────────────────────────
  {
    id:5, title:"Circular Queue", badge:"FIXED BUFFER", badgeColor:"var(--c2)",
    hint:"head and tail are indices into a fixed array. Use modular arithmetic: (idx+1)%capacity. size tracks occupancy. Full when size==capacity.",
    zones:[
      { z:1, tag:"fixed array + head/tail pointers + size counter",
        lines:[
          {t:"blank", ph:"// class definition...", ans:"class CircularQueue {", hint:"Data structure implementation — not an algorithm"},
          {t:"blank", ph:"// fixed buffer + pointers + size...", ans:"vector<int> buf; int head, tail, sz, cap;", hint:"buf=storage, head=front index, tail=next write index, sz=current count, cap=max"},
          {t:"blank", ph:"// constructor — initialise all...", ans:"public: CircularQueue(int k) : buf(k), head(0), tail(0), sz(0), cap(k) {}", hint:"k = capacity. head and tail both start at 0. Size starts at 0."},
        ]
      },
      { z:2, tag:"enqueue — write at tail, advance tail mod capacity",
        lines:[
          {t:"blank", ph:"// enqueue — return false if full...", ans:"bool enqueue(int val) {", hint:"Adds element to rear. Returns false if queue is full."},
          {t:"blank", ph:"//   full check...", ans:"if (sz == cap) return false;", hint:"Can't enqueue into a full circular queue"},
          {t:"blank", ph:"//   write at tail, advance tail with wrap...", ans:"buf[tail] = val; tail = (tail + 1) % cap; sz++; return true;", hint:"Modular increment wraps tail from cap-1 back to 0"},
          {t:"fixed", code:`}`},
        ]
      },
      { z:3, tag:"dequeue — read from head, advance head mod capacity",
        lines:[
          {t:"blank", ph:"// dequeue — return false if empty...", ans:"bool dequeue() {", hint:"Removes element from front. Returns false if empty."},
          {t:"blank", ph:"//   empty check...", ans:"if (sz == 0) return false;", hint:"Nothing to dequeue from empty queue"},
          {t:"blank", ph:"//   advance head with wrap, decrement size...", ans:"head = (head + 1) % cap; sz--; return true;", hint:"Modular increment wraps head from cap-1 back to 0"},
          {t:"fixed", code:`}`},
        ]
      },
      { z:4, tag:"front/rear/isEmpty/isFull accessors",
        lines:[

// ─────────────────────────────────────────────────────────────────────────────
const zoneNames = ['Init + Seed','Pop + Process Front','Generate + Push Next','Extract Result'];
const zoneCls   = ['zone-1','zone-2','zone-3','zone-4'];
const zoneNums  = ['①','②','③','④'];
let current=0, answered=new Set(), stats={correct:0,wrong:0,streak:0};

function buildSelector(){
  const sel=document.getElementById('selector');
  sel.innerHTML='';
  P.forEach((p,i)=>{
    const b=document.createElement('button');
    b.className='sel-btn'+(i===0?' active':'');
    b.textContent=`${String(i+1).padStart(2,'0')} ${p.title}`;
    b.onclick=()=>loadPattern(i);
    sel.appendChild(b);
  });
}

function loadPattern(idx){
  current=idx; answered=new Set();
  document.querySelectorAll('.sel-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  const p=P[idx];
  document.getElementById('tbox-title').textContent=p.title.replace(/ /g,'_')+'.cpp';
  const badge=document.getElementById('tbox-badge');
  badge.textContent=p.badge;
  badge.style.cssText=`color:${p.badgeColor};border-color:${p.badgeColor};background:${p.badgeColor}18;`;

  const zonesEl=document.getElementById('zones');
  zonesEl.innerHTML='';
  p.zones.forEach((zone,zi)=>{
    const div=document.createElement('div');
    div.className=`zone ${zoneCls[zi]}`;
    let html='';
    zone.lines.forEach((line,li)=>{
      if(line.t==='fixed'){
        html+=`<span class="fixed-line">${line.code}</span>`;
      } else {
        const key=`${idx}-${zi}-${li}`;
        html+=`<div class="fill-wrap"><span class="fill-indent">  </span>
          <input class="fill-input" data-key="${key}"
            data-ans="${encodeURIComponent(line.ans)}"
            data-hint="${encodeURIComponent(line.hint)}"
            placeholder="${line.ph}" autocomplete="off" spellcheck="false"
            onkeydown="handleKey(event,this)" oninput="clearState(this)"/></div>`;
      }
    });
    div.innerHTML=`
      <div class="zone-header">
        <span class="zone-num">${zoneNums[zi]}</span>
        <span class="zone-name">${zoneNames[zi]}</span>
        <span class="zone-tag">${zone.tag}</span>
      </div>
      <div class="zone-body">${html}</div>`;
    zonesEl.appendChild(div);
  });
  buildViz(p);
  document.getElementById('hint-row').classList.remove('show');
}

function buildViz(p){
  const viz=document.getElementById('viz');
  const cells=p.viz.map((v,i)=>{
    const cls=i===0?'front':i===p.viz.length-1?'back':'mid';
    return `<div class="q-cell ${cls}">${v}</div>`;
  }).join('<span class="q-arrow">→</span>');
  viz.innerHTML=`
    <span class="viz-label">queue:</span>
    <div style="display:flex;flex-direction:column;gap:6px">
      <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);display:flex;gap:4px;padding-left:2px">
        <span style="color:var(--c3)">← pop (front)</span>
        <span style="flex:1;text-align:center">· · ·</span>
        <span style="color:var(--c4)">push (back) →</span>
      </div>
      <div class="q-viz">${cells}</div>
    </div>
    <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-left:20px;align-self:center;line-height:1.9">
      <span style="color:var(--c3)">■</span> processing next<br>
      <span style="color:var(--c2)">■</span> waiting in queue<br>
      <span style="color:var(--c4)">■</span> just enqueued<br>
      <span style="color:var(--c2)">★ mark visited ON PUSH</span>
    </span>`;
}

function normalise(s){
  return s.trim().toLowerCase()
    .replace(/\s*([+\-*/%=<>!&|^~,;{}()\[\]])\s*/g,'$1')
    .replace(/\s+/g,' ').replace(/;+$/,'')
    .replace(/\+\+\s*/g,'++').replace(/--\s*/g,'--')
    .replace(/\s*->\s*/g,'->').trim();
}

function handleKey(e,el){if(e.key==='Enter')checkSingle(el);if(e.key==='Tab'){e.preventDefault();focusNext(el);}}
function clearState(el){el.classList.remove('correct','wrong','revealed');}

function checkSingle(el){
  const key=el.dataset.key;
  if(answered.has(key))return;
  const ans=decodeURIComponent(el.dataset.ans);
  if(normalise(el.value)===normalise(ans)){
    el.classList.add('correct');el.classList.remove('wrong');
    answered.add(key);stats.correct++;stats.streak++;
    updateScore();showToast('✓ Correct!','ok');focusNext(el);
  } else {
    el.classList.add('wrong');el.classList.remove('correct');
    stats.wrong++;stats.streak=0;updateScore();
    showToast('✗ Not quite — check hint','err');
    document.getElementById('hint-text').textContent=decodeURIComponent(el.dataset.hint);
    document.getElementById('hint-row').classList.add('show');
  }
}

function checkAll(){document.querySelectorAll('.fill-input').forEach(el=>{if(!answered.has(el.dataset.key))checkSingle(el);});}
function revealAll(){
  document.querySelectorAll('.fill-input').forEach(el=>{
    if(!answered.has(el.dataset.key)){el.value=decodeURIComponent(el.dataset.ans);el.classList.add('revealed');el.classList.remove('correct','wrong');}
  });
  showToast('Answers revealed — study, then Reset!','inf');
  document.getElementById('hint-text').textContent=P[current].hint;
  document.getElementById('hint-row').classList.add('show');
}
function resetInputs(){
  answered=new Set();
  document.querySelectorAll('.fill-input').forEach(el=>{el.value='';el.classList.remove('correct','wrong','revealed');});
  document.getElementById('hint-row').classList.remove('show');
}
function nextPattern(){loadPattern((current+1)%P.length);}
function focusNext(el){const all=Array.from(document.querySelectorAll('.fill-input'));const i=all.indexOf(el);if(i<all.length-1)all[i+1].focus();}
function updateScore(){
  document.getElementById('s-correct').textContent=stats.correct;
  document.getElementById('s-wrong').textContent=stats.wrong;
  document.getElementById('s-streak').textContent=stats.streak;
  const total=stats.correct+stats.wrong;
  document.getElementById('prog').style.width=total?Math.round(stats.correct/total*100)+'%':'0%';
}
let toastTimer;
function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast ${type} show`;
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2400);
}

buildSelector();
loadPattern(0);
</script>
</body>
