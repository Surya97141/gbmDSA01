<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Two Pointers — Practice</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c12;
  --surface: #111119;
  --card: #15151e;
  --border: #23233a;
  --text: #e2e2f0;
  --muted: #52526e;
  --faint: #1e1e2e;

  --c1: #a78bfa; /* init   - purple */
  --c2: #38bdf8; /* cond   - blue   */
  --c3: #fb923c; /* action - orange */
  --c4: #4ade80; /* move   - green  */

  --b1: rgba(167,139,250,0.08);
  --b2: rgba(56,189,248,0.07);
  --b3: rgba(251,146,60,0.08);
  --b4: rgba(74,222,128,0.07);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* dot grid bg */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image: radial-gradient(rgba(167,139,250,0.12) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events:none; z-index:0;
}

.wrap {
  width: 100%; max-width: 820px;
  padding: 48px 24px 80px;
  position: relative; z-index:1;
}

/* ── Header ── */
.hdr { text-align:center; margin-bottom: 40px; }
.hdr-pill {
  display:inline-block;
  font-family:'JetBrains Mono',monospace;
  font-size:10px; letter-spacing:3px; text-transform:uppercase;
  color:var(--c1); border:1px solid rgba(167,139,250,0.3);
  padding:4px 14px; border-radius:20px; margin-bottom:16px;
}
.hdr h1 {
  font-size: clamp(24px,5vw,52px); font-weight:800;
  letter-spacing:-1.5px; line-height:1;
  background:linear-gradient(120deg,#fff 0%,var(--c1) 50%,var(--c2) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  margin-bottom:8px;
}
.hdr p {
  font-family:'JetBrains Mono',monospace;
  font-size:12px; color:var(--muted);
}

/* ── Pattern selector ── */
.selector-wrap {
  margin-bottom: 28px;
}
.selector-label {
  font-family:'JetBrains Mono',monospace;
  font-size:10px; letter-spacing:2px; text-transform:uppercase;
  color:var(--muted); margin-bottom:10px;
}
.selector {
  display:flex; flex-wrap:wrap; gap:8px;
}
.sel-btn {
  font-family:'JetBrains Mono',monospace;
  font-size:11px; padding:6px 14px;
  border:1px solid var(--border);
  background: var(--faint); color:var(--muted);
  border-radius:3px; cursor:pointer;
  transition: all .15s;
  user-select:none;
}
.sel-btn:hover { border-color:var(--c1); color:var(--text); }
.sel-btn.active {
  background:rgba(167,139,250,0.12);
  border-color:var(--c1); color:var(--c1);
}

/* ── Score bar ── */
.scorebar {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:20px;
  padding: 10px 16px;
  background: var(--surface);
  border:1px solid var(--border); border-radius:4px;
}
.score-item {
  font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted);
  display:flex; flex-direction:column; align-items:center; gap:3px;
}
.score-item strong { font-size:20px; font-weight:700; color:var(--text); line-height:1; }
.score-item.good strong { color:var(--c4); }
.score-item.bad  strong { color:var(--c3); }

.progress-bar {
  flex:1; margin:0 20px;
  height:4px; background:var(--border); border-radius:2px; overflow:hidden;
}
.progress-fill {
  height:100%; background:var(--c1);
  border-radius:2px; transition: width .4s;
}

/* ── The Template Box ── */
.template-box {
  background: var(--card);
  border:1px solid var(--border);
  border-radius:6px; overflow:hidden;
  box-shadow: 0 0 60px rgba(167,139,250,0.04);
}

.tbox-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 20px;
  border-bottom:1px solid var(--border);
  background:rgba(255,255,255,0.015);
}
.tbox-title {
  font-family:'JetBrains Mono',monospace; font-size:12px;
  color:var(--c1); font-weight:600; letter-spacing:.5px;
}
.tbox-badge {
  font-family:'JetBrains Mono',monospace; font-size:10px;
  padding:3px 10px; border-radius:2px; border:1px solid;
}

/* ── Zones ── */
.zone {
  border-bottom:1px solid var(--border);
  display:flex; flex-direction:column;
}
.zone:last-child { border-bottom:none; }

.zone-header {
  display:flex; align-items:center; gap:10px;
  padding:10px 20px 8px;
}
.zone-num {
  font-size:18px; font-weight:800; line-height:1;
  font-family:'JetBrains Mono',monospace;
}
.zone-name {
  font-family:'JetBrains Mono',monospace;
  font-size:10px; letter-spacing:2px; text-transform:uppercase;
  opacity:.6;
}
.zone-tag {
  margin-left:auto;
  font-family:'JetBrains Mono',monospace; font-size:9px;
  padding:2px 8px; border-radius:2px; opacity:.7;
}

.zone-1 { background: var(--b1); }
.zone-2 { background: var(--b2); }
.zone-3 { background: var(--b3); }
.zone-4 { background: var(--b4); }

.zone-1 .zone-num, .zone-1 .zone-name { color:var(--c1); }
.zone-2 .zone-num, .zone-2 .zone-name { color:var(--c2); }
.zone-3 .zone-num, .zone-3 .zone-name { color:var(--c3); }
.zone-4 .zone-num, .zone-4 .zone-name { color:var(--c4); }

.zone-1 .zone-tag { background:rgba(167,139,250,0.1); color:var(--c1); }
.zone-2 .zone-tag { background:rgba(56,189,248,0.1);  color:var(--c2); }
.zone-3 .zone-tag { background:rgba(251,146,60,0.1);  color:var(--c3); }
.zone-4 .zone-tag { background:rgba(74,222,128,0.1);  color:var(--c4); }

/* Code lines inside zone */
.zone-body {
  padding:0 20px 14px 24px;
  font-family:'JetBrains Mono',monospace;
  font-size:12.5px; line-height:1.8;
}

.fixed-line { display:block; color:var(--text); white-space:pre; }
.comment    { color:#3d4f5c; font-style:italic; }

/* Fillable input line */
.fill-wrap {
  display:flex; align-items:center;
  margin:2px 0;
}
.fill-indent {
  color:var(--muted); opacity:.3;
  font-size:12px; white-space:pre; user-select:none;
}
.fill-input {
  background: rgba(0,0,0,0.25);
  border:none; border-bottom:1px dashed rgba(255,255,255,0.15);
  color:var(--text);
  font-family:'JetBrains Mono',monospace; font-size:12.5px;
  padding:2px 6px; width:100%;
  outline:none; caret-color:var(--c1);
  transition: border-color .2s, background .2s;
  border-radius:2px 2px 0 0;
}
.fill-input:focus {
  background: rgba(167,139,250,0.06);
  border-bottom-color:var(--c1);
}
.fill-input.correct {
  background: rgba(74,222,128,0.07);
  border-bottom-color:var(--c4) !important;
  color:var(--c4);
}
.fill-input.wrong {
  background: rgba(251,146,60,0.07);
  border-bottom-color:var(--c3) !important;
  color:var(--c3);
  animation: shake .3s;
}
@keyframes shake {
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-4px)}
  75%{transform:translateX(4px)}
}
.fill-input.revealed {
  background: rgba(56,189,248,0.07);
  border-bottom-color:var(--c2) !important;
  color:var(--c2);
}

/* ── Action buttons ── */
.actions {
  display:flex; gap:10px; margin-top:20px; flex-wrap:wrap;
}
.btn {
  font-family:'JetBrains Mono',monospace; font-size:11px;
  padding:9px 20px; border-radius:3px; cursor:pointer;
  border:1px solid; transition:all .15s; letter-spacing:.5px;
}
.btn-check {
  background:rgba(167,139,250,0.12); color:var(--c1);
  border-color:rgba(167,139,250,0.4);
}
.btn-check:hover { background:rgba(167,139,250,0.2); }

.btn-reveal {
  background:rgba(56,189,248,0.08); color:var(--c2);
  border-color:rgba(56,189,248,0.3);
}
.btn-reveal:hover { background:rgba(56,189,248,0.15); }

.btn-reset {
  background:transparent; color:var(--muted);
  border-color:var(--border);
}
.btn-reset:hover { color:var(--text); border-color:var(--muted); }

.btn-next {
  margin-left:auto;
  background:rgba(74,222,128,0.1); color:var(--c4);
  border-color:rgba(74,222,128,0.3);
}
.btn-next:hover { background:rgba(74,222,128,0.18); }

/* ── Hint ── */
.hint-row {
  display:flex; align-items:center; gap:10px;
  margin-top:14px; padding:10px 14px;
  background:rgba(56,189,248,0.05); border:1px solid rgba(56,189,248,0.15);
  border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:11px;
  color:var(--c2); display:none;
}
.hint-row.show { display:flex; }

/* ── Array viz ── */
.viz-row {
  display:flex; align-items:center; gap:8px;
  padding:10px 20px; border-top:1px solid var(--border);
  background:rgba(0,0,0,0.2); overflow-x:auto;
}
.viz-label {
  font-family:'JetBrains Mono',monospace; font-size:10px;
  color:var(--muted); flex-shrink:0;
}
.viz-cells { display:flex; gap:4px; }
.vcell {
  display:flex; flex-direction:column; align-items:center; gap:2px;
}
.vcell-box {
  width:30px; height:30px; display:flex; align-items:center; justify-content:center;
  font-family:'JetBrains Mono',monospace; font-size:11px;
  border:1px solid var(--border); border-radius:3px; color:var(--muted);
}
.vcell-box.L { border-color:var(--c2); color:var(--c2); background:rgba(56,189,248,0.08); }
.vcell-box.R { border-color:var(--c3); color:var(--c3); background:rgba(251,146,60,0.08); }
.vcell-box.M { border-color:var(--c1); color:var(--c1); background:rgba(167,139,250,0.08); }
.vcell-lbl {
  font-family:'JetBrains Mono',monospace; font-size:8px; color:var(--muted);
  height:10px;
}

/* syntax */
.kw { color:#c792ea; font-weight:600; }
.ty { color:#82aaff; }
.nm { color:#f78c6c; }
.op { color:#ff6b35; }
.vr { color:#eeffff; }

/* toast */
.toast {
  position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(20px);
  font-family:'JetBrains Mono',monospace; font-size:12px;
  padding:10px 24px; border-radius:4px; opacity:0;
  transition:all .3s; z-index:100; pointer-events:none;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.ok  { background:rgba(74,222,128,0.15); border:1px solid rgba(74,222,128,0.4); color:var(--c4); }
.toast.err { background:rgba(251,146,60,0.12); border:1px solid rgba(251,146,60,0.3); color:var(--c3); }
.toast.inf { background:rgba(56,189,248,0.1);  border:1px solid rgba(56,189,248,0.3); color:var(--c2); }

</style>
</head>
<body>
<div class="wrap">

  <div class="hdr">
    <div class="hdr-pill">Practice Mode</div>
    <h1>Two Pointers</h1>
    <p>// one template · fill the blanks · master all 10 patterns</p>
  </div>

  <!-- selector -->
  <div class="selector-wrap">
    <div class="selector-label">Select pattern</div>
    <div class="selector" id="selector"></div>
  </div>

  <!-- score -->
  <div class="scorebar">
    <div class="score-item good"><strong id="s-correct">0</strong>correct</div>
    <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
    <div class="score-item bad"><strong id="s-wrong">0</strong>wrong</div>
    <div class="score-item" style="margin-left:16px"><strong id="s-streak">0</strong>streak🔥</div>
  </div>

  <!-- template box -->
  <div class="template-box" id="tbox">
    <div class="tbox-header">
      <span class="tbox-title" id="tbox-title">TEMPLATE.cpp</span>
      <span class="tbox-badge" id="tbox-badge"></span>
    </div>
    <div id="zones"></div>
    <div class="viz-row" id="viz"></div>
  </div>

  <!-- hint -->
  <div class="hint-row" id="hint-row">
    <span>💡</span><span id="hint-text"></span>
  </div>

  <!-- actions -->
  <div class="actions">
    <button class="btn btn-check"  onclick="checkAll()">Check Answers</button>
    <button class="btn btn-reveal" onclick="revealAll()">Reveal</button>
    <button class="btn btn-reset"  onclick="resetInputs()">Reset</button>
    <button class="btn btn-next"   onclick="nextPattern()">Next Pattern →</button>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
// Each zone has lines[].
// type: "fixed" | "blank"
// For blank lines: answer = correct string (trimmed comparison), hint, placeholder
// For fixed lines: code = html string

const patterns = [
 {
  id:1, title:"Pair with Target Sum", badge:"CONVERGE", badgeColor:"var(--c2)",
  viz:{ arr:[-4,-1,0,3,5,8,11], L:0, R:6 },
  hint:"Sum < target → move L right. Sum > target → move R left.",
  zones:[
   { z:1, tag:"same across CONVERGE",
     lines:[
       {t:"fixed", code:`<span class="ty">int</span> <span class="vr">L</span> <span class="op">=</span> <span class="nm">0</span>,  <span class="vr">R</span> <span class="op">=</span> arr.size() <span class="op">-</span> <span class="nm">1</span>;`},
       {t:"blank", ph:"// result variable...", ans:"int result = -1;", hint:"Declare your result (e.g. a pair or bool)"},
     ]},
   { z:2, tag:"same across CONVERGE",
     lines:[
       {t:"fixed", code:`<span class="kw">while</span> ( <span class="vr">L</span> <span class="op">&lt;</span> <span class="vr">R</span> ) {`},
     ]},
   { z:3, tag:"changes per pattern",
     lines:[
       {t:"blank", ph:"// compute something with arr[L] and arr[R]...", ans:"int s = arr[L] + arr[R];", hint:"Add the two elements"},
       {t:"blank", ph:"// check if we found the answer...",             ans:"if (s == target) return {L, R};", hint:"If sum matches target, return"},
     ]},
   { z:4, tag:"changes per pattern",
     lines:[
       {t:"blank", ph:"// if too small, move __ ...", ans:"if (s < target) ++L;", hint:"Too small → increase sum → move L right"},
       {t:"blank", ph:"// if too big,   move __ ...", ans:"else --R;",            hint:"Too big → decrease sum → move R left"},
       {t:"fixed", code:`}`},
     ]},
  ]
 },
 {
  id:2, title:"Triplet Sum (3Sum)", badge:"CONVERGE+OUTER", badgeColor:"var(--c2)",
  viz:{ arr:[-4,-1,0,3,5,8], L:1, R:5 },
  hint:"Fix arr[i] in outer loop. Inner loop is identical to Pair Sum with target = -arr[i].",
  zones:[
   { z:1, tag:"outer fixes one element",
     lines:[
       {t:"fixed", code:`<span class="cm">// sort first, then fix arr[i]</span>`},
       {t:"blank", ph:"// inner pointers start where?", ans:"int L = i+1,  R = arr.size()-1;", hint:"L starts right after fixed element"},
     ]},
   { z:2, tag:"same as Pair Sum",
     lines:[
       {t:"fixed", code:`<span class="kw">while</span> ( <span class="vr">L</span> <span class="op">&lt;</span> <span class="vr">R</span> ) {`},
     ]},
   { z:3, tag:"changes — 3-way sum",
     lines:[
       {t:"blank", ph:"// sum of all three...", ans:"int s = arr[i] + arr[L] + arr[R];", hint:"Add the fixed element + L + R"},
       {t:"blank", ph:"// if found, push & skip dups...", ans:"if (s == 0) { res.push_back({arr[i],arr[L],arr[R]}); ++L; --R; }", hint:"Push triplet, then skip duplicates"},
     ]},
   { z:4, tag:"same movement logic",
     lines:[
       {t:"blank", ph:"// same move rule...", ans:"else if (s < 0) ++L;", hint:"Sum too small → increase it"},
       {t:"blank", ph:"// ...",               ans:"else --R;",            hint:"Sum too large → decrease it"},
       {t:"fixed", code:`}`},
     ]},
  ]
 },
 {
  id:3, title:"Container with Most Water", badge:"CONVERGE", badgeColor:"var(--c2)",
  viz:{ arr:[1,8,6,2,5,4,8,3,7], L:0, R:8 },
  hint:"Area = min(h[L],h[R]) × (R-L). Moving the taller wall can only decrease area — always move the shorter.",
  zones:[
   { z:1, tag:"same CONVERGE init",
     lines:[
       {t:"fixed", code:`<span class="ty">int</span> <span class="vr">L</span> <span class="op">=</span> <span class="nm">0</span>,  <span class="vr">R</span> <span class="op">=</span> h.size() <span class="op">-</span> <span class="nm">1</span>;`},
       {t:"blank", ph:"// track best area...", ans:"int best = 0;", hint:"Initialize best answer to 0"},
     ]},
   { z:2, tag:"same CONVERGE condition",
     lines:[
       {t:"fixed", code:`<span class="kw">while</span> ( <span class="vr">L</span> <span class="op">&lt;</span> <span class="vr">R</span> ) {`},
     ]},
   { z:3, tag:"maximize area",
     lines:[
       {t:"blank", ph:"// compute current area...",   ans:"int area = min(h[L], h[R]) * (R - L);", hint:"min of heights × width"},
       {t:"blank", ph:"// update best...",            ans:"best = max(best, area);",                hint:"Keep the maximum"},
     ]},
   { z:4, tag:"move shorter wall",
     lines:[
       {t:"blank", ph:"// which wall do you move?", ans:"if (h[L] < h[R]) ++L; else --R;", hint:"Move the shorter wall inward"},
       {t:"fixed", code:`}`},
     ]},
  ]
 },
 {
  id:4, title:"Remove Duplicates In-Place", badge:"READ/WRITE", badgeColor:"#f472b6",
  viz:{ arr:[1,1,2,3,3,4,5,5], L:0, R:1 },
  hint:"L = write head (last unique). R = read head (scanner). R always moves; L only moves when new unique found.",
  zones:[
   { z:1, tag:"different init — both from start",
     lines:[
       {t:"blank", ph:"// L is the write head, starts at...", ans:"int L = 0;", hint:"Write head starts at index 0"},
       {t:"blank", ph:"// R is the read head, starts at...",  ans:"int R = 1;", hint:"Read head starts at index 1"},
     ]},
   { z:2, tag:"R walks full array",
     lines:[
       {t:"blank", ph:"// condition — R walks until...", ans:"while (R < arr.size()) {", hint:"R scans the full array"},
     ]},
   { z:3, tag:"write only on new unique",
     lines:[
       {t:"blank", ph:"// when do you write?", ans:"if (arr[R] != arr[L]) arr[++L] = arr[R];", hint:"New unique found → advance L then overwrite"},
     ]},
   { z:4, tag:"R always advances",
     lines:[
       {t:"blank", ph:"// R moves every iteration...", ans:"++R;", hint:"R always advances regardless"},
       {t:"fixed", code:`}`},
     ]},
  ]
 },
 {
  id:5, title:"Palindrome Check", badge:"CONVERGE", badgeColor:"var(--c2)",
  viz:{ arr:['r','a','c','e','c','a','r'], L:0, R:6 },
  hint:"Both pointers move every step — no conditional movement. Mismatch = immediate false.",
  zones:[
   { z:1, tag:"same CONVERGE init",
     lines:[
       {t:"fixed", code:`<span class="ty">int</span> <span class="vr">L</span> <span class="op">=</span> <span class="nm">0</span>,  <span class="vr">R</span> <span class="op">=</span> s.size() <span class="op">-</span> <span class="nm">1</span>;`},
     ]},
   { z:2, tag:"same CONVERGE condition",
     lines:[
       {t:"fixed", code:`<span class="kw">while</span> ( <span class="vr">L</span> <span class="op">&lt;</span> <span class="vr">R</span> ) {`},
     ]},
   { z:3, tag:"mismatch check",
     lines:[
       {t:"blank", ph:"// what makes it NOT a palindrome?", ans:"if (s[L] != s[R]) return false;", hint:"Characters differ → not palindrome → return false"},
     ]},
   { z:4, tag:"both always move",
     lines:[
       {t:"blank", ph:"// move both pointers...", ans:"++L;  --R;", hint:"Both converge inward every step"},
       {t:"fixed", code:`}\n<span class="kw">return</span> <span class="kw">true</span>;`},
     ]},
  ]
 },
 {
  id:6, title:"Partition Around Pivot", badge:"READ/WRITE", badgeColor:"#f472b6",
  viz:{ arr:[3,6,1,8,2,5,4], L:0, R:6 },
  hint:"L = boundary of ≤ region (starts at lo-1). R = scanner. Swap arr[++L] with arr[R] when arr[R] ≤ pivot.",
  zones:[
   { z:1, tag:"L starts behind boundary",
     lines:[
       {t:"blank", ph:"// pivot = ...",              ans:"int pivot = arr[hi];",    hint:"Pivot is the last element"},
       {t:"blank", ph:"// L = boundary, starts at?", ans:"int L = lo - 1;",        hint:"L starts one before the range"},
       {t:"blank", ph:"// R = scanner, starts at?",  ans:"int R = lo;",            hint:"R starts at beginning of range"},
     ]},
   { z:2, tag:"R scans up to pivot",
     lines:[
       {t:"blank", ph:"// condition...", ans:"while (R < hi) {", hint:"R scans up to but not including pivot"},
     ]},
   { z:3, tag:"swap when ≤ pivot",
     lines:[
       {t:"blank", ph:"// when to expand left region?", ans:"if (arr[R] <= pivot) swap(arr[++L], arr[R]);", hint:"Element ≤ pivot belongs left — swap it there"},
     ]},
   { z:4, tag:"R always advances",
     lines:[
       {t:"blank", ph:"// R moves every step...", ans:"++R;", hint:"R always advances"},

// ── STATE ──────────────────────────────────────────────────────────────────
let current = 0;
let stats = { correct:0, wrong:0, streak:0 };
let answered = new Set(); // keys of correctly answered blanks

// ── BUILD UI ───────────────────────────────────────────────────────────────
const zoneNames = ['Initialization','Condition','Action / Process','Update / Movement'];
const zoneCls   = ['zone-1','zone-2','zone-3','zone-4'];
const zoneNums  = ['①','②','③','④'];

function buildSelector() {
  const sel = document.getElementById('selector');
  sel.innerHTML = '';
  patterns.forEach((p,i) => {
    const b = document.createElement('button');
    b.className = 'sel-btn' + (i===0?' active':'');
    b.textContent = `${String(i+1).padStart(2,'0')} ${p.title}`;
    b.onclick = () => loadPattern(i);
    sel.appendChild(b);
  });
}

function loadPattern(idx) {
  current = idx;
  answered = new Set();
  document.querySelectorAll('.sel-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));

  const p = patterns[idx];
  document.getElementById('tbox-title').textContent = p.title.replace(/ /g,'_') + '.cpp';
  const badge = document.getElementById('tbox-badge');
  badge.textContent = p.badge;
  badge.style.color = p.badgeColor;
  badge.style.borderColor = p.badgeColor.replace('var(--','').replace(')','');
  badge.style.background = p.badgeColor + '15';

  // zones
  const zonesEl = document.getElementById('zones');
  zonesEl.innerHTML = '';
  p.zones.forEach((zone, zi) => {
    const div = document.createElement('div');
    div.className = `zone ${zoneCls[zi]}`;

    let linesHTML = '';
    zone.lines.forEach((line, li) => {
      if (line.t === 'fixed') {
        linesHTML += `<span class="fixed-line">${line.code}</span>`;
      } else {
        const key = `${idx}-${zi}-${li}`;
        linesHTML += `<div class="fill-wrap">
          <span class="fill-indent">  </span>
          <input class="fill-input" data-key="${key}" data-ans="${encodeURIComponent(line.ans)}" data-hint="${encodeURIComponent(line.hint)}"
            placeholder="${line.ph}" autocomplete="off" spellcheck="false"
            onkeydown="handleKey(event,this)" oninput="clearState(this)"/>
        </div>`;
      }
    });

    div.innerHTML = `
      <div class="zone-header">
        <span class="zone-num">${zoneNums[zi]}</span>
        <span class="zone-name">${zoneNames[zi]}</span>
        <span class="zone-tag">${zone.tag}</span>
      </div>
      <div class="zone-body">${linesHTML}</div>`;
    zonesEl.appendChild(div);
  });

  // viz
  buildViz(p);
  document.getElementById('hint-row').classList.remove('show');
}

function buildViz(p) {
  const viz = document.getElementById('viz');
  viz.innerHTML = `<span class="viz-label">example:</span><div class="viz-cells" id="vcells"></div>`;
  const cells = document.getElementById('vcells');
  p.viz.arr.forEach((v,i) => {
    if (v === '·') {
      const sep = document.createElement('div');
      sep.style.cssText='width:8px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:16px';
      sep.textContent='|'; cells.appendChild(sep); return;
    }
    const wrap = document.createElement('div');
    wrap.className = 'vcell';
    let cls = 'vcell-box';
    let lbl = '';
    if (p.viz.M !== undefined && i === p.viz.M) { cls+=' M'; lbl='M'; }
    else if (i === p.viz.L) { cls+=' L'; lbl='L'; }
    else if (i === p.viz.R) { cls+=' R'; lbl='R'; }
    wrap.innerHTML = `<div class="${cls}">${v}</div><div class="vcell-lbl">${lbl}</div>`;
    cells.appendChild(wrap);
  });
}

// ── INPUT LOGIC ────────────────────────────────────────────────────────────
function normalise(s) {
  return s
    .trim()
    .toLowerCase()
    // remove ALL whitespace around operators and punctuation so spacing never matters
    .replace(/\s*([+\-*/%=<>!&|^~,;{}()\[\]])\s*/g, '$1')
    // collapse any remaining multi-space into single space
    .replace(/\s+/g, ' ')
    // strip trailing semicolons
    .replace(/;+$/, '')
    // normalise ++ / -- whether written as ++ L or ++L
    .replace(/\+\+\s*/g, '++')
    .replace(/--\s*/g, '--')
    // normalise -> and =>
    .replace(/\s*->\s*/g, '->')
    .trim();
}

function handleKey(e, el) {
  if (e.key === 'Enter') { checkSingle(el); }
  if (e.key === 'Tab')   { e.preventDefault(); focusNext(el); }
}

function clearState(el) {
  el.classList.remove('correct','wrong','revealed');
}

function checkSingle(el) {
  const key = el.dataset.key;
  if (answered.has(key)) return;
  const ans = decodeURIComponent(el.dataset.ans);
  const userVal = el.value;
  if (normalise(userVal) === normalise(ans)) {
    el.classList.add('correct'); el.classList.remove('wrong');
    answered.add(key);
    stats.correct++; stats.streak++;
    updateScore();
    showToast('✓ Correct!', 'ok');
    focusNext(el);
  } else {
    el.classList.add('wrong'); el.classList.remove('correct');
    stats.wrong++; stats.streak = 0;
    updateScore();
    showToast('✗ Not quite — try again or press Reveal', 'err');
    // show hint after wrong
    const hint = document.getElementById('hint-row');
    document.getElementById('hint-text').textContent = decodeURIComponent(el.dataset.hint);
    hint.classList.add('show');
  }
}

function checkAll() {
  const inputs = document.querySelectorAll('.fill-input');
  inputs.forEach(el => { if (!answered.has(el.dataset.key)) checkSingle(el); });
}

function revealAll() {
  const inputs = document.querySelectorAll('.fill-input');
  inputs.forEach(el => {
    if (!answered.has(el.dataset.key)) {
      el.value = decodeURIComponent(el.dataset.ans);
      el.classList.add('revealed'); el.classList.remove('correct','wrong');
    }
  });
  showToast('Answers revealed — study them, then Reset to retry!', 'inf');
  const hint = document.getElementById('hint-row');
  document.getElementById('hint-text').textContent = patterns[current].hint;
  hint.classList.add('show');
}

function resetInputs() {
  answered = new Set();
  document.querySelectorAll('.fill-input').forEach(el => {
    el.value = ''; el.classList.remove('correct','wrong','revealed');
  });
  document.getElementById('hint-row').classList.remove('show');
}

function nextPattern() {
  loadPattern((current + 1) % patterns.length);
}

function focusNext(el) {
  const all = Array.from(document.querySelectorAll('.fill-input'));
  const i = all.indexOf(el);
  if (i < all.length - 1) all[i+1].focus();
}

function updateScore() {
  document.getElementById('s-correct').textContent = stats.correct;
  document.getElementById('s-wrong').textContent   = stats.wrong;
  document.getElementById('s-streak').textContent  = stats.streak;
  const total = stats.correct + stats.wrong;
  const pct = total ? Math.round(stats.correct/total*100) : 0;
  document.getElementById('prog').style.width = pct + '%';
}

let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── INIT ───────────────────────────────────────────────────────────────────
buildSelector();
loadPattern(0);
</script>
