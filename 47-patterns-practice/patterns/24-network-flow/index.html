<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Flow — Practice</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0c12; --surface:#111119; --card:#15151e; --border:#23233a;
  --text:#e2e2f0; --muted:#52526e; --faint:#1e1e2e;
  --c1:#a78bfa; --c2:#38bdf8; --c3:#fb923c; --c4:#4ade80;
  --b1:rgba(167,139,250,0.08); --b2:rgba(56,189,248,0.07);
  --b3:rgba(251,146,60,0.08);  --b4:rgba(74,222,128,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(rgba(56,189,248,0.04) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;z-index:0;}
.wrap{width:100%;max-width:860px;padding:48px 24px 80px;position:relative;z-index:1;}

.hdr{text-align:center;margin-bottom:40px;}
.hdr-pill{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--c2);border:1px solid rgba(56,189,248,0.3);padding:4px 14px;border-radius:20px;margin-bottom:16px;}
.hdr h1{font-size:clamp(22px,4.5vw,48px);font-weight:800;letter-spacing:-1.5px;line-height:1;background:linear-gradient(120deg,#fff 0%,var(--c2) 40%,var(--c1) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;}
.hdr p{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);}

.selector-wrap{margin-bottom:28px;}
.selector-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.selector{display:flex;flex-wrap:wrap;gap:8px;}
.sel-btn{font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 14px;border:1px solid var(--border);background:var(--faint);color:var(--muted);border-radius:3px;cursor:pointer;transition:all .15s;user-select:none;}
.sel-btn:hover{border-color:var(--c2);color:var(--text);}
.sel-btn.active{background:rgba(56,189,248,0.1);border-color:var(--c2);color:var(--c2);}

.scorebar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:4px;}
.score-item{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;}
.score-item strong{font-size:20px;font-weight:700;color:var(--text);line-height:1;}
.score-item.good strong{color:var(--c4);} .score-item.bad strong{color:var(--c3);}
.progress-bar{flex:1;margin:0 20px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--c2);border-radius:2px;transition:width .4s;}

.template-box{background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.tbox-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.015);}
.tbox-title{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--c2);font-weight:600;}
.tbox-badge{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 10px;border-radius:2px;border:1px solid;}

.zone{border-bottom:1px solid var(--border);}
.zone:last-child{border-bottom:none;}
.zone-header{display:flex;align-items:center;gap:10px;padding:10px 20px 8px;}
.zone-num{font-size:18px;font-weight:800;line-height:1;font-family:'JetBrains Mono',monospace;}
.zone-name{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;opacity:.6;}
.zone-tag{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 8px;border-radius:2px;opacity:.8;text-align:right;max-width:420px;}
.zone-1{background:var(--b1)} .zone-2{background:var(--b2)} .zone-3{background:var(--b3)} .zone-4{background:var(--b4)}
.zone-1 .zone-num,.zone-1 .zone-name{color:var(--c1)} .zone-2 .zone-num,.zone-2 .zone-name{color:var(--c2)}
.zone-3 .zone-num,.zone-3 .zone-name{color:var(--c3)} .zone-4 .zone-num,.zone-4 .zone-name{color:var(--c4)}
.zone-1 .zone-tag{background:rgba(167,139,250,0.1);color:var(--c1)} .zone-2 .zone-tag{background:rgba(56,189,248,0.1);color:var(--c2)}
.zone-3 .zone-tag{background:rgba(251,146,60,0.1);color:var(--c3)} .zone-4 .zone-tag{background:rgba(74,222,128,0.1);color:var(--c4)}

.zone-body{padding:0 20px 14px 24px;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.8;}
.fixed-line{display:block;color:var(--text);white-space:pre;}
.fill-wrap{display:flex;align-items:center;margin:2px 0;}
.fill-indent{color:var(--muted);opacity:.3;font-size:12px;white-space:pre;user-select:none;}
.fill-input{background:rgba(0,0,0,0.25);border:none;border-bottom:1px dashed rgba(255,255,255,0.15);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12.5px;padding:2px 6px;width:100%;outline:none;caret-color:var(--c2);transition:border-color .2s,background .2s;border-radius:2px 2px 0 0;}
.fill-input:focus{background:rgba(56,189,248,0.05);border-bottom-color:var(--c2);}
.fill-input.correct{background:rgba(74,222,128,0.07);border-bottom-color:var(--c4)!important;color:var(--c4);}
.fill-input.wrong{background:rgba(251,146,60,0.07);border-bottom-color:var(--c3)!important;color:var(--c3);animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.fill-input.revealed{background:rgba(167,139,250,0.07);border-bottom-color:var(--c1)!important;color:var(--c1);}

.actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;}
.btn{font-family:'JetBrains Mono',monospace;font-size:11px;padding:9px 20px;border-radius:3px;cursor:pointer;border:1px solid;transition:all .15s;letter-spacing:.5px;}
.btn-check{background:rgba(56,189,248,0.1);color:var(--c2);border-color:rgba(56,189,248,0.4);}
.btn-check:hover{background:rgba(56,189,248,0.2);}
.btn-reveal{background:rgba(167,139,250,0.08);color:var(--c1);border-color:rgba(167,139,250,0.3);}
.btn-reveal:hover{background:rgba(167,139,250,0.15);}
.btn-reset{background:transparent;color:var(--muted);border-color:var(--border);}
.btn-reset:hover{color:var(--text);border-color:var(--muted);}
.btn-next{margin-left:auto;background:rgba(74,222,128,0.1);color:var(--c4);border-color:rgba(74,222,128,0.3);}
.btn-next:hover{background:rgba(74,222,128,0.18);}

.hint-row{display:none;align-items:flex-start;gap:10px;margin-top:14px;padding:10px 14px;background:rgba(56,189,248,0.04);border:1px solid rgba(56,189,248,0.15);border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--c2);line-height:1.6;}
.hint-row.show{display:flex;}

.viz-row{padding:14px 20px;border-top:1px solid var(--border);background:rgba(0,0,0,0.2);overflow-x:auto;}
.flow-viz{display:flex;flex-direction:column;gap:8px;}
.flow-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.flow-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);min-width:130px;text-align:right;padding-right:8px;flex-shrink:0;}
.flow-node{font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 10px;border:1px solid;border-radius:3px;white-space:nowrap;}
.fn-src{border-color:var(--c4);color:var(--c4);background:rgba(74,222,128,0.07);}
.fn-mid{border-color:var(--c2);color:var(--c2);background:rgba(56,189,248,0.07);}
.fn-sink{border-color:var(--c1);color:var(--c1);background:rgba(167,139,250,0.08);}
.fn-cut{border-color:var(--c3);color:var(--c3);background:rgba(251,146,60,0.07);}
.flow-arrow{color:var(--muted);font-size:12px;}
.viz-legend{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);line-height:2;margin-top:10px;}

.kw{color:#c792ea;font-weight:600} .ty{color:#82aaff} .nm{color:#f78c6c}
.op{color:#ff6b35} .fn{color:#7dd3fc} .cm{color:#3d4f5c;font-style:italic}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);font-family:'JetBrains Mono',monospace;font-size:12px;padding:10px 24px;border-radius:4px;opacity:0;transition:all .3s;z-index:100;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{background:rgba(74,222,128,0.15);border:1px solid rgba(74,222,128,0.4);color:var(--c4);}
.toast.err{background:rgba(251,146,60,0.12);border:1px solid rgba(251,146,60,0.3);color:var(--c3);}
.toast.inf{background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.3);color:var(--c1);}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-pill">Pattern 24 — Practice Mode</div>
    <h1>Network Flow</h1>
    <p>// Edge{to,rev,cap} · addEdge adds back-edge cap=0 · e.cap-=d; graph[to][rev].cap+=d · level[t]!=-1 → path exists</p>
  </div>

  <div class="selector-wrap">
    <div class="selector-label">Select manifestation</div>
    <div class="selector" id="selector"></div>
  </div>

  <div class="scorebar">
    <div class="score-item good"><strong id="s-correct">0</strong>correct</div>
    <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
    <div class="score-item bad"><strong id="s-wrong">0</strong>wrong</div>
    <div class="score-item" style="margin-left:16px"><strong id="s-streak">0</strong>streak🔥</div>
  </div>

  <div class="template-box">
    <div class="tbox-header">
      <span class="tbox-title" id="tbox-title">TEMPLATE.cpp</span>
      <span class="tbox-badge" id="tbox-badge"></span>
    </div>
    <div id="zones"></div>
    <div class="viz-row" id="viz"></div>
  </div>

  <div class="hint-row" id="hint-row"><span>💡</span><span id="hint-text"></span></div>

  <div class="actions">
    <button class="btn btn-check"  onclick="checkAll()">Check Answers</button>
    <button class="btn btn-reveal" onclick="revealAll()">Reveal</button>
    <button class="btn btn-reset"  onclick="resetInputs()">Reset</button>
    <button class="btn btn-next"   onclick="nextPattern()">Next →</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// NETWORK FLOW — 10 Manifestations
//
// UNIVERSAL STRUCTURE (Dinic's Algorithm):
//   Edge struct: {to, rev, cap}
//   addEdge(u,v,cap): forward cap + back edge cap=0
//   BFS: build level graph — level[t]!=-1 means path exists
//   DFS: blocking flow using iter[] (current arc optimization)
//   Residual update: e.cap -= d; graph[e.to][e.rev].cap += d
//   Outer loop: while(bfs()) { reset iter; while(dfs > 0) flow += d }
//
// WHAT VARIES: only the graph construction
//   bipartite matching: source→L(cap1), R→sink(cap1), L-R edges(cap1)
//   min cut:            after max flow, BFS on residual → reachable set
//   vertex capacity:    split u → u_in, u_out with edge cap=vertex_cap
//   project selection:  source→projects(profit), costs→sink(cost), INF dep edges
//   min path cover:     split nodes, DAG edges, n − max_matching
// ─────────────────────────────────────────────────────────────────────────────

const DINIC_BFS = `    <span class="cm">// BFS: build level graph</span>
    <span class="kw">auto</span> bfs <span class="op">=</span> [<span class="op">&</span>]() {
        level.assign(n, <span class="op">-</span><span class="nm">1</span>); level[s]<span class="op">=</span><span class="nm">0</span>;
        queue<span class="op">&lt;</span><span class="ty">int</span><span class="op">&gt;</span> q; q.push(s);
        <span class="kw">while</span>(!q.empty()) {
            <span class="ty">int</span> u<span class="op">=</span>q.front(); q.pop();
            <span class="kw">for</span>(<span class="kw">auto</span><span class="op">&amp;</span> e:g[u]) <span class="kw">if</span>(e.cap<span class="op">&gt;</span><span class="nm">0</span><span class="op">&amp;&amp;</span>level[e.to]<span class="op">==</span><span class="op">-</span><span class="nm">1</span>)
                { level[e.to]<span class="op">=</span>level[u]<span class="op">+</span><span class="nm">1</span>; q.push(e.to); }
        }
        <span class="kw">return</span> level[t]<span class="op">!=</span><span class="op">-</span><span class="nm">1</span>;
    };`;

const DINIC_DFS = `    <span class="cm">// DFS: blocking flow with current-arc optimization</span>
    function<span class="op">&lt;</span><span class="ty">int</span>(int,int)<span class="op">&gt;</span> dfs<span class="op">=</span>[<span class="op">&</span>](<span class="ty">int</span> u,<span class="ty">int</span> pushed)<span class="op">-&gt;</span><span class="ty">int</span>{
        <span class="kw">if</span>(u<span class="op">==</span>t) <span class="kw">return</span> pushed;
        <span class="kw">for</span>(<span class="ty">int</span><span class="op">&amp;</span> i<span class="op">=</span>iter[u]; i<span class="op">&lt;</span>(<span class="ty">int</span>)g[u].size(); i<span class="op">++</span>) {
            <span class="kw">auto</span><span class="op">&amp;</span> e<span class="op">=</span>g[u][i];
            <span class="kw">if</span>(e.cap<span class="op">&gt;</span><span class="nm">0</span><span class="op">&amp;&amp;</span>level[e.to]<span class="op">==</span>level[u]<span class="op">+</span><span class="nm">1</span>) {
                <span class="ty">int</span> d<span class="op">=</span>dfs(e.to,min(pushed,e.cap));
                <span class="kw">if</span>(d<span class="op">&gt;</span><span class="nm">0</span>){ e.cap<span class="op">-=</span>d; g[e.to][e.rev].cap<span class="op">+=</span>d; <span class="kw">return</span> d; }
            }
        } <span class="kw">return</span> <span class="nm">0</span>;
    };`;

const P = [

  // 01 ── Maximum Flow (Dinic's) ─────────────────────────────────────────────
  {
    id:1, title:"Maximum Flow (Dinic's)", badge:"O(V²E) LEVEL GRAPH", badgeColor:"var(--c4)",
    hint:"Dinic's: BFS builds level graph (layers by distance from source). DFS finds blocking flow using iter[] to avoid re-visiting dead ends. Repeat until no s-t path in residual.",
    vizRows:[
      {label:"BFS: level graph", nodes:["s(0)→A(1)→B(2)→t(3)"], cls:"fn-src"},
      {label:"DFS: blocking flow", nodes:["push along level edges"], cls:"fn-mid"},
      {label:"residual updated", nodes:["e.cap-=d, back.cap+=d"], cls:"fn-sink"},
      {label:"repeat until", nodes:["BFS finds no s-t path"], cls:"fn-cut"},
    ],
    zones:[
      { z:1, tag:"Edge struct + addEdge — universal residual graph",
        lines:[
          {t:"blank", ph:"// Dinic's max flow — O(V²E)...", ans:"struct Edge { int to,rev,cap; };", hint:"rev = index of reverse edge in adj[to]. Allows O(1) residual graph update."},
          {t:"blank", ph:"// graph + addEdge building forward + back edge...", ans:"vector<vector<Edge>> g(n); auto addEdge=[&](int u,int v,int c){ g[u].push_back({v,(int)g[v].size(),c}); g[v].push_back({u,(int)g[u].size()-1,0}); };", hint:"Back edge has cap=0. When flow pushed u→v: forward.cap-=d, back.cap+=d (enables cancellation)."},
        ]
      },
      { z:2, tag:"BFS builds level graph — return false when sink unreachable",
        lines:[
          {t:"blank", ph:"// level[] and iter[] arrays for Dinic's...", ans:"vector<int> level(n), iter(n);", hint:"level[v] = BFS distance from source. iter[v] = current edge index (current-arc optimization)."},
          {t:"fixed", code:DINIC_BFS},
        ]
      },
      { z:3, tag:"DFS blocking flow — iter[] avoids re-exploring dead ends",
        lines:[
          {t:"fixed", code:DINIC_DFS},
        ]
      },
      { z:4, tag:"OUTER LOOP — BFS then DFS until no augmenting path",
        lines:[
          {t:"blank", ph:"// outer loop: while BFS finds level graph, push blocking flows...", ans:"int flow=0; while(bfs()){ iter.assign(n,0); int d; while((d=dfs(s,INT_MAX))>0) flow+=d; } return flow;", hint:"Each BFS phase increases level[t] by at least 1. At most O(V) phases. Total: O(V²E)."},
          {t:"fixed", code:`}`},
        ]
      },
    ]
  },

  // 02 ── Minimum Cut ────────────────────────────────────────────────────────
  {
    id:2, title:"Minimum Cut", badge:"MAX FLOW = MIN CUT", badgeColor:"var(--c3)",
    hint:"After running max flow, BFS on residual graph from source. Nodes reachable = S side. Nodes unreachable = T side. Edges from S to T with zero remaining capacity = min cut edges.",
    vizRows:[
      {label:"run max flow", nodes:["saturate some edges"], cls:"fn-src"},
      {label:"BFS on residual", nodes:["reachable from s = S-side"], cls:"fn-mid"},
      {label:"cut edges", nodes:["S→T, cap=0 in residual"], cls:"fn-cut"},
      {label:"min cut weight", nodes:["= max flow value"], cls:"fn-sink"},
    ],
    zones:[
      { z:1, tag:"same graph structure — run max flow first",
        lines:[
          {t:"blank", ph:"// minimum cut = max flow by max-flow min-cut theorem...", ans:"pair<int,vector<pair<int,int>>> minCut(int n, vector<tuple<int,int,int>>& edges, int s, int t) {", hint:"Returns {cut_value, list of cut edges}. Cut value = max flow value (theorem)."},
          {t:"blank", ph:"// build graph and run Dinic's max flow...", ans:"struct Edge{int to,rev,cap;}; vector<vector<Edge>> g(n); auto addEdge=[&](int u,int v,int c){g[u].push_back({v,(int)g[v].size(),c});g[v].push_back({u,(int)g[u].size()-1,0});}; for(auto[u,v,c]:edges) addEdge(u,v,c); int flow=dinic(g,n,s,t);", hint:"First run max flow to saturation. Then identify cut from residual graph."},
        ]
      },
      { z:2, tag:"BFS on residual to find S-side (reachable from source)",
        lines:[
          {t:"blank", ph:"// BFS on residual graph to find reachable nodes from s...", ans:"vector<bool> reachable(n,false); queue<int> q; q.push(s); reachable[s]=true; while(!q.empty()){ int u=q.front();q.pop(); for(auto& e:g[u]) if(e.cap>0&&!reachable[e.to]){reachable[e.to]=true;q.push(e.to);} }", hint:"Only traverse edges with cap > 0 in residual. Saturated edges (cap=0) cannot be crossed."},
        ]
      },
      { z:3, tag:"cut edges: reachable u → unreachable v, originally had capacity",
        lines:[
          {t:"blank", ph:"// identify cut edges: from S-side to T-side...", ans:"vector<pair<int,int>> cutEdges; for(int u=0;u<n;u++) if(reachable[u]) for(auto& e:g[u]) if(!reachable[e.to]&&g[e.to][e.rev].cap>0) cutEdges.push_back({u,e.to});", hint:"Edge u→v is in min cut if: u reachable, v not reachable, and back edge has flow (g[v][rev].cap > 0 means flow was pushed)."},
        ]
      },
      { z:4, tag:"RESULT — cut value = max flow, cut edges identified",
        lines:[
          {t:"blank", ph:"// return max flow value (= min cut) and cut edges...", ans:"return {flow, cutEdges};", hint:"By max-flow min-cut theorem: max flow = min cut weight. The identified edges are the bottleneck."},
          {t:"fixed", code:`}`},
        ]
      },
    ]
  },

  // 03 ── Bipartite Matching ─────────────────────────────────────────────────
  {
    id:3, title:"Bipartite Matching", badge:"SOURCE→L→R→SINK cap=1", badgeColor:"var(--c2)",
    hint:"Add virtual source→each left node (cap 1). Each right node→virtual sink (cap 1). Original edges L→R have cap 1. Max flow = max matching. Cap 1 enforces each node matched at most once.",
    vizRows:[
      {label:"super-source s", nodes:["s→L1(1)","s→L2(1)"], cls:"fn-src"},
      {label:"L-R edges cap=1", nodes:["L1→R1","L1→R2","L2→R2"], cls:"fn-mid"},
      {label:"super-sink t", nodes:["R1→t(1)","R2→t(1)"], cls:"fn-sink"},
      {label:"max flow = matching", nodes:["each node matched ≤1"], cls:"fn-cut"},
    ],
    zones:[
      { z:1, tag:"2+L+R nodes: index 0=source, 1..L=left, L+1..L+R=right, last=sink",
        lines:[
          {t:"blank", ph:"// bipartite matching via max flow...", ans:"int bipartiteMatching(int L, int R, vector<pair<int,int>>& edges) {", hint:"L left nodes, R right nodes. edges[i]={l,r} means left node l can match right node r."},
          {t:"blank", ph:"// total nodes: source + L + R + sink...", ans:"int n=L+R+2, s=0, t=n-1; struct Edge{int to,rev,cap;}; vector<vector<Edge>> g(n); auto addEdge=[&](int u,int v,int c){g[u].push_back({v,(int)g[v].size(),c});g[v].push_back({u,(int)g[u].size()-1,0});};", hint:"Node numbering: 0=source, 1..L=left nodes, L+1..L+R=right nodes, n-1=sink."},
        ]
      },
      { z:2, tag:"source→left (cap 1), right→sink (cap 1)",
        lines:[
          {t:"blank", ph:"// source to each left node with capacity 1...", ans:"for(int i=1;i<=L;i++) addEdge(s,i,1);", hint:"Cap 1: each left node can be matched to at most one right node."},
          {t:"blank", ph:"// each right node to sink with capacity 1...", ans:"for(int i=1;i<=R;i++) addEdge(L+i,t,1);", hint:"Cap 1: each right node can be matched to at most one left node."},

const zoneNames=['Graph Structure','BFS Level Graph','DFS / Construction','Result'];
const zoneCls=['zone-1','zone-2','zone-3','zone-4'];
const zoneNums=['①','②','③','④'];
let current=0, answered=new Set(), stats={correct:0,wrong:0,streak:0};

function buildSelector(){
  const sel=document.getElementById('selector'); sel.innerHTML='';
  P.forEach((p,i)=>{
    const b=document.createElement('button');
    b.className='sel-btn'+(i===0?' active':'');
    b.textContent=`${String(i+1).padStart(2,'0')} ${p.title}`;
    b.onclick=()=>loadPattern(i); sel.appendChild(b);
  });
}

function loadPattern(idx){
  current=idx; answered=new Set();
  document.querySelectorAll('.sel-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  const p=P[idx];
  document.getElementById('tbox-title').textContent=p.title.replace(/ /g,'_')+'.cpp';
  const badge=document.getElementById('tbox-badge');
  badge.textContent=p.badge;
  badge.style.cssText=`color:${p.badgeColor};border-color:${p.badgeColor};background:${p.badgeColor}18;`;
  const zonesEl=document.getElementById('zones'); zonesEl.innerHTML='';
  p.zones.forEach((zone,zi)=>{
    const div=document.createElement('div'); div.className=`zone ${zoneCls[zi]}`;
    let html='';
    zone.lines.forEach((line,li)=>{
      if(line.t==='fixed'){
        html+=`<span class="fixed-line">${line.code}</span>`;
      } else {
        const key=`${idx}-${zi}-${li}`;
        html+=`<div class="fill-wrap"><span class="fill-indent">  </span>
          <input class="fill-input" data-key="${key}"
            data-ans="${encodeURIComponent(line.ans)}"
            data-hint="${encodeURIComponent(line.hint)}"
            placeholder="${line.ph}" autocomplete="off" spellcheck="false"
            onkeydown="handleKey(event,this)" oninput="clearState(this)"/></div>`;
      }
    });
    div.innerHTML=`
      <div class="zone-header">
        <span class="zone-num">${zoneNums[zi]}</span>
        <span class="zone-name">${zoneNames[zi]}</span>
        <span class="zone-tag">${zone.tag}</span>
      </div>
      <div class="zone-body">${html}</div>`;
    zonesEl.appendChild(div);
  });
  buildViz(p); document.getElementById('hint-row').classList.remove('show');
}

function buildViz(p){
  const viz=document.getElementById('viz');
  const rows=p.vizRows.map(row=>{
    const nodes=row.nodes.map(nd=>`<div class="flow-node ${row.cls}">${nd}</div>`).join(`<span class="flow-arrow"> → </span>`);
    return `<div class="flow-row"><div class="flow-label">${row.label}</div>${nodes}</div>`;
  }).join('');
  viz.innerHTML=`
    <div class="flow-viz">${rows}</div>
    <div class="viz-legend">
      <span style="color:var(--c4)">■</span> source &nbsp;
      <span style="color:var(--c2)">■</span> intermediate &nbsp;
      <span style="color:var(--c1)">■</span> sink &nbsp;
      <span style="color:var(--c3)">■</span> cut / key constraint &nbsp;&nbsp;
      <span style="color:var(--c2)">★ e.cap-=d; graph[to][rev].cap+=d &nbsp;|&nbsp; back edge cap=0 at construction &nbsp;|&nbsp; iter[] avoids dead-end re-exploration</span>
    </div>`;
}

function normalise(s){
  return s.trim().toLowerCase()
    .replace(/\s*([+\-*/%=<>!&|^~,;{}()\[\]])\s*/g,'$1')
    .replace(/\s+/g,' ').replace(/;+$/,'')
    .replace(/\+\+/g,'++').replace(/--/g,'--')
    .replace(/\s*->\s*/g,'->').trim();
}
function handleKey(e,el){if(e.key==='Enter')checkSingle(el);if(e.key==='Tab'){e.preventDefault();focusNext(el);}}
function clearState(el){el.classList.remove('correct','wrong','revealed');}
function checkSingle(el){
  const key=el.dataset.key; if(answered.has(key))return;
  const ans=decodeURIComponent(el.dataset.ans);
  if(normalise(el.value)===normalise(ans)){
    el.classList.add('correct');el.classList.remove('wrong');
    answered.add(key);stats.correct++;stats.streak++;
    updateScore();showToast('✓ Correct!','ok');focusNext(el);
  } else {
    el.classList.add('wrong');el.classList.remove('correct');
    stats.wrong++;stats.streak=0;updateScore();
    showToast('✗ Not quite — check hint','err');
    document.getElementById('hint-text').textContent=decodeURIComponent(el.dataset.hint);
    document.getElementById('hint-row').classList.add('show');
  }
}
function checkAll(){document.querySelectorAll('.fill-input').forEach(el=>{if(!answered.has(el.dataset.key))checkSingle(el);});}
function revealAll(){
  document.querySelectorAll('.fill-input').forEach(el=>{
    if(!answered.has(el.dataset.key)){el.value=decodeURIComponent(el.dataset.ans);el.classList.add('revealed');el.classList.remove('correct','wrong');}
  });
  showToast('Answers revealed — study, then Reset!','inf');
  document.getElementById('hint-text').textContent=P[current].hint;
  document.getElementById('hint-row').classList.add('show');
}
function resetInputs(){
  answered=new Set();
  document.querySelectorAll('.fill-input').forEach(el=>{el.value='';el.classList.remove('correct','wrong','revealed');});
  document.getElementById('hint-row').classList.remove('show');
}
function nextPattern(){loadPattern((current+1)%P.length);}
function focusNext(el){const all=Array.from(document.querySelectorAll('.fill-input'));const i=all.indexOf(el);if(i<all.length-1)all[i+1].focus();}
function updateScore(){
  document.getElementById('s-correct').textContent=stats.correct;
  document.getElementById('s-wrong').textContent=stats.wrong;
  document.getElementById('s-streak').textContent=stats.streak;
  const total=stats.correct+stats.wrong;
  document.getElementById('prog').style.width=total?Math.round(stats.correct/total*100)+'%':'0%';
}
let toastTimer;
function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast ${type} show`;
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2400);
}
buildSelector(); loadPattern(0);
</script>
</body>
</html>
