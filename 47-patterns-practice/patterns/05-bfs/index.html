<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BFS — Practice</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c12; --surface: #111119; --card: #15151e; --border: #23233a;
  --text: #e2e2f0; --muted: #52526e; --faint: #1e1e2e;
  --c1: #a78bfa; --c2: #38bdf8; --c3: #fb923c; --c4: #4ade80;
  --b1: rgba(167,139,250,0.08); --b2: rgba(56,189,248,0.07);
  --b3: rgba(251,146,60,0.08);  --b4: rgba(74,222,128,0.07);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; }
body::before { content:''; position:fixed; inset:0; background-image:radial-gradient(rgba(56,189,248,0.08) 1px,transparent 1px); background-size:28px 28px; pointer-events:none; z-index:0; }
.wrap { width:100%; max-width:820px; padding:48px 24px 80px; position:relative; z-index:1; }

.hdr { text-align:center; margin-bottom:40px; }
.hdr-pill { display:inline-block; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--c2); border:1px solid rgba(56,189,248,0.3); padding:4px 14px; border-radius:20px; margin-bottom:16px; }
.hdr h1 { font-size:clamp(24px,5vw,52px); font-weight:800; letter-spacing:-1.5px; line-height:1; background:linear-gradient(120deg,#fff 0%,var(--c2) 50%,var(--c4) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; }
.hdr p { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted); }

.selector-wrap { margin-bottom:28px; }
.selector-label { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
.selector { display:flex; flex-wrap:wrap; gap:8px; }
.sel-btn { font-family:'JetBrains Mono',monospace; font-size:11px; padding:6px 14px; border:1px solid var(--border); background:var(--faint); color:var(--muted); border-radius:3px; cursor:pointer; transition:all .15s; user-select:none; }
.sel-btn:hover { border-color:var(--c2); color:var(--text); }
.sel-btn.active { background:rgba(56,189,248,0.1); border-color:var(--c2); color:var(--c2); }

.scorebar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; padding:10px 16px; background:var(--surface); border:1px solid var(--border); border-radius:4px; }
.score-item { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); display:flex; flex-direction:column; align-items:center; gap:3px; }
.score-item strong { font-size:20px; font-weight:700; color:var(--text); line-height:1; }
.score-item.good strong { color:var(--c4); }
.score-item.bad  strong { color:var(--c3); }
.progress-bar { flex:1; margin:0 20px; height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; background:var(--c2); border-radius:2px; transition:width .4s; }

.template-box { background:var(--card); border:1px solid var(--border); border-radius:6px; overflow:hidden; box-shadow:0 0 60px rgba(56,189,248,0.04); }
.tbox-header { display:flex; align-items:center; justify-content:space-between; padding:12px 20px; border-bottom:1px solid var(--border); background:rgba(255,255,255,0.015); }
.tbox-title { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--c2); font-weight:600; }
.tbox-badge { font-family:'JetBrains Mono',monospace; font-size:10px; padding:3px 10px; border-radius:2px; border:1px solid; }

.zone { border-bottom:1px solid var(--border); display:flex; flex-direction:column; }
.zone:last-child { border-bottom:none; }
.zone-header { display:flex; align-items:center; gap:10px; padding:10px 20px 8px; }
.zone-num { font-size:18px; font-weight:800; line-height:1; font-family:'JetBrains Mono',monospace; }
.zone-name { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; opacity:.6; }
.zone-tag { margin-left:auto; font-family:'JetBrains Mono',monospace; font-size:9px; padding:2px 8px; border-radius:2px; opacity:.7; }
.zone-1{background:var(--b1)} .zone-2{background:var(--b2)} .zone-3{background:var(--b3)} .zone-4{background:var(--b4)}
.zone-1 .zone-num,.zone-1 .zone-name{color:var(--c1)} .zone-2 .zone-num,.zone-2 .zone-name{color:var(--c2)}
.zone-3 .zone-num,.zone-3 .zone-name{color:var(--c3)} .zone-4 .zone-num,.zone-4 .zone-name{color:var(--c4)}
.zone-1 .zone-tag{background:rgba(167,139,250,0.1);color:var(--c1)} .zone-2 .zone-tag{background:rgba(56,189,248,0.1);color:var(--c2)}
.zone-3 .zone-tag{background:rgba(251,146,60,0.1);color:var(--c3)} .zone-4 .zone-tag{background:rgba(74,222,128,0.1);color:var(--c4)}

.zone-body { padding:0 20px 14px 24px; font-family:'JetBrains Mono',monospace; font-size:12.5px; line-height:1.8; }
.fixed-line { display:block; color:var(--text); white-space:pre; }
.cm { color:#3d4f5c; font-style:italic; }

.fill-wrap { display:flex; align-items:center; margin:2px 0; }
.fill-indent { color:var(--muted); opacity:.3; font-size:12px; white-space:pre; user-select:none; }
.fill-input { background:rgba(0,0,0,0.25); border:none; border-bottom:1px dashed rgba(255,255,255,0.15); color:var(--text); font-family:'JetBrains Mono',monospace; font-size:12.5px; padding:2px 6px; width:100%; outline:none; caret-color:var(--c2); transition:border-color .2s,background .2s; border-radius:2px 2px 0 0; }
.fill-input:focus { background:rgba(56,189,248,0.06); border-bottom-color:var(--c2); }
.fill-input.correct { background:rgba(74,222,128,0.07); border-bottom-color:var(--c4)!important; color:var(--c4); }
.fill-input.wrong { background:rgba(251,146,60,0.07); border-bottom-color:var(--c3)!important; color:var(--c3); animation:shake .3s; }
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.fill-input.revealed { background:rgba(167,139,250,0.07); border-bottom-color:var(--c1)!important; color:var(--c1); }

.actions { display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }
.btn { font-family:'JetBrains Mono',monospace; font-size:11px; padding:9px 20px; border-radius:3px; cursor:pointer; border:1px solid; transition:all .15s; letter-spacing:.5px; }
.btn-check  { background:rgba(56,189,248,0.1);  color:var(--c2); border-color:rgba(56,189,248,0.4); }
.btn-check:hover  { background:rgba(56,189,248,0.2); }
.btn-reveal { background:rgba(167,139,250,0.08); color:var(--c1); border-color:rgba(167,139,250,0.3); }
.btn-reveal:hover { background:rgba(167,139,250,0.15); }
.btn-reset  { background:transparent; color:var(--muted); border-color:var(--border); }
.btn-reset:hover  { color:var(--text); border-color:var(--muted); }
.btn-next   { margin-left:auto; background:rgba(74,222,128,0.1); color:var(--c4); border-color:rgba(74,222,128,0.3); }
.btn-next:hover   { background:rgba(74,222,128,0.18); }

.hint-row { display:none; align-items:center; gap:10px; margin-top:14px; padding:10px 14px; background:rgba(56,189,248,0.05); border:1px solid rgba(56,189,248,0.15); border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--c2); }
.hint-row.show { display:flex; }

.viz-row { display:flex; align-items:flex-start; gap:12px; padding:12px 20px; border-top:1px solid var(--border); background:rgba(0,0,0,0.2); overflow-x:auto; flex-wrap:wrap; }
.viz-label { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); flex-shrink:0; padding-top:4px; }
.viz-queue { display:flex; flex-direction:column; gap:6px; }
.viz-level { display:flex; align-items:center; gap:6px; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); }
.viz-node { width:28px; height:28px; display:flex; align-items:center; justify-content:center; border:1px solid var(--border); border-radius:4px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); }
.viz-node.queued  { border-color:var(--c2); color:var(--c2); background:rgba(56,189,248,0.08); }
.viz-node.visited { border-color:var(--c4); color:var(--c4); background:rgba(74,222,128,0.07); }
.viz-node.current { border-color:var(--c3); color:var(--c3); background:rgba(251,146,60,0.1); }

.kw{color:#c792ea;font-weight:600} .ty{color:#82aaff} .nm{color:#f78c6c} .op{color:#ff6b35} .vr{color:#eeffff} .fn{color:#7dd3fc}

.toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(20px); font-family:'JetBrains Mono',monospace; font-size:12px; padding:10px 24px; border-radius:4px; opacity:0; transition:all .3s; z-index:100; pointer-events:none; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.ok  { background:rgba(74,222,128,0.15); border:1px solid rgba(74,222,128,0.4); color:var(--c4); }
.toast.err { background:rgba(251,146,60,0.12); border:1px solid rgba(251,146,60,0.3);  color:var(--c3); }
.toast.inf { background:rgba(167,139,250,0.1); border:1px solid rgba(167,139,250,0.3); color:var(--c1); }
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-pill">Pattern 05 — Practice Mode</div>
    <h1>BFS</h1>
    <p>// one template · fill the blanks · master all 10 manifestations</p>
  </div>

  <div class="selector-wrap">
    <div class="selector-label">Select manifestation</div>
    <div class="selector" id="selector"></div>
  </div>

  <div class="scorebar">
    <div class="score-item good"><strong id="s-correct">0</strong>correct</div>
    <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
    <div class="score-item bad"><strong id="s-wrong">0</strong>wrong</div>
    <div class="score-item" style="margin-left:16px"><strong id="s-streak">0</strong>streak🔥</div>
  </div>

  <div class="template-box">
    <div class="tbox-header">
      <span class="tbox-title" id="tbox-title">TEMPLATE.cpp</span>
      <span class="tbox-badge" id="tbox-badge"></span>
    </div>
    <div id="zones"></div>
    <div class="viz-row" id="viz"></div>
  </div>

  <div class="hint-row" id="hint-row"><span>💡</span><span id="hint-text"></span></div>

  <div class="actions">
    <button class="btn btn-check"  onclick="checkAll()">Check Answers</button>
    <button class="btn btn-reveal" onclick="revealAll()">Reveal</button>
    <button class="btn btn-reset"  onclick="resetInputs()">Reset</button>
    <button class="btn btn-next"   onclick="nextPattern()">Next →</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// BFS — 10 Manifestations
// 4 Blocks:
//   ① INIT        — signature, edge guard, seed queue, mark visited ON PUSH
//   ② POP FRONT   — while(!q.empty()), curr = front+pop, immediate work on curr
//   ③ EXPAND      — generate neighbors, if !visited: mark ON PUSH, push, attach data
//   ④ RETURN      — what to return after queue drains
//
// THE GOLDEN RULE baked into every manifestation:
//   mark visited WHEN YOU PUSH — not when you pop
// ─────────────────────────────────────────────────────────────────────────────

const P = [

  // 01 ── Shortest Path Unweighted ──────────────────────────────────────────
  {
    id:1, title:"Shortest Path Unweighted", badge:"GRAPH", badgeColor:"var(--c2)",
    hint:"Distance array replaces visited array — dist[node] = -1 means unvisited. Return dist[dst] after BFS.",
    zones:[
      { z:1, tag:"seed queue + mark dist on PUSH",
        lines:[
          {t:"blank", ph:"// function signature...", ans:"int shortestPath(int n, int src, int dst, vector<vector<int>>& graph) {", hint:"Returns minimum hops from src to dst, or -1 if unreachable"},
          {t:"blank", ph:"// edge case — same node...", ans:"if (src == dst) return 0;", hint:"Already at destination — zero hops needed"},
          {t:"blank", ph:"// dist array — -1 means unvisited...", ans:"vector<int> dist(n, -1);", hint:"dist doubles as visited array: -1 = not reached yet"},
          {t:"fixed", code:`<span class="ty">queue</span><span class="op">&lt;</span><span class="ty">int</span><span class="op">&gt;</span> <span class="vr">q</span>;`},
          {t:"blank", ph:"// seed queue + mark src distance...", ans:"q.push(src); dist[src] = 0;", hint:"Push source, mark its distance as 0 — ON PUSH not on pop"},
        ]
      },
      { z:2, tag:"FIXED — pop front, check if destination",
        lines:[
          {t:"fixed", code:`<span class="kw">while</span> (!<span class="vr">q</span>.empty()) {`},
          {t:"fixed", code:`    <span class="ty">int</span> <span class="vr">curr</span> <span class="op">=</span> <span class="vr">q</span>.front(); <span class="vr">q</span>.pop();`},
          {t:"blank", ph:"// early return if we reached destination...", ans:"if (curr == dst) return dist[dst];", hint:"BFS guarantees first time we reach dst = shortest path"},
        ]
      },
      { z:3, tag:"changes — attach distance to each neighbor",
        lines:[
          {t:"fixed", code:`    <span class="kw">for</span> (<span class="ty">int</span> <span class="vr">nb</span> : graph[<span class="vr">curr</span>]) {`},
          {t:"blank", ph:"// only push unvisited neighbors...", ans:"if (dist[nb] == -1) {", hint:"dist[nb] == -1 means not yet visited"},
          {t:"blank", ph:"//   set distance = parent dist + 1...", ans:"dist[nb] = dist[curr] + 1;", hint:"Each hop costs 1 — mark ON PUSH"},
          {t:"fixed", code:`            <span class="vr">q</span>.push(<span class="vr">nb</span>);`},
          {t:"fixed", code:`        }`},
          {t:"fixed", code:`    }`},
          {t:"fixed", code:`}`},
        ]
      },
      { z:4, tag:"return -1 if unreachable",
        lines:[
          {t:"blank", ph:"// dst never reached — unreachable...", ans:"return -1;", hint:"Queue drained without reaching dst — no path exists"},
          {t:"fixed", code:`}`},
        ]
      },
    ]
  },

  // 02 ── Level Order Traversal ─────────────────────────────────────────────
  {
    id:2, title:"Level Order Traversal", badge:"TREE", badgeColor:"var(--c4)",
    hint:"Snapshot queue size at start of each level. Process exactly that many nodes — they all belong to same level.",
    zones:[
      { z:1, tag:"seed queue with root + null guard",
        lines:[
          {t:"blank", ph:"// function signature...", ans:"vector<vector<int>> levelOrder(TreeNode* root) {", hint:"Returns 2D vector — each inner vector = one level of tree"},
          {t:"blank", ph:"// edge case — empty tree...", ans:"if (!root) return {};", hint:"Nothing to traverse"},
          {t:"blank", ph:"// result container...", ans:"vector<vector<int>> result;", hint:"Each element will be one level's node values"},
          {t:"fixed", code:`<span class="ty">queue</span><span class="op">&lt;</span>TreeNode<span class="op">*&gt;</span> <span class="vr">q</span>;`},
          {t:"blank", ph:"// seed queue with root...", ans:"q.push(root);", hint:"Root is level 0 — seed it, no need to mark visited (tree has no cycles)"},
        ]
      },
      { z:2, tag:"FIXED — pop front, outer loop per level",
        lines:[
          {t:"fixed", code:`<span class="kw">while</span> (!<span class="vr">q</span>.empty()) {`},
          {t:"blank", ph:"// snapshot current level size...", ans:"int levelSize = q.size();", hint:"All nodes currently in queue belong to the same level"},
          {t:"blank", ph:"// container for this level's values...", ans:"vector<int> level;", hint:"Collect all node values at this level"},
          {t:"fixed", code:`    <span class="kw">for</span> (<span class="ty">int</span> <span class="vr">i</span> <span class="op">=</span> <span class="nm">0</span>; <span class="vr">i</span> <span class="op">&lt;</span> <span class="vr">levelSize</span>; <span class="vr">i</span><span class="op">++</span>) {`},
          {t:"fixed", code:`        <span class="kw">auto</span> <span class="vr">curr</span> <span class="op">=</span> <span class="vr">q</span>.front(); <span class="vr">q</span>.pop();`},
          {t:"blank", ph:"//     record current node's value...", ans:"level.push_back(curr->val);", hint:"Add this node's value to current level"},
        ]
      },
      { z:3, tag:"changes — push children of current node",
        lines:[
          {t:"blank", ph:"//     push left child if exists...", ans:"if (curr->left)  q.push(curr->left);", hint:"Left child goes to next level"},
          {t:"blank", ph:"//     push right child if exists...", ans:"if (curr->right) q.push(curr->right);", hint:"Right child goes to next level"},
          {t:"fixed", code:`    }`},
          {t:"blank", ph:"//   save completed level to result...", ans:"result.push_back(level);", hint:"Current level fully processed — add to result"},
          {t:"fixed", code:`}`},
        ]
      },
      { z:4, tag:"return all levels",
        lines:[
          {t:"blank", ph:"// return level-by-level result...", ans:"return result;", hint:"2D vector where result[i] = all node values at depth i"},
          {t:"fixed", code:`}`},
        ]
      },
    ]
  },

  // 03 ── Multi-Source BFS ──────────────────────────────────────────────────
  {
    id:3, title:"Multi-Source BFS", badge:"MULTI-SEED", badgeColor:"var(--c3)",
    hint:"Push ALL sources into queue at start before the BFS loop begins. They all start at distance 0 simultaneously.",
    zones:[
      { z:1, tag:"seed queue with ALL sources at once",
        lines:[
          {t:"blank", ph:"// function signature — fire spreading from multiple sources...", ans:"vector<vector<int>> multiSourceBFS(vector<vector<int>>& grid) {", hint:"Classic example: 01-matrix — distance from each cell to nearest 0"},
          {t:"blank", ph:"// edge case — empty grid...", ans:"if (grid.empty()) return {};", hint:"Guard against empty input"},
          {t:"blank", ph:"// dist grid — -1 means unvisited...", ans:"int m = grid.size(), n = grid[0].size(); vector<vector<int>> dist(m, vector<int>(n, -1));", hint:"Distance grid initialised to -1 (unvisited)"},
          {t:"fixed", code:`<span class="ty">queue</span><span class="op">&lt;</span><span class="ty">pair</span><span class="op">&lt;</span><span class="ty">int</span>,<span class="ty">int</span><span class="op">&gt;&gt;</span> <span class="vr">q</span>;`},
          {t:"blank", ph:"// seed ALL source cells (value==0) at distance 0...", ans:"for (int r=0;r<m;r++) for (int c=0;c<n;c++) if (grid[r][c]==0) { dist[r][c]=0; q.push({r,c}); }", hint:"All sources enter queue together — BFS fans out equally from all"},
        ]
      },
      { z:2, tag:"FIXED — pop {row,col} pair from front",
        lines:[
          {t:"fixed", code:`<span class="kw">while</span> (!<span class="vr">q</span>.empty()) {`},
          {t:"blank", ph:"// pop current cell...", ans:"auto [r, c] = q.front(); q.pop();", hint:"Structured binding to unpack {row, col} pair"},
        ]
      },
      { z:3, tag:"changes — 4-directional expansion",
        lines:[
          {t:"blank", ph:"// 4 direction deltas...", ans:"for (auto [dr,dc] : vector<pair<int,int>>{{1,0},{-1,0},{0,1},{0,-1}}) {", hint:"Expand to up/down/left/right neighbors"},
          {t:"blank", ph:"//   compute neighbor coordinates...", ans:"int nr = r+dr, nc = c+dc;", hint:"New row and column after applying delta"},
          {t:"blank", ph:"//   bounds check + unvisited check...", ans:"if (nr>=0 && nr<m && nc>=0 && nc<n && dist[nr][nc]==-1) {", hint:"In bounds AND not yet reached"},
          {t:"blank", ph:"//     mark distance ON PUSH...", ans:"dist[nr][nc] = dist[r][c] + 1;", hint:"BFS guarantees this is the shortest distance — mark on push"},
          {t:"fixed", code:`            <span class="vr">q</span>.push({<span class="vr">nr</span>, <span class="vr">nc</span>});`},
          {t:"fixed", code:`        }`},
          {t:"fixed", code:`    }`},
          {t:"fixed", code:`}`},
        ]
      },
      { z:4, tag:"return filled distance grid",
        lines:[
          {t:"blank", ph:"// return distance grid...", ans:"return dist;", hint:"Each cell now holds its distance to nearest source"},
          {t:"fixed", code:`}`},
        ]
      },
    ]
  },

  // 04 ── 0-1 BFS ───────────────────────────────────────────────────────────
  {
    id:4, title:"0-1 BFS", badge:"DEQUE", badgeColor:"var(--c1)",
    hint:"Weight 0 edge → push_front (free move, same distance). Weight 1 edge → push_back (costs 1). Deque replaces queue.",
    zones:[
      { z:1, tag:"DEQUE replaces queue — dist array seeded",
        lines:[
          {t:"blank", ph:"// function signature...", ans:"int zeroOneBFS(int n, int src, int dst, vector<vector<pair<int,int>>>& graph) {", hint:"graph[u] = {{v, weight}} where weight is 0 or 1"},
          {t:"blank", ph:"// dist array — INT_MAX means unvisited...", ans:"vector<int> dist(n, INT_MAX);", hint:"Using INT_MAX as infinity for unvisited nodes"},
          {t:"blank", ph:"// USE DEQUE not queue...", ans:"deque<int> dq;", hint:"Deque allows both push_front (weight 0) and push_back (weight 1)"},
          {t:"blank", ph:"// seed deque + set src distance to 0...", ans:"dq.push_back(src); dist[src] = 0;", hint:"Source starts with distance 0"},
        ]
      },
      { z:2, tag:"FIXED — pop front same as regular BFS",
        lines:[
          {t:"fixed", code:`<span class="kw">while</span> (!<span class="vr">dq</span>.empty()) {`},
          {t:"fixed", code:`    <span class="ty">int</span> <span class="vr">curr</span> <span class="op">=</span> <span class="vr">dq</span>.front(); <span class="vr">dq</span>.pop_front();`},
          {t:"blank", ph:"// skip if we already found shorter path to curr...", ans:"if (curr == dst) return dist[dst];", hint:"Early exit when destination is popped"},
        ]
      },
      { z:3, tag:"changes — push_front for 0, push_back for 1",
        lines:[
          {t:"fixed", code:`    <span class="kw">for</span> (<span class="kw">auto</span> [<span class="vr">nb</span>, <span class="vr">w</span>] : graph[<span class="vr">curr</span>]) {`},
          {t:"blank", ph:"// only process if we found shorter path...", ans:"if (dist[curr] + w < dist[nb]) {", hint:"Relaxation condition — only update if we found a cheaper route"},
          {t:"blank", ph:"//   update distance...", ans:"dist[nb] = dist[curr] + w;", hint:"Record the shorter distance ON PUSH"},

// ─────────────────────────────────────────────────────────────────────────────
const zoneNames = ['Init + Seed Queue','Pop Front + Process','Expand Neighbors','Return'];
const zoneCls   = ['zone-1','zone-2','zone-3','zone-4'];
const zoneNums  = ['①','②','③','④'];
let current=0, answered=new Set(), stats={correct:0,wrong:0,streak:0};

function buildSelector() {
  const sel = document.getElementById('selector');
  sel.innerHTML='';
  P.forEach((p,i)=>{
    const b=document.createElement('button');
    b.className='sel-btn'+(i===0?' active':'');
    b.textContent=`${String(i+1).padStart(2,'0')} ${p.title}`;
    b.onclick=()=>loadPattern(i);
    sel.appendChild(b);
  });
}

function loadPattern(idx) {
  current=idx; answered=new Set();
  document.querySelectorAll('.sel-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  const p=P[idx];
  document.getElementById('tbox-title').textContent=p.title.replace(/ /g,'_')+'.cpp';
  const badge=document.getElementById('tbox-badge');
  badge.textContent=p.badge;
  badge.style.cssText=`color:${p.badgeColor};border-color:${p.badgeColor};background:${p.badgeColor}18;`;

  const zonesEl=document.getElementById('zones');
  zonesEl.innerHTML='';
  p.zones.forEach((zone,zi)=>{
    const div=document.createElement('div');
    div.className=`zone ${zoneCls[zi]}`;
    let html='';
    zone.lines.forEach((line,li)=>{
      if(line.t==='fixed'){
        html+=`<span class="fixed-line">${line.code}</span>`;
      } else {
        const key=`${idx}-${zi}-${li}`;
        html+=`<div class="fill-wrap"><span class="fill-indent">  </span>
          <input class="fill-input" data-key="${key}"
            data-ans="${encodeURIComponent(line.ans)}"
            data-hint="${encodeURIComponent(line.hint)}"
            placeholder="${line.ph}" autocomplete="off" spellcheck="false"
            onkeydown="handleKey(event,this)" oninput="clearState(this)"/></div>`;
      }
    });
    div.innerHTML=`
      <div class="zone-header">
        <span class="zone-num">${zoneNums[zi]}</span>
        <span class="zone-name">${zoneNames[zi]}</span>
        <span class="zone-tag">${zone.tag}</span>
      </div>
      <div class="zone-body">${html}</div>`;
    zonesEl.appendChild(div);
  });
  buildViz(p);
  document.getElementById('hint-row').classList.remove('show');
}

function buildViz(p) {
  const viz=document.getElementById('viz');
  viz.innerHTML=`
    <span class="viz-label">queue:</span>
    <div class="viz-queue">
      <div class="viz-level">
        <span style="font-size:10px;color:var(--muted);width:40px">L0:</span>
        <div class="viz-node current">src</div>
      </div>
      <div class="viz-level">
        <span style="font-size:10px;color:var(--muted);width:40px">L1:</span>
        <div class="viz-node queued">nb1</div>
        <div class="viz-node queued">nb2</div>
        <div class="viz-node queued">nb3</div>
      </div>
      <div class="viz-level">
        <span style="font-size:10px;color:var(--muted);width:40px">L2:</span>
        <div class="viz-node">...</div>
      </div>
    </div>
    <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-left:16px;align-self:center">
      🟠 processing &nbsp; 🔵 in queue &nbsp; ⬜ unvisited<br>
      <span style="color:var(--c3)">★ mark visited ON PUSH — not on pop</span>
    </span>`;
}

function normalise(s) {
  return s.trim().toLowerCase()
    .replace(/\s*([+\-*/%=<>!&|^~,;{}()\[\]])\s*/g,'$1')
    .replace(/\s+/g,' ').replace(/;+$/,'')
    .replace(/\+\+\s*/g,'++').replace(/--\s*/g,'--')
    .replace(/\s*->\s*/g,'->').trim();
}

function handleKey(e,el){if(e.key==='Enter')checkSingle(el);if(e.key==='Tab'){e.preventDefault();focusNext(el);}}
function clearState(el){el.classList.remove('correct','wrong','revealed');}

function checkSingle(el){
  const key=el.dataset.key;
  if(answered.has(key))return;
  const ans=decodeURIComponent(el.dataset.ans);
  if(normalise(el.value)===normalise(ans)){
    el.classList.add('correct');el.classList.remove('wrong');
    answered.add(key);stats.correct++;stats.streak++;
    updateScore();showToast('✓ Correct!','ok');focusNext(el);
  } else {
    el.classList.add('wrong');el.classList.remove('correct');
    stats.wrong++;stats.streak=0;updateScore();
    showToast('✗ Not quite — check hint','err');
    document.getElementById('hint-text').textContent=decodeURIComponent(el.dataset.hint);
    document.getElementById('hint-row').classList.add('show');
  }
}

function checkAll(){document.querySelectorAll('.fill-input').forEach(el=>{if(!answered.has(el.dataset.key))checkSingle(el);});}
function revealAll(){
  document.querySelectorAll('.fill-input').forEach(el=>{
    if(!answered.has(el.dataset.key)){el.value=decodeURIComponent(el.dataset.ans);el.classList.add('revealed');el.classList.remove('correct','wrong');}
  });
  showToast('Answers revealed — study, then Reset!','inf');
  document.getElementById('hint-text').textContent=P[current].hint;
  document.getElementById('hint-row').classList.add('show');
}
function resetInputs(){
  answered=new Set();
  document.querySelectorAll('.fill-input').forEach(el=>{el.value='';el.classList.remove('correct','wrong','revealed');});
  document.getElementById('hint-row').classList.remove('show');
}
function nextPattern(){loadPattern((current+1)%P.length);}
function focusNext(el){const all=Array.from(document.querySelectorAll('.fill-input'));const i=all.indexOf(el);if(i<all.length-1)all[i+1].focus();}
function updateScore(){
  document.getElementById('s-correct').textContent=stats.correct;
  document.getElementById('s-wrong').textContent=stats.wrong;
  document.getElementById('s-streak').textContent=stats.streak;
  const total=stats.correct+stats.wrong;
  document.getElementById('prog').style.width=total?Math.round(stats.correct/total*100)+'%':'0%';
}
let toastTimer;
function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast ${type} show`;
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2400);
}

buildSelector();
loadPattern(0);
</script>
</body>
</html>
